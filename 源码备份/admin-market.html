<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>校园严选 · 管理后台</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a1a0f;color:#c8e6c9;min-height:100vh}

.login-gate{position:fixed;inset:0;background:#0a1a0f;display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:40px;width:360px;text-align:center}
.login-box h1{font-size:22px;color:#6ee7b7;margin-bottom:4px}
.login-box .sub{color:rgba(255,255,255,.25);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:15px;outline:none;font-family:inherit;margin-bottom:12px}
.login-box input:focus{border-color:rgba(52,211,153,.3)}
.login-box .btn{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#059669,#34d399);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.login-box .btn:hover{opacity:.9}
.login-box .error{color:#ef4444;font-size:12px;margin-top:8px;display:none}

.app{display:none;max-width:1300px;margin:0 auto;padding:24px}
.app.show{display:block}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;background:linear-gradient(135deg,#6ee7b7,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:12px;color:rgba(255,255,255,.2)}
.header .actions{display:flex;gap:8px;align-items:center}
.header .actions a,.header .actions button{padding:8px 16px;border-radius:10px;text-decoration:none;font-size:12px;font-weight:600;transition:all.15s;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:4px}
.header .actions .btn-outline{background:rgba(255,255,255,.04);color:rgba(255,255,255,.4)}
.header .actions .btn-outline:hover{background:rgba(255,255,255,.08)}
.header .actions .btn-danger{background:rgba(239,68,68,.1);color:#ef4444}

.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap}
.tab{padding:10px 16px;cursor:pointer;font-size:12px;font-weight:500;color:rgba(255,255,255,.25);transition:all.15s;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.4);background:rgba(52,211,153,.03)}
.tab.active{color:#34d399;border-bottom-color:#34d399;background:rgba(52,211,153,.06)}
.tab .badge{display:inline-block;background:rgba(239,68,68,.2);color:#ef4444;font-size:9px;padding:1px 6px;border-radius:6px;margin-left:4px}

.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:14px}
.stat-card .num{font-size:24px;font-weight:700}
.stat-card .num.green{color:#34d399}
.stat-card .num.yellow{color:#fbbf24}
.stat-card .num.red{color:#ef4444}
.stat-card .num.blue{color:#60a5fa}
.stat-card .label{font-size:10px;color:rgba(255,255,255,.2);margin-top:2px}

.section{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:14px;padding:16px;margin-bottom:14px}

.toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.toolbar input{padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:12px;outline:none;flex:1;min-width:100px}
.toolbar input:focus{border-color:rgba(52,211,153,.3)}
.toolbar select{padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:12px;outline:none;font-family:inherit}
.toolbar select:focus{border-color:rgba(52,211,153,.3)}

.btn{padding:7px 14px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all.15s;display:inline-flex;align-items:center;gap:3px;font-family:inherit}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,#059669,#34d399);color:#fff}
.btn-ghost{background:rgba(255,255,255,.04);color:rgba(255,255,255,.35)}
.btn-ghost:hover{background:rgba(255,255,255,.08)}
.btn-green{background:rgba(52,211,153,.12);color:#34d399}
.btn-green:hover{background:rgba(52,211,153,.2)}
.btn-red{background:rgba(239,68,68,.12);color:#ef4444}
.btn-red:hover{background:rgba(239,68,68,.2)}
.btn-yellow{background:rgba(251,191,36,.1);color:#fbbf24}
.btn-yellow:hover{background:rgba(251,191,36,.2)}
.btn-sm{padding:4px 8px;font-size:10px;border-radius:5px}

.table-wrap{overflow-x:auto;max-height:500px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;color:rgba(255,255,255,.2);font-weight:400;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.04);font-size:10px;white-space:nowrap;position:sticky;top:0;background:#0a1a0f}
td{padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.02);vertical-align:middle}
tr:hover td{background:rgba(52,211,153,.02)}

.badge{font-size:10px;padding:2px 8px;border-radius:5px;display:inline-block}
.badge-green{background:rgba(52,211,153,.1);color:#34d399}
.badge-yellow{background:rgba(251,191,36,.1);color:#fbbf24}
.badge-red{background:rgba(239,68,68,.1);color:#ef4444}
.badge-gray{background:rgba(255,255,255,.04);color:rgba(255,255,255,.25)}
.badge-blue{background:rgba(96,165,250,.1);color:#60a5fa}

.empty{padding:30px;text-align:center;color:rgba(255,255,255,.06);font-size:12px}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.06);padding:10px 22px;border-radius:10px;font-size:12px;border:1px solid rgba(255,255,255,.08);transition:all.4s;z-index:100;opacity:0;backdrop-filter:blur(8px)}
.toast.show{opacity:1}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;overflow-y:auto;padding:20px}
.modal-overlay.show{display:block}
.modal{background:#0a1a0f;border-radius:16px;max-width:480px;margin:50px auto;border:1px solid rgba(255,255,255,.06);padding:22px}
.modal h2{font-size:16px;color:rgba(255,255,255,.5);margin-bottom:14px}
.modal input,.modal select,.modal textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:12px;outline:none;font-family:inherit;margin-bottom:8px}
.modal input:focus,.modal textarea:focus{border-color:rgba(52,211,153,.3)}
.modal textarea{min-height:70px;resize:vertical}
.modal .btns{display:flex;gap:6px;margin-top:8px}
.modal .btns button{flex:1;padding:9px;border-radius:8px;border:none;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit}
.modal .row{display:flex;gap:8px}
.modal .row>*{flex:1}

@media(max-width:700px){
  .app{padding:14px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .tabs{overflow-x:auto;flex-wrap:nowrap}
}
</style>
</head>
<body>

<div class="login-gate" id="loginGate">
  <div class="login-box">
    <h1>🛂 管理后台</h1>
    <div class="sub">校园严选 · 二手集市</div>
    <input type="password" id="loginPwd" placeholder="输入管理密码" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">进入后台</button>
    <div class="error" id="loginError">密码错误</div>
  </div>
</div>

<div class="app" id="app">
  <div class="header">
    <div>
      <h1>🛂 校园严选 · 管理后台</h1>
      <div class="sub" id="headerTime"></div>
    </div>
    <div class="actions">
      <a href="/market.html" class="btn-outline" target="_blank">🏪 前台</a>
      <button class="btn-outline" onclick="refreshAll()">🔄 刷新</button>
      <button class="btn-danger" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="tabs" id="tabBar">
    <div class="tab active" data-tab="overview" onclick="switchTab('overview')"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;margin-right:3px"><path d="M2 20h20" stroke="#a7f3d0" stroke-width="1.6" stroke-linecap="round"/><line x1="6" y1="5" x2="6" y2="20" stroke="#a7f3d0" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="11" x2="12" y2="20" stroke="#a7f3d0" stroke-width="1.8" stroke-linecap="round"/><line x1="18" y1="8" x2="18" y2="20" stroke="#a7f3d0" stroke-width="1.8" stroke-linecap="round"/></svg> 概览</div>
    <div class="tab" data-tab="products" onclick="switchTab('products')"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;margin-right:3px"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" fill="url(#gF)" stroke="#a7f3d0" stroke-width="1"/><polyline points="3.27 6.96 12 12.01 20.73 6.96" fill="none" stroke="#a7f3d0" stroke-width="1"/><line x1="12" y1="22.08" x2="12" y2="12" stroke="#a7f3d0" stroke-width="1"/></svg> 商品 <span class="badge" id="prodBadge" style="display:none">0</span></div>
    <div class="tab" data-tab="verifications" onclick="switchTab('verifications')"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;margin-right:3px"><path d="M12 2l3 3h4v4l3 3-3 3v4h-4l-3 3-3-3h-4v-4l-3-3 3-3V5h4z" fill="url(#gF)" stroke="#a7f3d0" stroke-width="1"/><path d="M9 12l2 2 4-4" fill="none" stroke="#a7f3d0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> 认证 <span class="badge" id="verBadge" style="display:none">0</span></div>
    <div class="tab" data-tab="categories" onclick="switchTab('categories')"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;margin-right:3px"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" fill="url(#gF)" stroke="#a7f3d0" stroke-width="1"/><circle cx="7" cy="7" r="1.5" fill="#a7f3d0"/></svg> 分类</div>
    <div class="tab" data-tab="reports" onclick="switchTab('reports')"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;margin-right:3px"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" fill="url(#gF)" stroke="#a7f3d0" stroke-width="1"/><line x1="4" y1="22" x2="4" y2="15" stroke="#a7f3d0" stroke-width="1.6" stroke-linecap="round"/></svg> 举报 <span class="badge" id="reportBadge" style="display:none">0</span></div>
    <div class="tab" data-tab="announcements" onclick="switchTab('announcements')"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;margin-right:3px"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" fill="url(#gF)" stroke="#a7f3d0" stroke-width="1"/><path d="M13.73 21a2 2 0 0 1-3.46 0" fill="url(#gF)" stroke="#a7f3d0" stroke-width="1"/><path d="M16 12l-6 3v-6z" fill="url(#g2)" stroke="#a7f3d0" stroke-width=".8"/></svg> 公告</div>
    <div class="tab" data-tab="blocked" onclick="switchTab('blocked')"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;margin-right:3px"><circle cx="12" cy="12" r="9" fill="url(#gF)" stroke="#a7f3d0" stroke-width="1"/><line x1="8" y1="8" x2="16" y2="16" stroke="#a7f3d0" stroke-width="1.8" stroke-linecap="round"/><line x1="16" y1="8" x2="8" y2="16" stroke="#a7f3d0" stroke-width="1.8" stroke-linecap="round"/></svg> 敏感词</div>
    <div class="tab" data-tab="logs" onclick="switchTab('logs')"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;margin-right:3px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" fill="url(#gF)" stroke="#a7f3d0" stroke-width="1"/><path d="M14 2v6h6" fill="none" stroke="#a7f3d0" stroke-width="1"/><line x1="8" y1="12" x2="16" y2="12" stroke="#a7f3d0" stroke-width="1.2"/><line x1="8" y1="16" x2="14" y2="16" stroke="#a7f3d0" stroke-width="1.2"/></svg> 日志</div>
    <div class="tab" data-tab="promotions" onclick="switchTab('promotions')">🎁 周边有礼</div>
  </div>

  <!-- ===== OVERVIEW ===== -->
  <div class="tab-content" id="tabOverview">
    <div class="stats" id="statsContainer"></div>
    <div class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:13px;font-weight:600;color:rgba(255,255,255,.4)">最近发布</span>
        <span style="font-size:10px;color:rgba(255,255,255,.15)"><a href="#" onclick="switchTab('products');return false" style="color:rgba(255,255,255,.2)">管理 →</a></span>
      </div>
      <div id="recentList"><div class="empty">加载中...</div></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <a class="btn btn-ghost" href="/api/marketplace/export/products" target="_blank">📥 导出商品 CSV</a>
      <a class="btn btn-ghost" href="/api/marketplace/export/reports" target="_blank">📥 导出举报 CSV</a>
    </div>
  </div>

  <!-- ===== PRODUCTS ===== -->
  <div class="tab-content" id="tabProducts" style="display:none">
    <div class="section">
      <div class="toolbar">
        <input type="text" id="prodSearch" placeholder="搜索..." onkeydown="if(event.key==='Enter')loadProds()">
        <select id="prodStatusFilter" onchange="loadProds()"><option value="">全部状态</option><option value="pending">待审核</option><option value="approved">已通过</option><option value="rejected">已拒绝</option></select>
        <select id="prodCatFilter" onchange="loadProds()"><option value="">全部分类</option></select>
        <button class="btn btn-ghost" onclick="loadProds()">🔄</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>商品</th><th>¥</th><th>分类</th><th>状态</th><th>上架</th><th>已售</th><th>卖家</th><th>时间</th><th style="text-align:center">操作</th></tr></thead><tbody id="prodTbody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- ===== VERIFICATIONS ===== -->
  <div class="tab-content" id="tabVerifications" style="display:none">
    <div class="section">
      <div class="toolbar">
        <select id="verStatusFilter" onchange="loadVers()"><option value="">全部</option><option value="pending">待审核</option><option value="approved">已通过</option><option value="rejected">已拒绝</option></select>
        <button class="btn btn-ghost" onclick="loadVers()">🔄</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>姓名</th><th>学号</th><th>手机</th><th>学生证</th><th>状态</th><th>时间</th><th style="text-align:center">操作</th></tr></thead><tbody id="verTbody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- ===== CATEGORIES ===== -->
  <div class="tab-content" id="tabCategories" style="display:none">
    <div class="section">
      <div class="toolbar">
        <input type="text" id="catName" placeholder="名称" style="max-width:120px">
        <input type="text" id="catIcon" placeholder="图标" style="max-width:60px">
        <button class="btn btn-primary" onclick="addCat()">+ 添加</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>图标</th><th>名称</th><th>排序</th><th style="text-align:center">操作</th></tr></thead><tbody id="catTbody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- ===== REPORTS ===== -->
  <div class="tab-content" id="tabReports" style="display:none">
    <div class="section">
      <div class="toolbar">
        <select id="reportStatusFilter" onchange="loadReports()"><option value="">全部</option><option value="pending">待处理</option><option value="resolved">已处理</option><option value="dismissed">已驳回</option></select>
        <button class="btn btn-ghost" onclick="loadReports()">🔄</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>商品</th><th>原因</th><th>详情</th><th>举报人</th><th>状态</th><th>时间</th><th style="text-align:center">操作</th></tr></thead><tbody id="reportTbody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- ===== ANNOUNCEMENTS ===== -->
  <div class="tab-content" id="tabAnnouncements" style="display:none">
    <div class="section">
      <div class="toolbar">
        <input type="text" id="annTitle" placeholder="公告标题" style="max-width:200px">
        <input type="text" id="annContent" placeholder="公告内容" style="max-width:300px">
        <button class="btn btn-primary" onclick="addAnn()">+ 发布</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>标题</th><th>内容</th><th>状态</th><th>时间</th><th style="text-align:center">操作</th></tr></thead><tbody id="annTbody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- ===== BLOCKED WORDS ===== -->
  <div class="tab-content" id="tabBlocked" style="display:none">
    <div class="section">
      <div class="toolbar">
        <input type="text" id="bwInput" placeholder="添加敏感词" style="max-width:200px" onkeydown="if(event.key==='Enter')addBw()">
        <button class="btn btn-primary" onclick="addBw()">+ 添加</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>敏感词</th><th>添加时间</th><th style="text-align:center">操作</th></tr></thead><tbody id="bwTbody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- ===== PROMOTIONS ===== -->
  <div class="tab-content" id="tabPromotions" style="display:none">
    <div class="section">
      <div class="toolbar">
        <input type="text" id="promoTitle" placeholder="标题" style="max-width:150px">
        <input type="text" id="promoDesc" placeholder="描述" style="max-width:200px">
        <input type="text" id="promoContact" placeholder="联系方式" style="max-width:130px">
        <button class="btn btn-primary" onclick="addPromo()">+ 添加</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>标题</th><th>描述</th><th>联系方式</th><th>排序</th><th>状态</th><th style="text-align:center">操作</th></tr></thead><tbody id="promoTbody"></tbody></table>
      </div>
    </div>
  </div>
  <!-- ===== LOGS ===== -->
  <div class="tab-content" id="tabLogs" style="display:none">
    <div class="section">
      <div class="table-wrap">
        <table><thead><tr><th>时间</th><th>操作</th><th>类型</th><th>目标</th><th>详情</th></tr></thead><tbody id="logTbody"></tbody></table>
      </div>
    </div>
  </div>
</div>

<!-- Edit Product Modal -->
<div class="modal-overlay" id="editProdModal" onclick="if(event.target===this)closeEditProd()">
  <div class="modal"><h2>📝 编辑商品</h2>
    <input type="text" id="epTitle" placeholder="名称">
    <input type="number" id="epPrice" placeholder="价格" step="0.01">
    <select id="epCat"></select>
    <input type="text" id="epContact" placeholder="联系方式">
    <input type="text" id="epQuality" placeholder="新旧程度">
    <textarea id="epDesc" placeholder="描述"></textarea>
    <div class="btns"><button class="btn-green" onclick="saveEditProd()">💾 保存</button><button class="btn-ghost" onclick="closeEditProd()">取消</button></div>
  </div>
</div>

<!-- Reject Product Modal -->
<div class="modal-overlay" id="rejectProdModal" onclick="if(event.target===this)closeRejectProd()">
  <div class="modal"><h2>✕ 拒绝理由</h2>
    <select id="rejectReason">
      <option>信息不实</option>
      <option>图片不符</option>
      <option>价格异常</option>
      <option>违规商品</option>
      <option>其他</option>
    </select>
    <textarea id="rejectDetail" placeholder="补充说明（选填）"></textarea>
    <div class="btns"><button class="btn-red" onclick="confirmReject()">✕ 拒绝</button><button class="btn-ghost" onclick="closeRejectProd()">取消</button></div>
  </div>
</div>

<!-- Image Preview Modal -->
<div class="modal-overlay" id="imgPreviewModal" onclick="if(event.target===this)closeImgPreview()">
  <div class="modal" style="max-width:500px;text-align:center">
    <img id="imgPreviewContent" style="max-width:100%;max-height:70vh;border-radius:8px">
    <div class="btns" style="margin-top:12px"><button class="btn-ghost" onclick="closeImgPreview()">关闭</button></div>
  </div>
</div>

<!-- Reject Verification Modal -->
<div class="modal-overlay" id="rejectVerModal" onclick="if(event.target===this)closeRejectVer()">
  <div class="modal"><h2>✕ 未通过原因</h2>
    <select id="rejectVerReason">
      <option>学生证不清晰</option>
      <option>姓名与学号不匹配</option>
      <option>信息不完整</option>
      <option>重复注册</option>
      <option>其他</option>
    </select>
    <textarea id="rejectVerDetail" placeholder="补充说明（选填）"></textarea>
    <div class="btns"><button class="btn-red" onclick="confirmRejectVer()">✕ 未通过</button><button class="btn-ghost" onclick="closeRejectVer()">取消</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let token = localStorage.getItem('marketAdminToken');
let editingProdId = null, rejectingProdId = null;
let cats = [];

function toast(msg, dur) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), dur||2000);
}

function login() {
  var pwd = document.getElementById('loginPwd').value;
  fetch('/api/admin/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok && d.token) {
        token = d.token; localStorage.setItem('marketAdminToken', d.token);
        document.getElementById('loginGate').style.display = 'none';
        document.getElementById('app').classList.add('show');
        init();
      } else {
        document.getElementById('loginError').style.display = 'block';
        setTimeout(() => document.getElementById('loginError').style.display = 'none', 2000);
      }
    });
}
function logout() {
  localStorage.removeItem('marketAdminToken');
  document.getElementById('app').classList.remove('show');
  document.getElementById('loginGate').style.display = 'flex';
}
if (token) { document.getElementById('loginGate').style.display = 'none'; document.getElementById('app').classList.add('show'); init(); }

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  const map = {overview:'tabOverview',products:'tabProducts',verifications:'tabVerifications',categories:'tabCategories',reports:'tabReports',announcements:'tabAnnouncements',blocked:'tabBlocked',logs:'tabLogs'};
  document.getElementById(map[name]).style.display = '';
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === name));
  if (name === 'overview') loadOverview();
  else if (name === 'products') loadProds();
  else if (name === 'verifications') loadVers();
  else if (name === 'reports') loadReports();
  else if (name === 'categories') loadCats();
  else if (name === 'announcements') loadAnns();
  else if (name === 'blocked') loadBws();
  else if (name === 'promotions') loadPromos();
  else if (name === 'logs') loadLogs();
}
function refreshAll() { loadOverview(); }

// ====== OVERVIEW ======
async function loadOverview() {
  try {
    const r = await fetch('/api/marketplace/admin/stats');
    const d = await r.json();
    document.getElementById('statsContainer').innerHTML =
      '<div class="stat-card"><div class="num green">'+d.total+'</div><div class="label">总商品</div></div>'+
      '<div class="stat-card"><div class="num yellow">'+d.pending+'</div><div class="label">待审核</div></div>'+
      '<div class="stat-card"><div class="num green">'+d.approved+'</div><div class="label">已通过</div></div>'+
      '<div class="stat-card"><div class="num blue">'+d.listed+'</div><div class="label">已上架</div></div>'+
      '<div class="stat-card"><div class="num blue">'+d.verTotal+'</div><div class="label">认证总申请</div></div>'+
      '<div class="stat-card"><div class="num yellow">'+d.verPending+'</div><div class="label">待审核</div></div>'+
      '<div class="stat-card"><div class="num green">'+d.verApproved+'</div><div class="label">已通过</div></div>'+
      '<div class="stat-card"><div class="num red">'+(d.verTotal-d.verPending-d.verApproved)+'</div><div class="label">已拒绝</div></div>'+
      '<div class="stat-card"><div class="num red">'+d.reportsPending+'</div><div class="label">待处理举报</div></div>'+
      '<div class="stat-card"><div class="num green">'+d.announcements+'</div><div class="label">公告</div></div>';
    // Badges
    const pb = document.getElementById('prodBadge');
    if (d.pending > 0) { pb.textContent = d.pending; pb.style.display = 'inline'; } else pb.style.display = 'none';
    const rb = document.getElementById('reportBadge');
    if (d.reportsPending > 0) { rb.textContent = d.reportsPending; rb.style.display = 'inline'; } else rb.style.display = 'none';
    const vb = document.getElementById('verBadge');
    if (d.verPending > 0) { vb.textContent = d.verPending; vb.style.display = 'inline'; } else vb.style.display = 'none';
  } catch(e) {}
  // Recent
  try {
    const r = await fetch('/api/marketplace/products?admin=1&limit=5');
    const data = await r.json();
    const arr = Array.isArray(data) ? data : [];
    document.getElementById('recentList').innerHTML = !arr.length ? '<div class="empty">暂无商品</div>' :
      '<div style="display:grid;gap:4px">' + arr.slice(0,5).map(p =>
        '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:rgba(255,255,255,.02);border-radius:6px;font-size:11px">' +
        '<span>' + esc(p.title) + '</span>' +
        '<span style="display:flex;gap:6px;align-items:center"><span style="color:#34d399;font-weight:600">¥' + parseFloat(p.price).toFixed(0) + '</span>' +
        '<span class="badge ' + (p.status==='approved'?'badge-green':p.status==='rejected'?'badge-red':'badge-yellow') + '">' + (p.status||'pending') + '</span></span></div>'
      ).join('') + '</div>';
  } catch(e) {}
}

// ====== PRODUCTS ======
async function loadProds() {
  try {
    const r = await fetch('/api/marketplace/products?admin=1');
    let data = await r.json();
    const arr = Array.isArray(data) ? data : (data && Array.isArray(data.data) ? data.data : []);
    const search = document.getElementById('prodSearch').value.trim().toLowerCase();
    const sf = document.getElementById('prodStatusFilter').value;
    const cf = document.getElementById('prodCatFilter').value;
    let f = arr;
    if (search) f = f.filter(p => (p.title||'').toLowerCase().includes(search));
    if (sf) f = f.filter(p => p.status === sf);
    if (cf) f = f.filter(p => p.category === cf);
    const tbody = document.getElementById('prodTbody');
    if (!f.length) { tbody.innerHTML = '<tr><td colspan="10"><div class="empty">无匹配</div></td></tr>'; return; }
    tbody.innerHTML = f.map(p => {
      const sClass = p.status==='approved'?'badge-green':p.status==='rejected'?'badge-red':'badge-yellow';
      return '<tr><td style="color:rgba(255,255,255,.15)">'+p.id+'</td>'+
        '<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.title)+'</td>'+
        '<td style="color:#34d399;font-weight:600">¥'+parseFloat(p.price).toFixed(0)+'</td>'+
        '<td style="color:rgba(255,255,255,.2);font-size:10px">'+esc(p.category)+'</td>'+
        '<td><span class="badge '+sClass+'">'+(p.status||'pending')+'</span></td>'+
        '<td>'+ (p.listed!==false?'<span class="badge badge-green">上架</span>':'<span class="badge badge-gray">下架</span>') +'</td>'+
        '<td>'+ (p.sold?'<span class="badge badge-red">已售</span>':'<span class="badge badge-gray">在售</span>') +'</td>'+
        '<td style="color:rgba(255,255,255,.2);font-size:10px;max-width:80px;overflow:hidden;text-overflow:ellipsis">'+esc(p.contact||'-')+'</td>'+
        '<td style="color:rgba(255,255,255,.15);font-size:10px">'+fmtDate(p.created_at)+'</td>'+
        '<td style="text-align:center"><span style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center">'+
          (p.status==='pending'?'<button class="btn btn-green btn-sm" onclick="approveProd('+p.id+')">✅ 通过</button><button class="btn btn-red btn-sm" onclick="showReject('+p.id+')">✕ 拒绝</button>':'')+
          (p.status==='approved'?'<button class="btn btn-yellow btn-sm" onclick="toggleListed('+p.id+','+(p.listed!==false)+')">'+(p.listed!==false?'📌 下架':'📌 上架')+'</button>':'')+
          (p.pinned ? '<button class="btn btn-yellow btn-sm" onclick="togglePin('+p.id+',false)">📌 取消置顶</button>' : '<button class="btn btn-ghost btn-sm" onclick="togglePin('+p.id+',true)">📌 置顶</button>')+
          (p.status==='approved'&&!p.sold?'<button class="btn btn-yellow btn-sm" onclick="markSold('+p.id+')">✅ 已售</button>':'')+
          (p.sold?'<button class="btn btn-ghost btn-sm" onclick="markUnsold('+p.id+')">↩️ 恢复</button>':'')+
          '<button class="btn btn-ghost btn-sm" onclick="editProd('+p.id+')">✏️</button>'+
          '<button class="btn btn-red btn-sm" onclick="delProd('+p.id+',\''+esc(p.title)+'\')">🗑️</button>'+
        '</span></td></tr>';
    }).join('');
  } catch(e) { document.getElementById('prodTbody').innerHTML = '<tr><td colspan="10"><div class="empty">加载失败</div></td></tr>'; }
}

async function approveProd(id) {
  toast('✅ 已通过');
  await fetch('/api/marketplace/products/'+id, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'approved',listed:true,verified:true})});
  loadProds(); loadOverview();
}
function showReject(id) { rejectingProdId = id; document.getElementById('rejectProdModal').classList.add('show'); }
function closeRejectProd() { rejectingProdId = null; document.getElementById('rejectProdModal').classList.remove('show'); }
async function confirmReject() {
  const reason = document.getElementById('rejectReason').value;
  const detail = document.getElementById('rejectDetail').value.trim();
  await fetch('/api/marketplace/products/'+rejectingProdId, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'rejected',listed:false,reject_reason: reason + (detail?': '+detail:'')})});
  toast('已拒绝'); closeRejectProd(); loadProds(); loadOverview();
}
async function toggleListed(id, currently) {
  toast(currently?'已下架':'已上架');
  await fetch('/api/marketplace/products/'+id, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({listed:!currently})});
  loadProds(); loadOverview();
}
async function togglePin(id, pin) {
  await fetch('/api/marketplace/products/'+id, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({pinned:pin})});
  toast(pin?'✅ 已置顶':'已取消置顶'); loadProds();
}
async function markSold(id) {
  if (!confirm('确认标记为已售出？')) return;
  await fetch('/api/marketplace/products/'+id, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({sold:true,listed:false})});
  toast('✅ 已标记售出'); loadProds(); loadOverview();
}
async function markUnsold(id) {
  await fetch('/api/marketplace/products/'+id, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({sold:false,listed:true})});
  toast('已恢复在售'); loadProds(); loadOverview();
}
function editProd(id) {
  editingProdId = id;
  fetch('/api/marketplace/products/'+id).then(r=>r.json()).then(p=>{
    if(!p)return;
    document.getElementById('epTitle').value = p.title||'';
    document.getElementById('epPrice').value = p.price||'';
    document.getElementById('epContact').value = p.contact||'';
    document.getElementById('epQuality').value = p.quality||'';
    document.getElementById('epDesc').value = p.desc||'';
    const sel = document.getElementById('epCat');
    sel.innerHTML = cats.map(c => '<option value="'+esc(c.name)+'"'+(c.name===p.category?' selected':'')+'>'+esc(c.name)+'</option>').join('');
    document.getElementById('editProdModal').classList.add('show');
  }).catch(()=>toast('加载失败'));
}
function closeEditProd() { document.getElementById('editProdModal').classList.remove('show'); editingProdId = null; }
async function saveEditProd() {
  if (!editingProdId) return;
  await fetch('/api/marketplace/products/'+editingProdId, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    title: document.getElementById('epTitle').value.trim(),
    price: parseFloat(document.getElementById('epPrice').value)||0,
    category: document.getElementById('epCat').value||'其他',
    contact: document.getElementById('epContact').value.trim(),
    quality: document.getElementById('epQuality').value.trim(),
    desc: document.getElementById('epDesc').value.trim(),
  })});
  toast('✅ 已保存'); closeEditProd(); loadProds();
}
async function delProd(id, title) {
  if (!confirm('确认删除「'+title+'」？不可恢复。')) return;
  await fetch('/api/marketplace/products/'+id, {method:'DELETE'});
  toast('🗑️ 已删除'); loadProds(); loadOverview();
}

// ====== VERIFICATIONS ======
async function loadVers() {
  try {
    const r = await fetch('/api/verify/list');
    let data = await r.json();
    const arr = Array.isArray(data) ? data : [];
    const f = document.getElementById('verStatusFilter').value;
    const filtered = f ? arr.filter(v => v.status === f) : arr;
    document.getElementById('verTbody').innerHTML = !filtered.length ? '<tr><td colspan="8"><div class="empty">暂无</div></td></tr>' :
      filtered.map(v => '<tr><td style="color:rgba(255,255,255,.15)">'+v.id+'</td><td>'+esc(v.name)+'</td><td style="color:rgba(255,255,255,.3)">'+esc(v.student_id)+'</td><td style="color:rgba(255,255,255,.2)">'+esc(v.phone||'-')+'</td>'+
        '<td>'+(v.image?'<a href="#" onclick="showCard('+v.id+');return false" style="color:#34d399;font-size:10px">📷 查看</a>':'<span style="color:rgba(255,255,255,.15);font-size:10px">无</span>')+'</td>'+
        '<td><span class="badge '+(v.status==='approved'?'badge-green':v.status==='rejected'?'badge-red':'badge-yellow')+'">'+(v.status==='approved'?'已通过':v.status==='rejected'?'未通过':'待审核')+'</span></td>'+
        '<td style="color:rgba(255,255,255,.15);font-size:10px">'+fmtDate(v.created_at)+'</td>'+
        '<td style="text-align:center">'+(v.status==='pending'
          ? '<span style="display:flex;gap:3px;justify-content:center"><button class="btn btn-green btn-sm" onclick="approveVer('+v.id+')">✅ 通过</button><button class="btn btn-red btn-sm" onclick="rejectVer('+v.id+')">✕ 未通过</button><button class="btn btn-red btn-sm" onclick="delVer('+v.id+',\''+esc(v.name)+'\')">🗑️ 删除</button></span>'
          : '<span style="display:flex;gap:3px;justify-content:center"><button class="btn btn-red btn-sm" onclick="delVer('+v.id+',\''+esc(v.name)+'\')">🗑️ 删除</button></span>')+'</td></tr>').join('');
  } catch(e) {}
}
async function approveVer(id) {
  // Optimistic update - show immediately
  toast('✅ 已通过');
  // Update the button row instantly
  var rows = document.querySelectorAll('#verTbody tr');
  rows.forEach(function(row) {
    var cell = row.cells[0];
    if (cell && parseInt(cell.textContent) === id) {
      row.cells[5].innerHTML = '<span class="badge badge-green">已通过</span>';
      row.cells[7].innerHTML = '<span style="display:flex;gap:3px;justify-content:center"><button class="btn btn-red btn-sm" onclick="delVer('+id+',\'...\')">🗑️ 删除</button></span>';
    }
  });
  // Fetch in background
  await fetch('/api/verify/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,productIds:[]})});
  setTimeout(function() { loadVers(); loadOverview(); }, 500);
}
let rejectingVerId = null;
function rejectVer(id) { rejectingVerId = id; document.getElementById('rejectVerModal').classList.add('show'); }
function closeRejectVer() { rejectingVerId = null; document.getElementById('rejectVerModal').classList.remove('show'); }
async function confirmRejectVer() {
  if (!rejectingVerId) return;
  const reason = document.getElementById('rejectVerReason').value;
  const detail = document.getElementById('rejectVerDetail').value.trim();
  const fullReason = reason + (detail ? ' - '+detail : '');
  toast('✕ 未通过：'+fullReason);
  closeRejectVer();
  // Optimistic update
  var rows = document.querySelectorAll('#verTbody tr');
  rows.forEach(function(row) {
    var cell = row.cells[0];
    if (cell && parseInt(cell.textContent) === rejectingVerId) {
      row.cells[5].innerHTML = '<span class="badge badge-red">未通过</span>';
      row.cells[7].innerHTML = '<span style="display:flex;gap:3px;justify-content:center"><button class="btn btn-red btn-sm" onclick="delVer('+rejectingVerId+',\'...\')">🗑️ 删除</button></span>';
    }
  });
  await fetch('/api/verify/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:rejectingVerId,reason:fullReason})});
  setTimeout(function() { loadVers(); loadOverview(); }, 500);
}
async function delVer(id, name) {
  if (!confirm('删除「'+name+'」的认证？')) return;
  await fetch('/api/verify/'+id, {method:'DELETE'});
  toast('🗑️ 已删除'); loadVers(); loadOverview();
}

// Image Preview
async function showCard(id) {
  try {
    const r = await fetch('/api/verify/list');
    const data = await r.json();
    const arr = Array.isArray(data) ? data : [];
    const v = arr.find(x => x.id === id);
    if (v && v.image) {
      document.getElementById('imgPreviewContent').src = v.image;
      document.getElementById('imgPreviewModal').classList.add('show');
    } else {
      toast('暂无图片');
    }
  } catch(e) { toast('加载失败'); }
}
function closeImgPreview() {
  document.getElementById('imgPreviewModal').classList.remove('show');
  document.getElementById('imgPreviewContent').src = '';
}

// ====== CATEGORIES ======
async function loadCats() {
  try {
    const r = await fetch('/api/marketplace/categories');
    const data = await r.json();
    cats = Array.isArray(data) ? data : [];
    document.getElementById('catTbody').innerHTML = !cats.length ? '<tr><td colspan="5"><div class="empty">暂无分类</div></td></tr>' :
      cats.map(c => '<tr><td style="color:rgba(255,255,255,.15)">'+c.id+'</td><td>'+c.icon+'</td><td>'+esc(c.name)+'</td>'+
        '<td><input type="number" value="'+(c.sort_order||0)+'" style="width:50px;padding:3px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:11px;outline:none" onchange="updateCatSort('+c.id+',this.value)"></td>'+
        '<td style="text-align:center"><span style="display:flex;gap:3px;justify-content:center">'+
        '<button class="btn btn-ghost btn-sm" onclick="editCat('+c.id+',\''+esc(c.name)+'\',\''+esc(c.icon)+'\')">✏️</button>'+
        '<button class="btn btn-red btn-sm" onclick="delCat('+c.id+',\''+esc(c.name)+'\')">🗑️</button></span></td></tr>').join('');
    // Populate product filter
    document.getElementById('prodCatFilter').innerHTML = '<option value="">全部分类</option>' + cats.map(c => '<option value="'+esc(c.name)+'">'+esc(c.name)+'</option>').join('');
  } catch(e) {}
}
async function addCat() {
  const name = document.getElementById('catName').value.trim();
  const icon = document.getElementById('catIcon').value.trim() || '📦';
  if (!name) { toast('输入分类名称'); return; }
  await fetch('/api/marketplace/categories', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,icon})});
  document.getElementById('catName').value = ''; document.getElementById('catIcon').value = '';
  toast('✅ 已添加'); loadCats(); loadOverview();
}
function editCat(id, name, icon) {
  const n = prompt('分类名称：', name); if (!n) return;
  const i = prompt('图标 (emoji)：', icon) || '📦';
  fetch('/api/marketplace/categories/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,icon:i})}).then(()=>{toast('✅ 已更新');loadCats();});
}
async function updateCatSort(id, sort) {
  await fetch('/api/marketplace/categories/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({sort_order:parseInt(sort)||0})});
}
async function delCat(id, name) {
  if (!confirm('删除分类「'+name+'」？')) return;
  await fetch('/api/marketplace/categories/'+id,{method:'DELETE'});
  toast('🗑️ 已删除'); loadCats();
}

// ====== REPORTS ======
async function loadReports() {
  try {
    const r = await fetch('/api/marketplace/reports');
    let data = await r.json();
    const arr = Array.isArray(data) ? data : [];
    const f = document.getElementById('reportStatusFilter').value;
    const filtered = f ? arr.filter(r => r.status === f) : arr;
    document.getElementById('reportTbody').innerHTML = !filtered.length ? '<tr><td colspan="8"><div class="empty">暂无</div></td></tr>' :
      filtered.map(r => '<tr><td style="color:rgba(255,255,255,.15)">'+r.id+'</td><td style="max-width:100px;overflow:hidden;text-overflow:ellipsis">'+esc(r.product_title||'#'+r.product_id)+'</td>'+
        '<td style="color:#fbbf24">'+esc(r.reason)+'</td><td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;color:rgba(255,255,255,.2)">'+esc(r.detail||'-')+'</td>'+
        '<td style="color:rgba(255,255,255,.2);font-size:10px">'+esc(r.reporter_contact||'-')+'</td>'+
        '<td><span class="badge '+(r.status==='resolved'?'badge-green':r.status==='dismissed'?'badge-red':'badge-yellow')+'">'+(r.status||'pending')+'</span></td>'+
        '<td style="font-size:10px;color:rgba(255,255,255,.15)">'+fmtDate(r.created_at)+'</td>'+
        '<td style="text-align:center">'+(r.status==='pending'
          ? '<span style="display:flex;gap:3px;justify-content:center"><button class="btn btn-green btn-sm" onclick="resolveReport('+r.id+',\'resolved\')">✅ 处理</button><button class="btn btn-red btn-sm" onclick="resolveReport('+r.id+',\'dismissed\')">✕ 驳回</button></span>'
          : '<span style="color:rgba(255,255,255,.15);font-size:10px">—</span>')+'</td></tr>').join('');
  } catch(e) {}
}
async function resolveReport(id, action) {
  await fetch('/api/marketplace/reports/resolve', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,action})});
  toast(action==='resolved'?'✅ 已处理':'已驳回'); loadReports(); loadOverview();
}

// ====== ANNOUNCEMENTS ======

// ====== Promotions ======
async function loadPromos() {
  try {
    const r = await fetch('/api/marketplace/promotions?all=1');
    const data = await r.json();
    const arr = Array.isArray(data) ? data : [];
    document.getElementById('promoTbody').innerHTML = !arr.length ? '<tr><td colspan="7"><div class="empty">暂无</div></td></tr>' :
      arr.map(p => '<tr><td style="color:rgba(255,255,255,.15)">'+p.id+'</td><td>'+esc(p.title)+'</td><td style="color:rgba(255,255,255,.2);max-width:120px;overflow:hidden;text-overflow:ellipsis">'+esc(p.desc||'-')+'</td><td style="color:rgba(255,255,255,.2)">'+esc(p.contact||'-')+'</td>'+

        '<button class="btn btn-ghost btn-sm" onclick="togglePromo('+p.id+','+p.active+')">'+(p.active?'🔕':'🔔')+'</button>'+
        '<button class="btn btn-red btn-sm" onclick="delPromo('+p.id+',\''+esc(p.title)+'\')">🗑️</button></span></td></tr>').join('');
  } catch(e) {}
}
async function addPromo() {
  const title = document.getElementById('promoTitle').value.trim();
  if (!title) { toast('输入标题'); return; }
  await fetch('/api/marketplace/promotions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,desc:document.getElementById('promoDesc').value.trim(),contact:document.getElementById('promoContact').value.trim()})});
  document.getElementById('promoTitle').value='';document.getElementById('promoDesc').value='';document.getElementById('promoContact').value='';
  toast('✅ 已添加'); loadPromos();
}
async function editPromo(id) {
  var title = prompt('标题：', '');
  if (!title) return;
  var desc = prompt('描述：', '');
  var contact = prompt('联系方式：', '');
  await fetch('/api/marketplace/promotions/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,desc:desc||'',contact:contact||''})});
  toast('✅ 已更新'); loadPromos();
}
async function togglePromo(id, active) {
  await fetch('/api/marketplace/promotions/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({active:!active})});
  toast(active?'已隐藏':'已显示'); loadPromos();
}
async function updatePromoSort(id, sort) {
  await fetch('/api/marketplace/promotions/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({sort_order:parseInt(sort)||0})});
}
async function delPromo(id, title) {
  if (!confirm('删除「'+title+'」？')) return;
  await fetch('/api/marketplace/promotions/'+id,{method:'DELETE'});
  toast('🗑️ 已删除'); loadPromos();
}

  } catch(e) {}

// ====== UTILS ======
function esc(s) { if (!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function fmtDate(t) { if (!t) return '-'; const d=new Date(t); return (d.getMonth()+1)+'月'+d.getDate()+'日'; }
function fmtDateTime(t) { if (!t) return '-'; const d=new Date(t); return (d.getMonth()+1)+'月'+d.getDate()+'日 '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

function init() {
  loadOverview();
  loadCats();
  connectAdminWS();
}

// WebSocket for instant updates
function connectAdminWS() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var ws = new WebSocket(proto + '//' + location.host);
  ws.onopen = function() { ws.send(JSON.stringify({type:'admin_auth',token:'x130977889'})); };
  ws.onmessage = function(e) {
    try {
      var d = JSON.parse(e.data);
      if (d.type === 'admin_new_verification' || d.type === 'admin_new_product') {
        loadOverview();
        loadProds();
        loadVers();
        loadReports();
        toast('🔔 有新' + (d.type === 'admin_new_verification' ? '认证申请' : '商品') + '，已刷新');
      }
    } catch(e) {}
  };
  ws.onclose = function() { setTimeout(connectAdminWS, 5000); };
}
