<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>仪表盘</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    background:#0a1a0f;color:#c8e6c9;min-height:100vh;display:flex;
    align-items:center;justify-content:center;padding:20px;
    background-image:radial-gradient(ellipse at 10% 20%,rgba(22,120,50,.04) 0%,transparent 50%);
  }
  .panel{
    width:320px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);
    border-radius:20px;padding:24px;backdrop-filter:blur(16px);
    background-image:radial-gradient(ellipse at 50% 0%,rgba(52,211,153,.03) 0%,transparent 60%);
  }
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .header h2{font-size:16px;font-weight:600}
  .header h2 span{background:linear-gradient(135deg,#6ee7b7,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header .time{font-size:13px;color:rgba(255,255,255,.25);font-variant-numeric:tabular-nums}

  .sec{font-size:10px;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

  .links{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
  .link{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;text-decoration:none;color:rgba(255,255,255,.4);font-size:13px;transition:all .15s}
  .link:hover{background:rgba(52,211,153,.04);color:rgba(255,255,255,.6)}
  .link svg{width:18px;height:18px;flex-shrink:0}
  .link .tag{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.15)}

  .sr{display:flex;gap:8px;margin-bottom:14px}
  .st{flex:1;background:rgba(255,255,255,.02);border-radius:10px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,.03)}
  .st .n{font-size:18px;font-weight:700;line-height:1.2}
  .st .l{font-size:10px;color:rgba(255,255,255,.2);margin-top:2px}

  .svr{display:flex;gap:8px}
  .sv{flex:1;text-align:center;padding:6px;background:rgba(255,255,255,.02);border-radius:8px}
  .sv .v{font-size:14px;font-weight:600}
  .sv .l{font-size:10px;color:rgba(255,255,255,.15);margin-top:2px}

  .bb{height:3px;background:rgba(255,255,255,.04);border-radius:3px;margin:6px 0;overflow:hidden}
  .bf{height:100%;border-radius:3px;background:linear-gradient(90deg,#059669,#34d399);transition:width .8s;width:0%}
  .qt{font-size:10px;color:rgba(255,255,255,.1);margin-bottom:14px;text-align:right}
</style>
</head>
<body>
<div class="panel">
  <div class="header">
    <h2>🌲 <span>仪表盘</span></h2>
    <div class="time" id="clock">--:--</div>
  </div>

  <div class="sec">快速入口</div>
  <div class="links">
    <a href="/chat.html" class="link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M9 13.5c0 1.5 1.3 2.5 3 2.5s3-1 3-2.5" stroke-linecap="round"/></svg>
      林间小语 <span class="tag">AI</span>
    </a>
    <a href="/expense.html" class="link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M8 10h6a2 2 0 1 0 0-4H8" stroke-linecap="round"/></svg>
      记账本 <span class="tag">钱</span>
    </a>
    <a href="/market.html" class="link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0" stroke-linecap="round"/></svg>
      校园严选 <span class="tag">二手</span>
    </a>
    <a href="/wallpaper.html" class="link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      林间壁纸 <span class="tag">桌面</span>
    </a>
  </div>

  <div class="sec">AI 用量</div>
  <div class="sr">
    <div class="st"><div class="n" style="color:#34d399" id="aiToday">--</div><div class="l">今日</div></div>
    <div class="st"><div class="n" style="color:#6ee7b7" id="aiTokens">--</div><div class="l">Tokens</div></div>
    <div class="st"><div class="n" style="color:#fbbf24" id="aiMonth">--</div><div class="l">本月</div></div>
  </div>
  <div class="bb"><div class="bf" id="aiBar"></div></div>
  <div class="qt" id="aiQuota">--</div>

  <div class="sec">服务器</div>
  <div class="svr">
    <div class="sv"><div class="v" style="color:#34d399" id="svStatus">●</div><div class="l">状态</div></div>
    <div class="sv"><div class="v" id="svUptime">--</div><div class="l">运行</div></div>
    <div class="sv"><div class="v" id="svRAM">--</div><div class="l">内存</div></div>
  </div>
</div>

<script>
setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})},1000);

(async function(){
  try{
    const r=await fetch('/api/dashboard');if(!r.ok)throw Error();
    const d=await r.json();
    document.getElementById('svUptime').textContent=d.server.uptime;
    document.getElementById('svRAM').textContent=d.server.ram;
    document.getElementById('aiToday').textContent=d.ai.today;
    document.getElementById('aiTokens').textContent=(d.ai.tokens||0).toLocaleString();
    document.getElementById('aiMonth').textContent=(d.ai.month||0).toLocaleString();
    const p=Math.min(100,(d.ai.tokens||0)/5000000*100);
    document.getElementById('aiBar').style.width=p+'%';
    document.getElementById('aiQuota').textContent=((d.ai.tokens||0)/1000000).toFixed(1)+'M / 5M';
  }catch(e){document.getElementById('svStatus').style.color='rgba(255,255,255,.15)'}
})();
</script>
</body>
</html>
