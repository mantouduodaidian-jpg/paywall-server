<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>校园墙 - 二豆豆</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,'Microsoft YaHei',sans-serif;background:#f7f3ea;color:#4a4a4a;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border-bottom:1px solid rgba(0,0,0,.04);position:sticky;top:0;z-index:10}
.header h1{font-size:18px;color:#4e9e80;font-weight:800}
.header .sub{font-size:11px;color:rgba(0,0,0,.2)}
.header a{color:#4e9e80;text-decoration:none;font-size:13px;font-weight:600;padding:6px 12px;border-radius:8px;background:rgba(78,158,128,.08)}
.tabs{display:flex;gap:0;background:#fff;border-bottom:1px solid rgba(0,0,0,.04);padding:0 12px;position:sticky;top:53px;z-index:9}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:rgba(0,0,0,.25);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:#4e9e80;border-bottom-color:#4e9e80;font-weight:600}
.list{padding:12px;max-width:640px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid rgba(0,0,0,.04);box-shadow:0 1px 4px rgba(0,0,0,.02)}
.card .title{font-size:15px;font-weight:600;color:#333;margin-bottom:4px}
.card .meta{display:flex;gap:6px;margin-bottom:6px;font-size:11px;color:rgba(0,0,0,.2);align-items:center}
.card .meta .type-tag{padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600}
.card .meta .type-tag.post{background:rgba(78,158,128,.08);color:#4e9e80}
.card .meta .type-tag.promo{background:rgba(251,191,36,.1);color:#d4a030}
.card .content{font-size:13px;line-height:1.7;color:rgba(0,0,0,.45);margin-bottom:8px;white-space:pre-wrap}
.card .imgs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.card .imgs img{width:80px;height:80px;border-radius:8px;object-fit:cover;flex-shrink:0;background:rgba(0,0,0,.03);cursor:pointer}
.card .footer{display:flex;justify-content:space-between;font-size:10px;color:rgba(0,0,0,.15)}
.empty{text-align:center;padding:80px 20px;color:rgba(0,0,0,.12);font-size:14px}
.empty .big{font-size:48px;margin-bottom:12px;display:block}

/* Post modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;overflow-y:auto;padding:20px}
.modal-overlay.show{display:block}
.modal-box{background:#fff;border-radius:16px;max-width:500px;margin:60px auto;padding:24px}
.modal-box h2{font-size:16px;color:#333;margin-bottom:16px}
.modal-box .field{margin-bottom:12px}
.modal-box .field .label{display:block;font-size:12px;color:rgba(0,0,0,.4);margin-bottom:4px;font-weight:500}
.modal-box .field input,.modal-box .field textarea,.modal-box .field select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(0,0,0,.06);background:#f5f2eb;font-size:14px;color:#333;outline:none;font-family:inherit}
.modal-box .field textarea{min-height:100px;resize:vertical}
.modal-box .type-bar{display:flex;gap:8px;margin-bottom:12px}
.modal-box .type-bar .type{flex:1;padding:8px;border-radius:8px;text-align:center;font-size:13px;font-weight:500;background:rgba(0,0,0,.03);color:rgba(0,0,0,.25);cursor:pointer}
.modal-box .type-bar .type.active{background:rgba(78,158,128,.08);color:#4e9e80;font-weight:600}
.modal-box .btn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#4e9e80,#3d8a6e);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-box .btn-cancel{background:rgba(0,0,0,.04);color:rgba(0,0,0,.3);margin-top:6px}

/* Image preview */
.img-preview{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.img-preview .item{position:relative;width:64px;height:64px}
.img-preview .item img{width:64px;height:64px;border-radius:6px;object-fit:cover}
.img-preview .item .del{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.4);color:#fff;font-size:10px;text-align:center;line-height:18px;cursor:pointer}
.img-add{width:64px;height:64px;border-radius:8px;border:1.5px dashed rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2px}
.img-add .plus{font-size:20px;color:rgba(0,0,0,.12)}
.img-add .tip{font-size:9px;color:rgba(0,0,0,.1)}

/* Image modal */
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:60;display:none;align-items:center;justify-content:center}
.img-modal.show{display:flex}
.img-modal img{max-width:90%;max-height:85vh;border-radius:8px}
.img-modal .close{position:absolute;top:20px;right:20px;font-size:28px;color:#fff;cursor:pointer;background:rgba(0,0,0,.3);width:40px;height:40px;border-radius:50%;text-align:center;line-height:40px}

/* Float button */
.float-btn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#4e9e80,#3d8a6e);color:#fff;font-size:24px;border:none;box-shadow:0 4px 16px rgba(78,158,128,.3);cursor:pointer;z-index:20;transition:transform .15s}
.float-btn:active{transform:scale(.9)}
</style>
</head>
<body>

<div class="header">
  <div><h1>📢 校园墙</h1><div class="sub">分享 · 发现 · 校园生活</div></div>
  <a href="/market.html">← 回集市</a>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" onclick="switchTab('')">全部</div>
  <div class="tab" onclick="switchTab('post')">帖子</div>
  <div class="tab" onclick="switchTab('promotion')">推广</div>
</div>

<div class="list" id="postList"><div class="empty"><span class="big">📭</span>加载中...</div></div>

<button class="float-btn" onclick="showPostModal()">✏️</button>

<!-- Post form modal -->
<div class="modal-overlay" id="postModal" onclick="if(event.target===this)hidePostModal()">
  <div class="modal-box">
    <h2>📝 发布内容</h2>
    <div class="type-bar">
      <div class="type active" data-type="post" onclick="pickPostType(this)">📄 帖子</div>
      <div class="type" data-type="promotion" onclick="pickPostType(this)">🎁 推广</div>
    </div>
    <div class="field">
      <div class="label">标题 *</div>
      <input id="postTitle" placeholder="给你的内容起个标题" maxlength="50">
    </div>
    <div class="field">
      <div class="label">内容 *</div>
      <textarea id="postContent" placeholder="写点什么..." maxlength="1000"></textarea>
    </div>
    <div class="field">
      <div class="label">图片（选填，最多4张）</div>
      <div class="img-preview" id="postImgsPreview"></div>
      <div class="img-add" onclick="pickPostImgs()"><span class="plus">+</span><span class="tip">添加图片</span></div>
    </div>
    <button class="btn" onclick="submitPost()">📤 发布</button>
    <button class="btn btn-cancel" onclick="hidePostModal()">取消</button>
  </div>
</div>

<!-- Image viewer -->
<div class="img-modal" id="imgViewer" onclick="this.classList.remove('show')">
  <span class="close" onclick="document.getElementById('imgViewer').classList.remove('show')">✕</span>
  <img id="imgViewerContent">
</div>

<script>
const API = 'https://paywall-server.onrender.com';
var _curTab = '';
var _postImgs = [];
var _postType = 'post';

function switchTab(t) {
  _curTab = t;
  document.querySelectorAll('.tabs .tab').forEach(function(el, i) {
    el.classList.toggle('active', (i===0 && !t) || el.textContent.includes(t==='post'?'帖子':'推广'));
  });
  loadPosts();
}

function loadPosts() {
  var url = API + '/api/wall/posts?';
  if (_curTab) url += 'type=' + _curTab + '&';
  fetch(url).then(function(r){return r.json();}).then(function(data){
    var arr = Array.isArray(data) ? data : [];
    var el = document.getElementById('postList');
    if (!arr.length) { el.innerHTML = '<div class=\"empty\"><span class=\"big\">📭</span>还没有内容，快来发第一条吧！</div>'; return; }
    el.innerHTML = arr.map(function(p) {
      var imgs = '';
      if (p.images && p.images.length) {
        imgs = '<div class=\"imgs\">' + p.images.map(function(img){ return '<img src=\"'+esc(img)+'\" onclick=\"viewImg(\\''+esc(img)+'\\')\">'; }).join('') + '</div>';
      }
      return '<div class=\"card\">' +
        '<div class=\"meta\"><span class=\"type-tag '+(p.type==='promotion'?'promo':'post')+'\">'+(p.type==='promotion'?'🎁 推广':'📄 帖子')+'</span><span>'+esc(p.author_name||'匿名')+'</span></div>' +
        (p.title?'<div class=\"title\">'+esc(p.title)+'</div>':'') +
        (p.content?'<div class=\"content\">'+esc(p.content)+'</div>':'') +
        imgs +
        '<div class=\"footer\"><span>'+(p.school?schoolName(p.school):'')+'</span><span>'+fmtDate(p.created_at)+'</span></div>' +
      '</div>';
    }).join('');
  }).catch(function(){ document.getElementById('postList').innerHTML = '<div class=\"empty\"><span class=\"big\">😵</span>加载失败，请刷新重试</div>'; });
}

function showPostModal() {
  document.getElementById('postModal').classList.add('show');
  document.getElementById('postTitle').value = '';
  document.getElementById('postContent').value = '';
  _postImgs = [];
  _postType = 'post';
  renderPostImgs();
  document.querySelectorAll('.type-bar .type').forEach(function(el) {
    el.classList.toggle('active', el.dataset.type === 'post');
  });
}
function hidePostModal() { document.getElementById('postModal').classList.remove('show'); }

function pickPostType(el) {
  document.querySelectorAll('.type-bar .type').forEach(function(e){ e.classList.remove('active'); });
  el.classList.add('active');
  _postType = el.dataset.type;
}

function pickPostImgs() {
  if (_postImgs.length >= 4) return alert('最多4张图片');
  var input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*'; input.multiple = true;
  input.onchange = function() {
    var remaining = 4 - _postImgs.length;
    var files = Array.from(input.files || []).slice(0, remaining);
    files.forEach(function(f) {
      var reader = new FileReader();
      reader.onload = function(e) {
        _postImgs.push(e.target.result);
        renderPostImgs();
      };
      reader.readAsDataURL(f);
    });
  };
  input.click();
}
function delPostImg(i) { _postImgs.splice(i,1); renderPostImgs(); }
function renderPostImgs() {
  var el = document.getElementById('postImgsPreview');
  el.innerHTML = _postImgs.map(function(img,i){ return '<div class=\"item\"><img src=\"'+img+'\"><span class=\"del\" onclick=\"delPostImg('+i+')\">✕</span></div>'; }).join('');
}

function submitPost() {
  var title = document.getElementById('postTitle').value.trim();
  var content = document.getElementById('postContent').value.trim();
  if (!title && !content) return alert('请填写标题或内容');
  var user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user) return alert('请先在集市登录后再发布');
  fetch(API + '/api/wall/posts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      title: title,
      content: content,
      images: _postImgs,
      type: _postType,
      author_name: user.nickname || user.name || user.student_id || '匿名',
      author_student_id: user.student_id || '',
      school: user.school || ''
    })
  }).then(function(r){return r.json();}).then(function(d) {
    if (d.id || d.ok) {
      alert('✅ 发布成功，等待管理员审核');
      hidePostModal();
      loadPosts();
    } else { alert(d.error || '发布失败'); }
  }).catch(function(){ alert('网络错误'); });
}

function viewImg(src) {
  document.getElementById('imgViewerContent').src = src;
  document.getElementById('imgViewer').classList.add('show');
}

function esc(s) { if (!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function fmtDate(t) { if (!t) return ''; var d=new Date(t); return (d.getMonth()+1)+'月'+d.getDate()+'日'; }
var SCHOOLS = [{code:'gxny',name:'广西农业职业技术大学'},{code:'hnkj',name:'海南科技职业大学'},{code:'gdcj',name:'广东财经大学'},{code:'lztd',name:'柳州铁道职业技术学院'}];
function schoolName(code) { if (!code) return ''; var s=SCHOOLS.find(function(x){return x.code===code;}); return s?s.name:code; }

loadPosts();
</script>
</body>
</html>
