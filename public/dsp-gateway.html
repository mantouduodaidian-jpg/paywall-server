    <div class="pay-note">长按保存 → 微信/支付宝扫码</div>
  </div>
  <input type="password" id="pwdInput" placeholder="输入8位密码" maxlength="8" onkeydown="if(event.key==='Enter')unlock()">
  <button class="btn" id="unlockBtn" onclick="unlock()">🔓 解锁</button>
  <div class="error" id="error"></div>
</div>
<script>
async function unlock() {
  const code = document.getElementById('pwdInput').value.trim().toUpperCase();
  const err = document.getElementById('error');
  const btn = document.getElementById('unlockBtn');
  if (!code) { err.textContent = '❌ 请输入密码'; return; }
  btn.textContent = '⏳ 验证中...'; btn.disabled = true;
  err.textContent = '';
  try {
    const r = await fetch('https://paywall-server.onrender.com/api/verify', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code})
    });
    const d = await r.json();
    if (d.ok) {
      if (d.token) try { localStorage.setItem('dsp_quiz_token', d.token); } catch(e) {}
      window.location.href = 'dsp.html';
    } else {
      err.textContent = '❌ ' + (d.msg || '密码错误');
      document.getElementById('pwdInput').value = '';
    }
  } catch(e) { err.textContent = '❌ 验证失败'; }
  btn.textContent = '🔓 解锁'; btn.disabled = false;
}
(function() {
  var t = localStorage.getItem('dsp_quiz_token');
  if (t) {
    fetch('https://paywall-server.onrender.com/api/verify-session', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:t})
    }).then(r=>r.json()).then(d => {
      if (d.ok) window.location.href = 'dsp.html';
      else localStorage.removeItem('dsp_quiz_token');
    });
  }
})();
</script>
