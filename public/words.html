<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a1a0f;color:#c8e6c9;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .card{width:340px;min-height:280px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:24px;padding:32px 24px;text-align:center;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
  .card:hover{border-color:rgba(52,211,153,.12)}
  .card .word{font-size:32px;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:16px;transition:all .3s}
  .card .def{font-size:16px;color:rgba(255,255,255,.35);line-height:1.7;display:none;max-width:90%}
  .card .def.show{display:block}
  .card .hint{font-size:12px;color:rgba(255,255,255,.1);margin-top:auto;padding-top:20px}

  .btns{display:flex;gap:12px;margin-top:20px}
  .btns button{width:100px;padding:12px;border-radius:14px;border:none;font-size:14px;cursor:pointer;font-weight:600;transition:all .15s;font-family:inherit}
  .btns button:active{transform:scale(.95)}
  .btns .know{background:rgba(52,211,153,.12);color:#34d399}
  .btns .know:hover{background:rgba(52,211,153,.2)}
  .btns .dont{background:rgba(239,68,68,.1);color:#f87171}
  .btns .dont:hover{background:rgba(239,68,68,.18)}

  .stats{display:flex;gap:16px;margin-bottom:24px;font-size:13px;color:rgba(255,255,255,.15)}
  .stats span{display:flex;align-items:center;gap:4px}

  .prog{width:340px;height:3px;background:rgba(255,255,255,.04);border-radius:3px;margin-bottom:24px;overflow:hidden}
  .prog .f{height:100%;border-radius:3px;background:linear-gradient(90deg,#059669,#34d399);transition:width .4s;width:0%}

  .done{text-align:center;padding:40px}
  .done h2{font-size:24px;color:rgba(255,255,255,.2);margin-bottom:8px}
  .done p{font-size:14px;color:rgba(255,255,255,.08)}
  .done button{margin-top:20px;padding:10px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,#059669,#34d399);color:#fff;font-size:14px;cursor:pointer;font-weight:600}
</style>

// Load progress
let progress = JSON.parse(localStorage.getItem('word_progress')||'{}');
let idx = 0;
let flipped = false;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
let words = shuffle([...WORDS]);

function save(){localStorage.setItem('word_progress',JSON.stringify(progress))}
function render(){
  if(idx >= words.length){
    document.getElementById('cardArea').innerHTML='<div class="done"><h2>🎉 本轮完成！</h2><p>学习了 '+words.length+' 个单词</p><button onclick="restart()">再来一轮</button></div>';
    return;
  }
  const w = words[idx];
  const known = Object.values(progress).filter(v=>v===true).length;
  const unknown = Object.values(progress).filter(v=>v===false).length;
  document.getElementById('totalWords').textContent = words.length;
  document.getElementById('knownCount').textContent = known;
  document.getElementById('unknownCount').textContent = unknown;
  document.getElementById('progBar').style.width = (idx/words.length*100)+'%';
  document.getElementById('cardArea').innerHTML =
    '<div class="card" onclick="flipCard()">'+
    '<div class="word">' + w.w + '</div>'+
    '<div class="def" id="def">' + w.d + '</div>'+
    '<div class="hint">点击翻转查看释义</div></div>'+
    '<div class="btns">'+
    '<button class="dont" onclick="rate(false)">✗ 不认识</button>'+
    '<button class="know" onclick="rate(true)">✓ 认识</button></div>';
  flipped = false;
  document.getElementById('def').classList.remove('show');
}
function flipCard(){flipped=!flipped;document.getElementById('def').classList.toggle('show',flipped)}
function rate(k){progress[words[idx].w]=k;save();idx++;render();}
function restart(){progress={};idx=0;words=shuffle([...WORDS]);save();render();}
render();
