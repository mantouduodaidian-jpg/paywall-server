  .card .eg.show{display:block}
  .card .hint{font-size:11px;color:rgba(255,255,255,.06);margin-top:auto;padding-top:20px}
  .card.slide-left{transform:translateX(-120%) rotate(-8deg);opacity:0}
  .card.slide-right{transform:translateX(120%) rotate(8deg);opacity:0}

  .btns button{flex:1;padding:14px;border-radius:14px;border:none;font-size:14px;cursor:pointer;font-weight:600;transition:all .15s;font-family:inherit}

  .btns .dont:hover{background:rgba(239,68,68,.14)}

// SM-2 algorithm
let data = JSON.parse(localStorage.getItem('sm2_data')||'{}');
let mode = 'all'; // all | new | review
let queue = [];
let idx = 0;
let cardEl = null;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function qWords(){
  let w = [...WORDS];
  if(mode==='new') w = w.filter(w => !data[w.w]);
  if(mode==='review') w = w.filter(w => data[w.w] && (data[w.w].next||0) <= Date.now());
  return w;
}

function buildQueue(){queue = shuffle(qWords());idx=0;}

function getStatus(w){
  if(!data[w]) return 'new';
  const d = data[w];
  if(d.interval >= 21) return 'done';
  return 'learning';
}

function render(){
  buildQueue();
  updateStats();
  if(!queue.length){
    document.getElementById('cardArea').innerHTML='<div class="done"><h2>🎉</h2><p>'+(mode==='review'?'暂无待复习单词':'词库已全部掌握')+'</p><button onclick="switchMode(\'all\')">全部模式</button><button class="sec" onclick="switchMode(\'review\')">复习</button></div>';
    document.getElementById('btnArea').innerHTML='';
    return;
  }
  if(idx >= queue.length){idx=0;shuffle(queue);}
  const w = queue[idx];
  const s = getStatus(w.w);
  const total = WORDS.length;
  const newC = WORDS.filter(x=>!data[x.w]).length;
  const learnC = WORDS.filter(x=>data[x.w] && data[x.w].interval < 21).length;
  const doneC = WORDS.filter(x=>data[x.w] && data[x.w].interval >= 21).length;
  document.getElementById('progBar').style.width = ((total-newC)/total*100)+'%';
  const defShow = s==='done'?'show':'';
  const egShow = s==='done'?'show':'';
  document.getElementById('cardArea').innerHTML =
    '<div class="card" id="mainCard" onclick="flip()"><div class="word">'+w.w+'</div><div class="phonetic">'+w.p+'</div>'+
    '<div class="def show" id="def">'+w.d+'</div><div class="eg show" id="eg">'+w.e+'</div></div>';
  document.getElementById('btnArea').innerHTML =
    '<button class="dont" onclick="rate(0)">✗ 不认识</button>'+
    '<button class="hard" onclick="rate(1)">⚠ 模糊</button>'+
    '<button class="good" onclick="rate(2)">✓ 记得</button>'+
    '<button class="easy" onclick="rate(3)">★ 简单</button>';
  document.getElementById('mainCard').onclick=flip;
}

function flip(){
  document.getElementById('def').classList.toggle('show');
  document.getElementById('eg').classList.toggle('show');
}

function rate(q){
  const w = queue[idx];
  if(!data[w.w]) data[w.w] = {interval:0,reps:0,ef:2.5,next:0,last:0};
  const d = data[w.w];
  if(q < 2){ // fail
    d.interval = 1;
    d.reps = 0;
  } else {
    if(d.reps === 0) d.interval = 1;
    else if(d.reps === 1) d.interval = 6;
    else d.interval = Math.round(d.interval * d.ef);
    d.reps++;
  }
  d.ef = Math.max(1.3, d.ef + (0.1 - (2-q)*(0.08 + (2-q)*0.02)));
  d.next = Date.now() + d.interval * 86400000;
  d.last = Date.now();
  localStorage.setItem('sm2_data',JSON.stringify(data));

  // Animate
  const c = document.getElementById('mainCard');
  if(c){
    c.classList.add(q>=2?'slide-right':'slide-left');
    setTimeout(()=>{idx++;render();},250);
  } else {idx++;render();}
}

function updateStats(){
  const newC = WORDS.filter(x=>!data[x.w]).length;
  const learnC = WORDS.filter(x=>data[x.w] && data[x.w].interval < 21).length;
  const doneC = WORDS.filter(x=>data[x.w] && data[x.w].interval >= 21).length;
  document.getElementById('sTotal').textContent = WORDS.length;
  document.getElementById('sNew').textContent = newC;
  document.getElementById('sLearn').textContent = learnC;
  document.getElementById('sDone').textContent = doneC;
}

function switchMode(m){mode=m;buildQueue();render();document.getElementById('modeBtn').textContent={all:'全部',new:'新词',review:'复习'}[m];}
function toggleMode(){const modes=['all','new','review'];const i=modes.indexOf(mode);switchMode(modes[(i+1)%3]);}

render();
</script>
