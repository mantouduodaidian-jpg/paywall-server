<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数字信号处理 — 交互式复习</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    background: #f5f0ff;
    min-height: 100vh; overflow-y: scroll;
    color: #1a1a2e;
    background-image:
      radial-gradient(ellipse at 15% 20%, rgba(124,58,237,.08) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 80%, rgba(99,102,241,.08) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(168,85,247,.04) 0%, transparent 70%);
    background-attachment: fixed;
  }

  .container { max-width: 800px; margin: 0 auto; padding: 16px; }
  @media (min-width: 640px) { .container { padding: 24px; } }

  /* ===== TYPOGRAPHY ===== */
  .site-title {
    font-size: clamp(22px, 4.5vw, 30px); font-weight: 800;
    color: #2d1b69; text-align: center; letter-spacing: -.3px;
    margin-bottom: 2px; line-height: 1.3;
  }
  .site-sub {
    text-align: center; color: #8b7aab; font-size: clamp(13px, 2.5vw, 15px);
    margin-bottom: 6px; font-weight: 400;
  }

  /* ===== HEADER CARD ===== */
  .meta-card {
    background: rgba(255,255,255,.7); backdrop-filter: blur(16px) saturate(1.3);
    border: 1px solid rgba(124,58,237,.12);
    border-radius: 16px; padding: 12px 16px; margin-bottom: 16px;
    display: flex; justify-content: center; gap: 12px 20px; flex-wrap: wrap;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .meta-card span {
    font-size: clamp(11px, 2vw, 13px); color: #5a4a7a;
    display: inline-flex; align-items: center; gap: 4px;
  }

  /* ===== BUTTON GROUP ===== */
  .btn-group {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px;
  }
  .btn-group .btn {
    padding: 7px 16px; border-radius: 100px; border: 1.5px solid rgba(124,58,237,.15);
    background: rgba(255,255,255,.55); color: #5a4a7a;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all .2s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 1px 2px rgba(0,0,0,.02);
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }
  .btn-group .btn:hover {
    border-color: rgba(124,58,237,.35); background: rgba(255,255,255,.85);
    transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,58,237,.1);
  }
  .btn-group .btn:active { transform: scale(.96); }
  .btn-group .btn.active {
    background: linear-gradient(135deg, #7c3aed, #6366f1);
    color: #fff; border-color: transparent;
    box-shadow: 0 4px 14px rgba(124,58,237,.3);
  }
  .btn-group .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* ===== PANEL STATS ===== */
  .panel-stats { margin-bottom: 14px; }
  .panel-stats-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; background: rgba(255,255,255,.7); backdrop-filter: blur(12px);
    border-radius: 14px; border: 1px solid rgba(124,58,237,.1);
    cursor: pointer; transition: all .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.03);
  }
  .panel-stats-header:hover { border-color: rgba(124,58,237,.25); box-shadow: 0 4px 12px rgba(124,58,237,.08); transform: translateY(-1px); }
  .panel-stats-header .title { font-size: 14px; color: #2d1b69; font-weight: 600; }
  .ps-arrow { display: inline-block; transition: transform .4s cubic-bezier(.34,1.56,.64,1); font-size: 14px; color: #7c3aed; }
  .ps-arrow.open { transform: rotate(180deg); }

  .ps-content { overflow: hidden; height: 0; transition: height .4s cubic-bezier(.34,1.24,.64,1); }
  .ps-content.open { height: var(--ps-h); }
  .ps-inner { padding: 8px 0 0 0; }
  .ps-row {
    display: flex; align-items: center; gap: 8px; padding: 5px 0;
    font-size: 13px; color: #5a4a7a; opacity: 0; transform: translateY(-4px);
  }
  .ps-content.open .ps-row { animation: psIn .35s ease forwards; }
  @keyframes psIn { to { opacity: 1; transform: translateY(0); } }
  .ps-name { width: 68px; flex-shrink: 0; font-size: 12px; font-weight: 500; }
  .ps-bar-bg { flex: 1; height: 6px; background: rgba(124,58,237,.08); border-radius: 6px; overflow: hidden; }
  .ps-bar-fill { height: 100%; border-radius: 6px; transition: width .8s cubic-bezier(.34,1.24,.64,1); }
  .ps-bar-fill.green { background: linear-gradient(90deg,#818cf8,#6366f1); }
  .ps-bar-fill.yellow { background: linear-gradient(90deg,#fbbf24,#f59e0b); }
  .ps-bar-fill.red { background: linear-gradient(90deg,#f87171,#ef4444); }
  .ps-bar-fill.blue { background: linear-gradient(90deg,#a78bfa,#7c3aed); }
  .ps-pct { width: 36px; text-align: right; font-weight: 600; font-size: 12px; color: #2d1b69; }

  /* ===== STATS ROW ===== */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px;
  }
  @media (max-width: 480px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    background: rgba(255,255,255,.6); backdrop-filter: blur(8px);
    padding: 10px 8px; border-radius: 12px; text-align: center;
    border: 1px solid rgba(124,58,237,.08);
    box-shadow: 0 1px 2px rgba(0,0,0,.02);
  }
  .stat-card .label { font-size: 11px; color: #8b7aab; margin-bottom: 2px; }
  .stat-card .value { font-size: 18px; font-weight: 700; line-height: 1.3; }
  .stat-card .value.purple { color: #7c3aed; }
  .stat-card .value.green { color: #10b981; }
  .stat-card .value.red { color: #ef4444; }
  .stat-card .value.blue { color: #6366f1; }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap {
    background: rgba(124,58,237,.08); border-radius: 12px; height: 6px;
    overflow: hidden; margin-bottom: 16px; position: relative;
  }
  .progress-fill {
    height: 100%; border-radius: 12px;
    background: linear-gradient(90deg, #a78bfa, #7c3aed, #6366f1);
    background-size: 200% 100%;
    transition: width .6s cubic-bezier(.34,1.24,.64,1);
    animation: progGlow 3s ease-in-out infinite;
  }
  @keyframes progGlow { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

  /* ===== CARD ===== */
  .card {
    background: rgba(255,255,255,.85); backdrop-filter: blur(20px) saturate(1.4);
    border-radius: 20px; padding: clamp(20px, 4vw, 32px);
    border: 1px solid rgba(124,58,237,.1);
    box-shadow: 0 1px 3px rgba(0,0,0,.03), 0 20px 40px rgba(124,58,237,.06);
    display: none;
  }
  .card.active { display: block; animation: cardIn .4s cubic-bezier(.34,1.56,.64,1); }
  @keyframes cardIn { 0%{opacity:0;transform:translateY(16px) scale(.98)} 100%{opacity:1;transform:translateY(0) scale(1)} }

  .card-tags { margin-bottom: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 12px; border-radius: 100px;
    font-size: 12px; font-weight: 500;
  }
  .card-tag.num {
    background: rgba(124,58,237,.08); color: #5a2a9a;
  }
  .card-tag.topic {
    background: rgba(251,191,36,.15); color: #92400e;
  }

  .card-q {
    font-size: clamp(17px, 3.5vw, 20px); font-weight: 550;
    line-height: 1.65; margin-bottom: 20px;
    color: #1a1a2e;
  }

  /* ===== OPTIONS ===== */
  .opts { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 14px;
    border: 2px solid rgba(124,58,237,.1);
    background: rgba(255,255,255,.5);
    cursor: pointer; font-size: clamp(15px, 3vw, 17px); color: #2d3748;
    transition: all .2s cubic-bezier(.34,1.56,.64,1);
    position: relative; overflow: hidden;
  }
  .opt::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(124,58,237,.04), transparent);
    opacity: 0; transition: opacity .2s;
  }
  .opt:hover:not(.disabled) {
    border-color: rgba(124,58,237,.3);
    transform: translateX(4px);
    box-shadow: 0 4px 12px rgba(124,58,237,.06);
  }
  .opt:hover::before { opacity: 1; }
  .opt:active:not(.disabled) { transform: scale(.98) translateX(2px); }
  .opt .key {
    width: 30px; height: 30px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px; font-size: 14px; font-weight: 700;
    background: rgba(124,58,237,.06); color: #8b7aab;
    transition: all .2s;
  }
  .opt .txt { position: relative; z-index: 1; }

  .opt.selected { border-color: #7c3aed; background: rgba(124,58,237,.06); }
  .opt.selected .key { background: #7c3aed; color: #fff; }

  .opt.correct {
    border-color: #10b981; background: rgba(16,185,129,.06);
    animation: popIn .35s ease;
  }
  .opt.correct .key { background: #10b981; color: #fff; }
  .opt.correct::after {
    content: '✓'; position: absolute; right: 16px; font-size: 18px; color: #10b981; font-weight: 700;
  }

  .opt.wrong {
    border-color: #ef4444; background: rgba(239,68,68,.05);
    animation: shake .4s ease;
  }
  .opt.wrong .key { background: #ef4444; color: #fff; }
  .opt.wrong::after {
    content: '✗'; position: absolute; right: 16px; font-size: 18px; color: #ef4444; font-weight: 700;
  }

  .opt.disabled { cursor: default; opacity: .85; }

  @keyframes popIn { 0%{transform:scale(1)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

  /* ===== FEEDBACK ===== */
  .fb {
    margin-top: 16px; padding: 16px 20px; border-radius: 14px;
    font-size: 14px; line-height: 1.7; display: none; position: relative;
    animation: fbIn .3s ease;
  }
  @keyframes fbIn { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
  .fb.show { display: block; }
  .fb.correct { background: rgba(16,185,129,.06); border: 1px solid rgba(16,185,129,.2); color: #065f46; }
  .fb.wrong { background: rgba(239,68,68,.05); border: 1px solid rgba(239,68,68,.15); color: #991b1b; }
  .fb.info {
    background: rgba(124,58,237,.04); border: 1px solid rgba(124,58,237,.12); color: #4a2a8a;
  }
  .fb .fb-head { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
  .fb .fb-body { line-height: 1.7; }

  /* ===== NAV BAR ===== */
  .nav-bar {
    display: flex; justify-content: center; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center;
  }
  .nav-btn {
    padding: 8px 16px; border-radius: 12px; border: 1.5px solid rgba(124,58,237,.12);
    background: rgba(255,255,255,.5); backdrop-filter: blur(4px);
    color: #5a4a7a; font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all .2s cubic-bezier(.34,1.56,.64,1);
    display: inline-flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .nav-btn:hover { border-color: rgba(124,58,237,.3); background: rgba(255,255,255,.85); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,58,237,.08); }
  .nav-btn:active { transform: scale(.96); }
  .nav-btn.primary { background: linear-gradient(135deg, #7c3aed, #6366f1); color: #fff; border-color: transparent; box-shadow: 0 4px 14px rgba(124,58,237,.2); }
  .nav-btn.primary:hover { box-shadow: 0 6px 20px rgba(124,58,237,.3); transform: translateY(-2px); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
  .nav-btn.icon-btn { font-size: 16px; padding: 8px 12px; }

  /* ===== SIDEBAR ===== */
  .sidebar-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.2);
    z-index: 98; backdrop-filter: blur(2px);
  }
  .sidebar-overlay.show { display: block; animation: fade .2s; }
  @keyframes fade { 0%{opacity:0} 100%{opacity:1} }
  @keyframes diceRoll { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
  #randomBtn .dice { display:inline-block; }

  .sidebar {
    position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
    background: #fff; box-shadow: -8px 0 30px rgba(0,0,0,.08);
    transition: right .35s cubic-bezier(.34,1.24,.64,1);
    z-index: 99; padding: 24px 20px; overflow-y: auto;
  }
  .sidebar.open { right: 0; }
  .sidebar h3 { font-size: 16px; margin-bottom: 14px; color: #2d1b69; display: flex; align-items: center; gap: 6px; }
  .q-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .q-dot {
    width: 36px; height: 36px; border-radius: 10px; border: 2px solid rgba(124,58,237,.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; cursor: pointer; color: #8b7aab; background: #fff;
    transition: all .15s;
    font-weight: 500;
  }
  .q-dot:hover { border-color: rgba(124,58,237,.35); background: rgba(124,58,237,.04); }
  .q-dot.current { border-color: #7c3aed; background: rgba(124,58,237,.06); color: #5a2a9a; font-weight: 700; }
  .q-dot.ok { background: rgba(16,185,129,.08); border-color: rgba(16,185,129,.3); color: #065f46; }
  .q-dot.fail { background: rgba(239,68,68,.06); border-color: rgba(239,68,68,.2); color: #991b1b; }
  .sidebar .close-btn {
    position: absolute; top: 16px; right: 16px; width: 32px; height: 32px;
    border: none; background: rgba(124,58,237,.06); border-radius: 10px;
    cursor: pointer; font-size: 16px; color: #8b7aab;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .sidebar .close-btn:hover { background: rgba(124,58,237,.12); color: #5a2a9a; }

  /* ===== EMPTY STATES ===== */
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; display: block; }
  .empty-state h2 { font-size: 20px; color: #2d1b69; margin-bottom: 6px; }
  .empty-state p { color: #8b7aab; font-size: 14px; }

  /* ===== OUTLINE MODE ===== */
  .outline-content { font-size: 15px; line-height: 1.9; color: #2d3748; }
  .outline-content strong { color: #2d1b69; }
  .outline-content p { margin-bottom: 4px; }
  .outline-content br + p { margin-top: 8px; }

  /* ===== KBD HINT ===== */
  .kbd-hint {
    text-align: center; font-size: 11px; color: #8b7aab; margin-top: 12px;
    opacity: .6; transition: opacity .3s;
  }
  .kbd-hint:hover { opacity: 1; }
  .kbd-hint kbd {
    display: inline-block; padding: 1px 6px; border: 1px solid rgba(124,58,237,.15);
    border-radius: 5px; margin: 0 2px; font-family: inherit; font-size: 11px;
    background: rgba(255,255,255,.5); color: #5a4a7a;
  }

  .hint-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 100px; font-size: 13px;
    border: 1.5px solid rgba(99,102,241,.12); cursor: pointer;
    background: rgba(255,255,255,.5); color: #6366f1; font-weight: 500;
    transition: border-color .15s, background .15s; margin-bottom: 14px;
  }
  .hint-btn:hover { background: rgba(99,102,241,.06); border-color: rgba(99,102,241,.3); }
  .hint-btn.revealed { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,.05); }
  .hint-text {
    padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7;
    background: rgba(99,102,241,.04); border: 1px solid rgba(99,102,241,.12);
    color: #4a2a8a; margin-bottom: 14px; animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }

  /* ===== FILL-IN & SHORT ANSWER ===== */
  .fill-input {
    width:100%; padding:12px 16px; border-radius:12px; border:2px solid rgba(124,58,237,.15);
    background:rgba(255,255,255,.6); font-size:18px; color:#2d3748;
    outline:none; transition:border-color .2s; margin-bottom:12px; font-family:inherit;
  }
  .fill-input:focus { border-color:#7c3aed; }
  .fill-input.correct { border-color:#10b981; background:rgba(16,185,129,.04); }
  .fill-input.wrong { border-color:#ef4444; background:rgba(239,68,68,.04); }
  .fill-input:disabled { cursor:default; }

  .sa-textarea {
    width:100%; min-height:100px; padding:12px 16px; border-radius:12px;
    border:2px solid rgba(124,58,237,.15); background:rgba(255,255,255,.6);
    font-size:15px; color:#2d3748; outline:none; transition:border-color .2s;
    font-family:inherit; line-height:1.7; resize:vertical;
  }
  .sa-textarea:focus { border-color:#7c3aed; }

  .ans-reveal {
    padding:16px 20px; border-radius:14px; margin-top:12px;
    background:rgba(16,185,129,.06); border:1px solid rgba(16,185,129,.2); color:#065f46;
    font-size:15px; line-height:1.7;
  }
  .ans-reveal .label { font-weight:600; margin-bottom:4px; }

  .self-score { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .ss-btn {
    padding:8px 16px; border-radius:10px; border:1.5px solid rgba(124,58,237,.12);
    background:#fff; cursor:pointer; font-size:13px; font-weight:500; transition:all .15s;
  }
  .ss-btn:hover { transform:translateY(-1px); }
  .ss-btn.yes:hover { border-color:#10b981; background:rgba(16,185,129,.06); color:#065f46; }
  .ss-btn.no:hover { border-color:#ef4444; background:rgba(239,68,68,.05); color:#991b1b; }
  .ss-btn.part:hover { border-color:#f59e0b; background:rgba(245,158,11,.06); color:#92400e; }
  .ss-btn.selected { background:rgba(124,58,237,.06); border-color:#7c3aed; color:#5a2a9a; }
  .ss-btn.yes.selected { background:rgba(16,185,129,.1); border-color:#10b981; color:#065f46; }
  .ss-btn.no.selected { background:rgba(239,68,68,.08); border-color:#ef4444; color:#991b1b; }
  .ss-btn.part.selected { background:rgba(245,158,11,.08); border-color:#f59e0b; color:#92400e; }

  /* ===== EGG TOAST ===== */
  .egg-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(255,255,255,.9); backdrop-filter: blur(16px);
    border-radius: 16px; padding: 14px 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,.1); border: 1px solid rgba(124,58,237,.1);
    z-index: 300; opacity: 0; transition: all .5s cubic-bezier(.34,1.56,.64,1);
    font-size: 15px; color: #2d1b69; white-space: nowrap;
    pointer-events: none;
  }
  .egg-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3);
    z-index: 200; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; animation: fade .2s; }
  .modal-box {
    background: #fff; border-radius: 20px; padding: 28px;
    min-width: 300px; max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,.12);
    animation: modalIn .35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes modalIn { 0%{transform:scale(.85);opacity:0} 100%{transform:scale(1);opacity:1} }
  .modal-box h3 { font-size: 18px; color: #1a1a2e; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .modal-box p { font-size: 14px; color: #5a4a7a; line-height: 1.6; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btns button {
    padding: 8px 20px; border-radius: 12px; border: 1.5px solid rgba(124,58,237,.12);
    background: #fff; color: #5a4a7a; font-size: 14px; cursor: pointer;
    transition: all .15s; font-weight: 500;
  }
  .modal-btns button:hover { border-color: rgba(124,58,237,.3); background: rgba(124,58,237,.04); }
  .modal-btns button.primary { background: linear-gradient(135deg,#7c3aed,#6366f1); color: #fff; border-color: transparent; }
  .modal-btns button.primary:hover { box-shadow: 0 4px 14px rgba(124,58,237,.3); }
  .modal-btns button.danger { background: #ef4444; color: #fff; border-color: transparent; }
  .modal-btns button.danger:hover { box-shadow: 0 4px 14px rgba(239,68,68,.3); }

  /* ===== RESPONSIVE TWEAKS ===== */
  @media (max-width: 480px) {
    .container { padding: 12px; }
    .card { padding: 18px; border-radius: 16px; }
    .opt { padding: 12px 14px; gap: 10px; font-size: 15px; }
    .opt .key { width: 26px; height: 26px; font-size: 12px; }
    .opt::after { display: none; } /* hide check/cross on mobile, keep color */
    .sidebar { width: 260px; right: -280px; }

<style>
/* ===== LOCK SCREEN ===== */
.lock-overlay { position:fixed; inset:0; z-index:9999; background:linear-gradient(135deg,#f7fafc,#eef4ff); display:flex; align-items:center; justify-content:center; animation:fadeIn .3s ease; }
.lock-overlay.unlocked { animation:fadeOut .4s ease forwards; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes fadeOut { from{opacity:1} to{opacity:0} }
.lock-box { background:#fff; border-radius:20px; padding:36px 32px; box-shadow:0 8px 32px rgba(42,90,138,.12); max-width:380px; width:90%; text-align:center; }
.lock-box .lock-icon { font-size:48px; margin-bottom:8px; }
.lock-box h2 { font-size:20px; color:#1a3a5c; margin-bottom:2px; }
.lock-box .lock-sub { color:#7a9ab8; font-size:13px; margin-bottom:20px; }
.pay-section { background:#f7fafc; border-radius:16px; padding:20px; margin-bottom:16px; border:2px dashed #e2e8f0; }
.pay-qr { display:flex; flex-direction:column; align-items:center; gap:8px; }
.pay-qr img { width:220px; height:auto; border-radius:12px; }
.qr-text { font-size:13px; color:#5a7a9a; line-height:1.5; }
.pay-note { font-size:12px; color:#a0aec0; margin-top:8px; }
.unlock-input { width:100%; padding:12px 16px; border:2px solid #d0e0f0; border-radius:12px; font-size:16px; text-align:center; outline:none; margin-bottom:12px; letter-spacing:2px; }
.unlock-input:focus { border-color:#4299e1; }
.unlock-btn { width:100%; padding:12px; border:none; border-radius:12px; background:#3a7ab8; color:#fff; font-size:16px; cursor:pointer; }
.unlock-btn:hover { background:#2a5a8a; }
.unlock-error { font-size:13px; color:#e53e3e; min-height:20px; }
</style>

    a:'①对差分方程取Z变换：Y(z)-0.8z⁻¹Y(z)=X(z)；\n②系统函数H(z)=Y(z)/X(z)=1/(1-0.8z⁻¹)=z/(z-0.8)；\n③极点z=0.8（在单位圆内），零点z=0；\n④系统为因果系统（h(k)为右边序列），收敛域|z|>0.8；\n⑤收敛域包含单位圆|z|=1，因此系统稳定。\n结论：因果稳定系统。',
    i:'因果系统要求收敛域为|z|>R（R为最大极点半径）。稳定要求收敛域包含单位圆。' },
];

const EXP = {}; QS.forEach(q=>{EXP[q.id]=q.i;});

// ============ STATE ============
let S = {
  mode:'panel', panel:'basic', ans:{}, res:{}, wrong:new Set(), cur:0, psOpen:false, hint:null,
};

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('dsp_v2'));
    if (!d) return;
    if(d.ans) Object.assign(S.ans,d.ans);
    if(d.res) Object.assign(S.res,d.res);
    if(d.wrong) S.wrong=new Set(d.wrong);
    if(d.panel) S.panel=d.panel;
    if(d.mode) S.mode=d.mode;
  }catch(e){}
}
function save() {
  try{localStorage.setItem('dsp_v2',JSON.stringify({ans:S.ans,res:S.res,wrong:Array.from(S.wrong),panel:S.panel,mode:S.mode}));}catch(e){}
}

// ============ SOUND FX ============
let actx=null;
function initA(){if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();}
function playCor(){
  try{initA();const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);
  o.type='sine';o.frequency.setValueAtTime(523,actx.currentTime);o.frequency.setValueAtTime(659,actx.currentTime+.08);
  o.frequency.setValueAtTime(784,actx.currentTime+.16);g.gain.setValueAtTime(.12,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.3);o.start();o.stop(actx.currentTime+.3);}catch(e){}
}
function playWro(){
  try{initA();const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);
  o.type='sawtooth';o.frequency.setValueAtTime(200,actx.currentTime);
  o.frequency.setValueAtTime(150,actx.currentTime+.15);g.gain.setValueAtTime(.08,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.3);o.start();o.stop(actx.currentTime+.3);}catch(e){}
}

function getQ() {
  let qs=[...QS];
  if(S.mode==='panel') qs=qs.filter(q=>q.p===S.panel);
  else if(S.mode==='wrongbook') qs=qs.filter(q=>S.wrong.has(q.id));
  return qs;
}

function toggleHint(qid){
  const btn=document.querySelector('#cCard .hint-btn');
  const txt=document.querySelector('#cCard .hint-text');
  if(!btn) return;
  if(txt){
    txt.remove();btn.textContent='💡 不会？点我看看提示';btn.classList.remove('revealed');
    S.hint=null;
  }else{
    const q=QS.find(x=>x.id===qid); if(!q) return;
    const d=document.createElement('div'); d.className='hint-text'; d.textContent='💡 '+q.i;
    btn.parentNode.insertBefore(d, btn.nextSibling);
    btn.textContent='🔽 收起提示'; btn.classList.add('revealed');
    S.hint=qid;
  }
  save();
}

function randomQ(){
  const qs=getQ();if(!qs.length)return;
  const d=document.getElementById('dice');if(d){d.style.display='inline-block';d.style.animation='diceRoll .5s ease-out';setTimeout(()=>{d.style.animation='';},500);}
  let next;do{next=Math.floor(Math.random()*qs.length);}while(next===S.cur&&qs.length>1);
  S.cur=next;render();
}

function resetLight(){
  const qs=getQ();if(!qs.length)return;
  const q=qs[S.cur];
  delete S.ans[q.id];delete S.res[q.id];S.wrong.delete(q.id);S.hint=null;
  save();render();
}

// ============ RENDER ============
function render() {
  const scrollY=window.scrollY; // save scroll
  // Stats
  const answered=Object.keys(S.ans).length, total=QS.length;
  const correct=QS.filter(q=>S.res[q.id]===true).length;
  const wrong=QS.filter(q=>S.res[q.id]===false).length;
  document.getElementById('sProgress').textContent=`${answered}/${total}`;
  document.getElementById('sCorrect').textContent=correct;
  document.getElementById('sWrong').textContent=wrong;
  document.getElementById('sAcc').textContent=answered?Math.round(correct/answered*100)+'%':'0%';
  document.getElementById('progFill').style.width=`${answered/total*100}%`;
  document.getElementById('wrongBadge').textContent=S.wrong.size?`(${S.wrong.size})`:'';

  // Panel stats
  const rows=document.getElementById('psRows');
  rows.innerHTML=PANELS.map((p,i)=>{
    const qs=QS.filter(q=>q.p===p.key), t=qs.length;
    const c=qs.filter(q=>S.res[q.id]===true).length;
    const a=qs.filter(q=>S.ans[q.id]!==undefined).length;
    const pct=t?Math.round(c/t*100):0;
    const cls=pct>=80?'green':pct>=40?'yellow':pct>0?'red':'blue';
    return `<div class="ps-row" style="animation-delay:${i*0.05}s">
      <div class="ps-name">${p.name}</div>
      <div class="ps-bar-bg"><div class="ps-bar-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="ps-pct">${pct}%</div>
      <div style="width:44px;text-align:right;font-size:11px;color:#8b7aab;">${a}/${t}</div>
    </div>`;
  }).join('');

  // Sidebar
  const grid=document.getElementById('qGrid');
  const cqs=getQ();
  grid.innerHTML=cqs.map((q,i)=>{
    let cls='q-dot';
    if(S.res[q.id]===true) cls+=' ok';
    else if(S.res[q.id]===false) cls+=' fail';
    if(i===S.cur) cls+=' current';
    return `<div class="${cls}" onclick="goTo(${i})">${q.id+1}</div>`;
  }).join('');

  // Questions
  const qs=getQ();
  const area=document.getElementById('qArea');
  const nav=document.getElementById('navBar');

  if(!qs.length) {
    area.innerHTML=`<div class="card active"><div class="empty-state">
      <span class="icon">🎉</span>
      <h2>${S.mode==='wrongbook'?'没有错题！':'没有题目'}</h2>
      <p>${S.mode==='wrongbook'?'继续保持！':'换个模式看看吧'}</p>
    </div></div>`;
    nav.style.display='none';
    updatePSHeight(); return;
  }
  nav.style.display='flex';

  if(S.cur>=qs.length) S.cur=qs.length-1;
  if(S.cur<0) S.cur=0;
  const q=qs[S.cur];
  const has=S.ans[q.id]!==undefined;
  const pick=S.ans[q.id];

  const type=q.type||'choice';

  let bodyHtml='';
  if(type==='fill'){
    const val=S.ans[q.id]||'';
    bodyHtml='<input class="fill-input'+(has?(val===q.a?' correct':' wrong'):'')+'" id="fillInp" type="text" value="'+val+'" placeholder="请输入答案..."'+(has?' disabled':'')+' onkeydown="if(event.key===\'Enter\')submitFill('+q.id+')">';
    if(!has) bodyHtml+='<button class="nav-btn primary" onclick="submitFill('+q.id+')" style="margin-bottom:12px;">提交</button>';
  } else if(type==='short'){
    const val=S.ans[q.id]||'';
    bodyHtml='<textarea class="sa-textarea" id="saText" placeholder="请写出你的答案..."'+(has?' disabled':'')+'>'+val+'</textarea>';
    if(!has){
      bodyHtml+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;"><button class="nav-btn primary" onclick="revealSA('+q.id+')">📖 查看答案</button><button class="nav-btn" onclick="saveSA('+q.id+')">💾 暂存答案</button></div>';
    }
  } else {
    bodyHtml=q.o.map((o,i)=>{
      const k=String.fromCharCode(65+i);
      let cl='opt disabled';
      if(has){if(i===q.a)cl+=' correct';else if(i===pick)cl+=' wrong';}
      return '<div class="'+cl+'" data-i="'+i+'"><span class="key">'+k+'</span><span class="txt">'+o+'</span></div>';
    }).join('');
  }

  let fb='';
  if(has){
    if(type==='choice'){
      const r=pick===q.a;
      fb='<div class="fb show '+(r?'correct':'wrong')+'"><div class="fb-head">'+(r?'✅ 正确':'❌ 错误')+'</div><div class="fb-body">'+(r?'':'正确答案：'+String.fromCharCode(65+q.a)+'. ')+EXP[q.id]+'</div></div>';
    } else if(type==='fill'){
      const r=pick===q.a;
      fb='<div class="fb show '+(r?'correct':'wrong')+'"><div class="fb-head">'+(r?'✅ 正确':'❌ 错误')+'</div><div class="fb-body">'+(r?'':'正确答案：'+q.a+'。')+' '+EXP[q.id]+'</div></div>';
    } else if(type==='short'){
      const scButtons= pick===undefined ? '<div class="self-score"><button class="ss-btn yes" onclick="selfScore('+q.id+',true)">✅ 正确</button><button class="ss-btn part" onclick="selfScore('+q.id+',null)">🔶 部分正确</button><button class="ss-btn no" onclick="selfScore('+q.id+',false)">❌ 错误</button></div>' : '';
      fb='<div class="ans-reveal"><div class="label">📖 参考答案</div>'+q.a+'</div>'+scButtons+'<div class="fb show '+(pick===true?'correct':pick===false?'wrong':'info')+'"><div class="fb-head">'+(pick===true?'✅ 自评正确':pick===false?'❌ 自评错误':'📝 参考答案已展示')+'</div><div class="fb-body">'+EXP[q.id]+'</div></div>';
    }
  } else {
    if(type==='choice') fb='<div class="fb show info"><div class="fb-body">💡 选择一项查看答案和解析</div></div>';
    else if(type==='fill') fb='<div class="fb show info"><div class="fb-body">💡 输入答案后按 Enter 或点提交</div></div>';
    else if(type==='short') fb='<div class="fb show info"><div class="fb-body">📝 作答后点击"查看答案"对比参考答案</div></div>';
  }

  let hintHtml='';
  if(!has && type==='choice'){
    const revealed=S.hint===q.id;
    hintHtml='<button class="hint-btn'+(revealed?' revealed':'')+'" onclick="toggleHint('+q.id+')">'+(revealed?'🔽 收起提示':'💡 不会？点我看看提示')+'</button>';
    if(revealed) hintHtml+='<div class="hint-text">💡 '+q.i+'</div>';
  }

  area.innerHTML=`<div class="card active" id="cCard">
    <div class="card-tags">
      <span class="card-tag num">#${q.id+1}</span>
      <span class="card-tag type" style="background:${type==='fill'?'rgba(99,102,241,.12)':type==='short'?'rgba(245,158,11,.12)':'rgba(124,58,237,.08)'};color:${type==='fill'?'#4338ca':type==='short'?'#92400e':'#5a2a9a'}">${type==='fill'?'✏️ 填空':type==='short'?'📝 简答':'选择'}</span>
      <span class="card-tag topic">${PM[q.p]?.name||q.p}</span>
    </div>
    <div class="card-q">${q.q}</div>
    ${hintHtml}
    ${bodyHtml}
    ${fb}
  </div>`;
    <div class="opts">${opts}</div>
    ${fb}
  </div>`;

  if(!has){
    document.querySelectorAll('#cCard .opt').forEach(el=>{
      el.classList.remove('disabled');
      el.addEventListener('click',()=>pickA(parseInt(el.dataset.i),q.id));
    });
  }

  document.getElementById('prevBtn').disabled=S.cur===0;
  document.getElementById('nextBtn').disabled=S.cur===qs.length-1;
  updatePSHeight();
  window.scrollTo(0, scrollY); // restore scroll
}

function updatePSHeight() {
  const c=document.getElementById('psContent');
  if(S.psOpen) c.style.height=c.scrollHeight+'px';
}

function updStatsUI(){
  const a=Object.keys(S.ans).length, t=QS.length;
  const c=QS.filter(q=>S.res[q.id]===true).length;
  const w=QS.filter(q=>S.res[q.id]===false).length;
  document.getElementById('sProgress').textContent=a+'/'+t;
  document.getElementById('sCorrect').textContent=c;
  document.getElementById('sWrong').textContent=w;
  document.getElementById('sAcc').textContent=a?Math.round(c/a*100)+'%':'0%';
  document.getElementById('progFill').style.width=a/t*100+'%';
  document.getElementById('wrongBadge').textContent=S.wrong.size?'('+S.wrong.size+')':'';
  // Panel stats
  const rows=document.getElementById('psRows');
  if(rows) rows.innerHTML=PANELS.map((p,i)=>{
    const qs=QS.filter(q=>q.p===p.key), tt=qs.length;
    const cc=qs.filter(q=>S.res[q.id]===true).length;
    const aa=qs.filter(q=>S.ans[q.id]!==undefined).length;
    const pct=tt?Math.round(cc/tt*100):0;
    const cls=pct>=80?'green':pct>=40?'yellow':pct>0?'red':'blue';
    return '<div class="ps-row" style="animation-delay:'+(i*0.05)+'s"><div class="ps-name">'+p.name+'</div><div class="ps-bar-bg"><div class="ps-bar-fill '+cls+'" style="width:'+pct+'%"></div></div><div class="ps-pct">'+pct+'%</div><div style="width:44px;text-align:right;font-size:11px;color:#8b7aab;">'+aa+'/'+tt+'</div></div>';
  }).join('');
  // Sidebar dots
  const g=document.getElementById('qGrid');
  if(g){
    const qs=getQ();
    g.innerHTML=qs.map((q,i)=>{
      let cl='q-dot';
      if(S.res[q.id]===true) cl+=' ok';else if(S.res[q.id]===false) cl+=' fail';
      if(i===S.cur) cl+=' current';
      return '<div class="'+cl+'" onclick="goTo('+i+')">'+(q.id+1)+'</div>';
    }).join('');
  }
}

function pickA(opt,qid){
  if(S.ans[qid]!==undefined) return;
  S.ans[qid]=opt;
  const q=QS.find(x=>x.id===qid);
  const correct=opt===q.a;
  S.res[qid]=correct;
  if(!correct){S.wrong.add(qid);playWro();}else{S.wrong.delete(qid);playCor();}
  save();

  // Choice type: Direct DOM manipulation — no re-render
  if((q.type||'choice')==='choice'){
    const card=document.getElementById('cCard');
    if(!card) return;
    card.querySelectorAll('.opt').forEach(el=>{
      const i=parseInt(el.dataset.i);
      el.classList.remove('selected'); el.classList.add('disabled');
      if(i===q.a) el.classList.add('correct');
      else if(i===opt) el.classList.add('wrong');
    });
    const hb=card.querySelector('.hint-btn'); if(hb) hb.remove();
    const ht=card.querySelector('.hint-text'); if(ht) ht.remove();
    const oldInfo=card.querySelector('.fb.info'); if(oldInfo) oldInfo.remove();
    const fbDiv=document.createElement('div');
    fbDiv.className='fb show '+(correct?'correct':'wrong');
    fbDiv.innerHTML='<div class="fb-head">'+(correct?'✅ 正确':'❌ 错误')+'</div><div class="fb-body">'+(correct?'':'正确答案：'+String.fromCharCode(65+q.a)+'. ')+EXP[q.id]+'</div>';
    card.appendChild(fbDiv);
  }
  updStatsUI();
}

function submitFill(qid){
  const inp=document.getElementById('fillInp');
  if(!inp||!inp.value.trim()) return;
  S.ans[qid]=inp.value.trim();
  const q=QS.find(x=>x.id===qid);
  const correct=S.ans[qid]===q.a;
  S.res[qid]=correct;
  if(!correct){S.wrong.add(qid);playWro();}else{S.wrong.delete(qid);playCor();}
  save(); render();
}

function revealSA(qid){
  const ta=document.getElementById('saText');
  if(!ta) return;
  S.ans[qid]=ta.value;
  save(); render();
}

function saveSA(qid){
  const ta=document.getElementById('saText');
  if(!ta) return;
  S.ans[qid]=ta.value;
  save();
}

function selfScore(qid,score){
  S.res[qid]=score;
  if(score===false) S.wrong.add(qid); else S.wrong.delete(qid);
  save(); render();
}

function prev(){const q=getQ();if(S.cur>0){S.cur--;render();}}
function next(){const q=getQ();if(S.cur<q.length-1){S.cur++;render();}}
function goTo(i){S.cur=i;toggleSidebar();render();}

function renderOutline(){

<p><strong>📐 一、信号基础</strong><br>

// ============ KEYBOARD ============
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') prev();
  else if(e.key==='ArrowRight') next();
  else if(e.key==='r'||e.key==='R') randomQ();
  else if(e.key==='s'||e.key==='S') toggleSidebar();
  else if(e.key==='1'){const qs=getQ();if(qs[S.cur]&&S.ans[qs[S.cur].id]===undefined)pickA(0,qs[S.cur].id);}
  else if(e.key==='2'){const qs=getQ();if(qs[S.cur]&&S.ans[qs[S.cur].id]===undefined)pickA(1,qs[S.cur].id);}
  else if(e.key==='3'){const qs=getQ();if(qs[S.cur]&&S.ans[qs[S.cur].id]===undefined)pickA(2,qs[S.cur].id);}
  else if(e.key==='4'){const qs=getQ();if(qs[S.cur]&&S.ans[qs[S.cur].id]===undefined)pickA(3,qs[S.cur].id);}
});

document.querySelectorAll('#panelGroup .btn').forEach(b=>b.classList.toggle('active',b.dataset.panel===S.panel));

// ===== LOCK SCREEN =====
async function checkPwd() {
  const pwd = document.getElementById("pwdInput").value.trim();
  const err = document.getElementById("pwdError");
  const btn = document.querySelector(".unlock-btn");
  if (!pwd) { err.textContent = "❌ 请输入密码"; return; }
  btn.textContent = "⏳ 验证中..."; btn.disabled = true;
  err.textContent = "";
  try {
    const resp = await fetch("https://paywall-server.onrender.com/api/verify", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({code: pwd})
    });
    const d = await resp.json();
    if (d.ok) {
      if (d.token) try { localStorage.setItem("dsp_quiz_token", d.token); } catch(e) {}
      document.getElementById("lockOverlay").style.display = "none";
      err.textContent = "";
    } else {
      err.textContent = "❌ " + (d.msg || "密码错误");
      document.getElementById("pwdInput").value = "";
      document.getElementById("pwdInput").focus();
    }
  } catch(e) { err.textContent = "❌ 验证失败，请检查网络"; }
  btn.textContent = "🔓 解锁"; btn.disabled = false;
}
(function() {
  var token = localStorage.getItem("dsp_quiz_token");
  if (token) {
    var xhr = new XMLHttpRequest();
    xhr.open("POST", "https://paywall-server.onrender.com/api/verify-session", true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.send(JSON.stringify({token: token}));
    xhr.onload = function() {
      var resp = JSON.parse(xhr.responseText);
      if (resp.ok) {
        var el = document.getElementById("lockOverlay");
        el.classList.add("unlocked"); el.style.display = "none";
      } else { localStorage.removeItem("dsp_quiz_token"); }
    };
  }
})();
</script>
