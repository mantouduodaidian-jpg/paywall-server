<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>番茄钟</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    background:#0a1a0f;color:#c8e6c9;height:100vh;display:flex;
    align-items:center;justify-content:center;
    background-image:radial-gradient(ellipse at 50% 30%,rgba(22,120,50,.06) 0%,transparent 50%);
  }
  .box{
    text-align:center;padding:40px;
    background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);
    border-radius:24px;backdrop-filter:blur(16px);
    box-shadow:0 8px 40px rgba(0,0,0,.2);
    width:340px;
  }
  .timer{font-size:80px;font-weight:200;font-variant-numeric:tabular-nums;margin:24px 0;letter-spacing:4px;color:rgba(255,255,255,.6)}
  .status{font-size:14px;color:rgba(255,255,255,.2);margin-bottom:8px}
  .round{font-size:13px;color:rgba(255,255,255,.1);margin-bottom:20px}
  .btns{display:flex;gap:10px;justify-content:center}
  .btns button{
    width:56px;height:56px;border-radius:50%;border:1.5px solid rgba(255,255,255,.06);
    background:transparent;color:rgba(255,255,255,.4);cursor:pointer;font-size:20px;
    display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit
  }
  .btns button:hover{border-color:rgba(52,211,153,.2);color:rgba(255,255,255,.6);transform:scale(1.05)}
  .btns button:active{transform:scale(.95)}
  .btns button.primary{background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;width:64px;height:64px;font-size:24px}
  .btns button.primary:hover{box-shadow:0 4px 20px rgba(5,150,105,.3)}
  .btns button.primary:active{transform:scale(.95)}
  .prog{margin-top:20px;height:3px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
  .prog .f{height:100%;border-radius:3px;background:linear-gradient(90deg,#059669,#34d399);transition:width .5s;width:0%}
  .sub{font-size:12px;color:rgba(255,255,255,.06);margin-top:16px}
</style>
</head>
<body>
<div class="box">
  <div class="status" id="status">🍅 专注时间</div>
  <div class="timer" id="timer">25:00</div>
  <div class="round" id="round">第 0 轮 · 今日 0 轮</div>
  <div class="btns">
    <button onclick="resetTimer()" title="重置">↺</button>
    <button class="primary" id="mainBtn" onclick="toggleTimer()">▶</button>
    <button onclick="skipPhase()" title="跳过当前阶段">⏭</button>
  </div>
  <div class="prog"><div class="f" id="progBar"></div></div>
  <div class="sub">25分工作 · 5分休息</div>
</div>
<script>
const WORK=25*60,BREAK=5*60,LONG_BREAK=15*60;
let time=WORK,running=false,phase='work',rounds=0,today=0,interval=null;

function fmt(s){const m=Math.floor(s/60);return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function update(){
  document.getElementById('timer').textContent=fmt(time);
  const total=phase==='work'?WORK:BREAK;
  document.getElementById('progBar').style.width=((total-time)/total*100)+'%';
}
function tick(){
  time--;
  update();
  if(time<=0){
    clearInterval(interval);interval=null;running=false;
    if(phase==='work'){
      rounds++;today++;
      phase='break';
      time=BREAK;
      document.getElementById('status').textContent='☕ 休息时间';
      document.getElementById('round').textContent='已完成 '+rounds+' 轮 · 今日 '+today+' 轮';
      notify('🍅 专注完成！休息一下吧');
    } else {
      phase='work';
      time=WORK;
      document.getElementById('status').textContent='🍅 专注时间';
      document.getElementById('mainBtn').textContent='▶';
      notify('☕ 休息结束，开始下一轮！');
    }
    update();
  }
}
function toggleTimer(){
  if(running){clearInterval(interval);interval=null;running=false;document.getElementById('mainBtn').textContent='▶';}
  else{running=true;interval=setInterval(tick,1000);document.getElementById('mainBtn').textContent='⏸';}
}
function resetTimer(){
  clearInterval(interval);interval=null;running=false;
  phase='work';time=WORK;rounds=0;
  document.getElementById('status').textContent='🍅 专注时间';
  document.getElementById('mainBtn').textContent='▶';
  update();
}
function skipPhase(){
  clearInterval(interval);interval=null;running=false;
  if(phase==='work'){rounds++;today++;phase='break';time=BREAK;document.getElementById('status').textContent='☕ 休息时间';}
  else{phase='work';time=WORK;document.getElementById('status').textContent='🍅 专注时间';}
  document.getElementById('round').textContent='已完成 '+rounds+' 轮 · 今日 '+today+' 轮';
  document.getElementById('mainBtn').textContent='▶';update();
}
function notify(msg){try{new Notification('番茄钟',{body:msg})}catch(e){}}
if(Notification.permission==='default')Notification.requestPermission();
update();
</script>
</body>
</html>
