<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>主控</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js');</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    background: #0a1a0f; color: #c8e6c9; height: 100vh; overflow: hidden;
    background-image:
      radial-gradient(ellipse at 15% 25%, rgba(22,120,50,.06) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 75%, rgba(16,185,80,.04) 0%, transparent 50%);
  }
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 60px 60px; z-index: 0;
  }
  .container {
    position: relative; z-index: 1; height: 100vh;
    display: flex; flex-direction: column; padding: 40px;
    max-width: 1200px; margin: 0 auto;
  }

  /* Top bar */
  .top-bar {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 40px;
  }
  .top-bar .greeting { font-size: 28px; font-weight: 300; color: rgba(255,255,255,.15); }
  .top-bar .greeting strong { font-weight: 600; background: linear-gradient(135deg,#6ee7b7,#059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .top-bar .greeting .weather{font-size:13px;color:rgba(255,255,255,.1);margin-top:4px;display:flex;align-items:center;gap:6px}
  .top-bar .time {
    text-align: right; font-size: 48px; font-weight: 200; color: rgba(255,255,255,.1);
    font-variant-numeric: tabular-nums; letter-spacing: 2px; line-height: 1;
  }
  .top-bar .time .date { font-size: 14px; color: rgba(255,255,255,.08); margin-top: 4px; }

  /* Icons grid */
  .icons-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 20px;
    flex: 1; align-content: center; justify-content: center;
    max-width: 800px; margin: 0 auto; width: 100%;
  }
  .icon-link {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    text-decoration: none; color: rgba(255,255,255,.3);
    padding: 16px 8px; border-radius: 16px;
    transition: all .35s cubic-bezier(.34,1.56,.64,1);
  }
  .icon-link:hover {
    background: rgba(255,255,255,.03);
    transform: translateY(-6px) scale(1.05);
  }
  .icon-link svg { width: 40px; height: 40px; display: block; }
  .icon-link .lbl { font-size: 11px; color: rgba(255,255,255,.2); font-weight: 500; }
  .icon-link:hover .lbl { color: rgba(255,255,255,.4); }

  /* Left panel */
  .left-btn{position:fixed;bottom:20px;left:20px;z-index:10;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.06);background:rgba(10,26,15,.8);color:rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);transition:.2s}
  .left-btn:hover{border-color:rgba(52,211,153,.2);color:rgba(255,255,255,.5)}
  .left-btn svg{width:18px;height:18px}
  .left-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:20}
  .left-overlay.show{display:block}
  .left-panel{position:fixed;top:0;left:-340px;width:320px;height:100%;background:#0a1a0f;z-index:30;transition:left .35s;padding:24px;border-right:1px solid rgba(255,255,255,.04);overflow-y:auto}
  .left-panel.open{left:0}
  .left-panel .close{position:absolute;top:16px;right:16px;background:none;border:none;color:rgba(255,255,255,.2);font-size:18px;cursor:pointer}
  .left-panel .sec{font-size:10px;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:1px;margin:0 0 10px}
  .left-panel .item{font-size:14px;color:rgba(255,255,255,.35);line-height:1.7;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}
  .left-panel .item:last-child{border:none}
  .left-panel .item .src{font-size:11px;color:rgba(255,255,255,.1)}
  .left-panel .loading{text-align:center;padding:20px;color:rgba(255,255,255,.06);font-size:13px}
  .left-panel .tab-bar{display:flex;gap:6px;margin-bottom:14px}
  .left-panel .tab-bar button{padding:5px 12px;border-radius:100px;border:1px solid rgba(255,255,255,.06);background:transparent;color:rgba(255,255,255,.2);font-size:11px;cursor:pointer;font-family:inherit}
  .left-panel .tab-bar button:hover{border-color:rgba(52,211,153,.15);color:rgba(255,255,255,.4)}
  .left-panel .tab-bar button.active{border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.04);color:rgba(52,211,153,.5);font-weight:600}

  /* Bottom bar */
  .dash-btn{position:fixed;top:20px;right:20px;z-index:10;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.06);background:rgba(10,26,15,.8);color:rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);transition:.2s}
  .dash-btn:hover{border-color:rgba(52,211,153,.2);color:rgba(255,255,255,.5)}
  .dash-btn svg{width:18px;height:18px}
  .dash-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:20}
  .dash-overlay.show{display:block}
  .dash-panel{position:fixed;top:0;right:-340px;width:320px;height:100%;background:#0a1a0f;z-index:30;transition:right .35s;padding:24px;border-left:1px solid rgba(255,255,255,.04);overflow-y:auto}
  .dash-panel.open{right:0}
  .dash-panel .close{position:absolute;top:16px;right:16px;background:none;border:none;color:rgba(255,255,255,.2);font-size:18px;cursor:pointer}
  .dash-panel .sec{font-size:10px;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
  .dash-panel .sr{display:flex;gap:8px;margin-bottom:10px}
  .dash-panel .st{flex:1;background:rgba(255,255,255,.02);border-radius:10px;padding:10px;text-align:center}
  .dash-panel .st .n{font-size:18px;font-weight:700}
  .dash-panel .st .l{font-size:10px;color:rgba(255,255,255,.2);margin-top:2px}
  .dash-panel .svr{display:flex;gap:8px}
  .dash-panel .sv{flex:1;text-align:center;padding:6px;background:rgba(255,255,255,.02);border-radius:8px}
  .dash-panel .sv .v{font-size:14px;font-weight:600}
  .dash-panel .sv .l{font-size:10px;color:rgba(255,255,255,.15);margin-top:2px}
  .dash-panel .bb{height:3px;background:rgba(255,255,255,.04);border-radius:3px;margin:6px 0;overflow:hidden}
  .dash-panel .bf{height:100%;border-radius:3px;background:linear-gradient(90deg,#059669,#34d399);transition:width .8s}
  .dash-panel .qt{font-size:10px;color:rgba(255,255,255,.1);text-align:right}

  .daily-section{margin-top:30px;max-width:500px;margin-left:auto;margin-right:auto;width:100%}
  .daily-toggle{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
  .daily-toggle button{padding:6px 16px;border-radius:100px;border:1px solid rgba(255,255,255,.06);background:transparent;color:rgba(255,255,255,.2);font-size:12px;cursor:pointer;font-family:inherit;transition:.15s}
  .daily-toggle button:hover{border-color:rgba(52,211,153,.15);color:rgba(255,255,255,.4)}
  .daily-toggle button.active{border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.04);color:rgba(52,211,153,.5);font-weight:600}
  .daily-content{display:none;background:rgba(255,255,255,.015);border-radius:14px;padding:16px;border:1px solid rgba(255,255,255,.03);margin-bottom:8px}
  .daily-content.show{display:block}
  .daily-content .item{font-size:14px;color:rgba(255,255,255,.35);line-height:1.7;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
  .daily-content .item:last-child{border:none}
  .daily-content .item .src{font-size:11px;color:rgba(255,255,255,.12);margin-left:6px}
  .daily-content .loading{text-align:center;padding:20px;color:rgba(255,255,255,.06);font-size:13px}

  .bottom-bar {
    display: flex; gap: 20px; justify-content: center; margin-top: auto;
    padding-top: 20px; font-size: 12px; color: rgba(255,255,255,.06);
  }
  .bottom-bar a { color: rgba(255,255,255,.1); text-decoration: none; }
  .bottom-bar a:hover { color: rgba(255,255,255,.25); }

  @media (max-width:640px) {
    .container { padding: 20px; }
    .top-bar .greeting { font-size: 20px; }
    .top-bar .time { font-size: 32px; }
    .icons-grid { gap: 12px; grid-template-columns: repeat(4, 1fr); }
  }
  .btn svg{width:20px;height:20px;display:block;margin:0 auto 4px}.btn{padding:8px 12px;border-radius:10px;text-decoration:none;color:rgba(255,255,255,.3);font-size:11px;transition:.2s;text-align:center}.btn:hover{background:rgba(255,255,255,.03);color:rgba(255,255,255,.5)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="container">
  <!-- Top -->
  <div class="top-bar">
    <div class="greeting">Hey, <strong id="greetingName">mantou</strong><br><span style="font-size:14px;color:rgba(255,255,255,.08)" id="greetingMsg">又是新的一天</span><div class="weather" id="weatherDisplay"><span id="weatherIcon">☀️</span><span id="weatherTemp">--°</span><span id="weatherDesc" style="font-size:12px;color:rgba(255,255,255,.08)">加载中</span></div></div>
    <div class="time">
      <div id="clockDisplay">--:--</div>
      <div class="date" id="dateDisplay">----</div>
    </div>
  </div>

  <!-- Icons -->
  <div class="icons-grid">
    <a href="/chat.html" class="icon-link">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="rgba(52,211,153,.08)" stroke="#34d399" stroke-width="1.2"/><path d="M9 13.5c0 1.5 1.3 2.5 3 2.5s3-1 3-2.5" stroke="#34d399" stroke-width="1.4" stroke-linecap="round"/><ellipse cx="8.5" cy="9.5" rx="1" ry="1.2" fill="#34d399"/><ellipse cx="15.5" cy="9.5" rx="1" ry="1.2" fill="#34d399"/></svg>
      <span class="lbl">林间</span>
    </a>
    <a href="/market.html" class="icon-link">
      <svg viewBox="0 0 24 24" fill="none"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" fill="rgba(52,211,153,.06)" stroke="#34d399" stroke-width="1.2"/><line x1="3" y1="6" x2="21" y2="6" stroke="#34d399" stroke-width="1.2"/><path d="M16 10a4 4 0 0 1-8 0" stroke="#34d399" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span class="lbl">严选</span>
    </a>
    <a href="/expense.html" class="icon-link">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="rgba(52,211,153,.06)" stroke="#34d399" stroke-width="1.2"/><path d="M12 7v10M8 10h6a2 2 0 1 0 0-4H8" stroke="#34d399" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span class="lbl">记账</span>
    </a>
  </div>

  <!-- Bottom -->
  <!-- Left Panel Button -->
  <button class="left-btn" onclick="toggleLeft()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
  <div class="left-overlay" id="leftOverlay" onclick="toggleLeft()"></div>
  <div class="left-panel" id="leftPanel">
    <button class="close" onclick="toggleLeft()">✕</button>
    <div class="tab-bar">
      <button class="active" id="tabQuotes" onclick="switchTab('quotes')">💬 十言</button>
      <button id="tabNews" onclick="switchTab('news')">📰 新闻</button>
    </div>
    <div id="leftQuotes"><div class="loading">加载中...</div></div>
    <div id="leftNews" style="display:none"><div class="loading">加载中...</div></div>
  </div>

  <!-- Dashboard Sidebar Button -->
  <button class="dash-btn" onclick="toggleDashPanel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="16" width="5" height="5" rx="1" fill="currentColor" opacity=".6"/><rect x="10" y="11" width="5" height="10" rx="1" fill="currentColor"/><rect x="16" y="6" width="5" height="15" rx="1" fill="currentColor" opacity=".8"/></svg></button>
  <div class="dash-overlay" id="dashOverlay" onclick="toggleDashPanel()"></div>
  <div class="dash-panel" id="dashPanel">
    <button class="close" onclick="toggleDashPanel()">✕</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:16px;font-weight:600;color:rgba(255,255,255,.4)">📊 仪表盘</h2>
      <span style="font-size:20px;font-weight:200;color:rgba(255,255,255,.15);font-variant-numeric:tabular-nums" id="dashClock">--:--:--</span>
    </div>

    <div class="sec">AI 用量</div>
    <div class="sr">
      <div class="st"><div class="n" style="color:#34d399" id="aiToday">--</div><div class="l">今日</div></div>
      <div class="st"><div class="n" style="color:#6ee7b7" id="aiTokens">--</div><div class="l">Tokens</div></div>
      <div class="st"><div class="n" style="color:#fbbf24" id="aiMonth">--</div><div class="l">本月</div></div>
    </div>
    <div class="bb"><div class="bf" id="aiBar"></div></div>
    <div class="qt" id="aiQuota">--</div>

    <div class="sec">服务器</div>
    <div class="svr">
      <div class="sv"><div class="v" style="color:#34d399" id="svStatus">●</div><div class="l">状态</div></div>
      <div class="sv"><div class="v" id="svUptime">--</div><div class="l">运行</div></div>
      <div class="sv"><div class="v" id="svRAM">--</div><div class="l">内存</div></div>
    </div>
  </div>

  <div class="bottom-bar">
    <a href="/admin-market.html">后台</a>
    <span>·</span>
    <a href="/v1">API</a>
  </div>
</div>

<script>
// Clock
function updateTime(){
  const now = new Date();
  document.getElementById('clockDisplay').textContent = now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}
setInterval(updateTime, 1000); updateTime();

// Greeting
const h = new Date().getHours();
const msgs = ['早起的鸟儿有虫吃','上午好','下午好','夜深了'];
document.getElementById('greetingMsg').textContent = h<6?msgs[3]:h<9?msgs[0]:h<12?msgs[1]:h<18?msgs[2]:msgs[3];

// Left panel
function toggleLeft(){
  document.getElementById('leftPanel').classList.toggle('open');
  document.getElementById('leftOverlay').classList.toggle('show');
}
function switchTab(t){
  document.querySelectorAll('#leftPanel .tab-bar button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
  document.getElementById('leftQuotes').style.display=t==='quotes'?'block':'none';
  document.getElementById('leftNews').style.display=t==='news'?'block':'none';
}

// Fetch quotes (10条)
(async function(){
  const el=document.getElementById('leftQuotes');
  try{
    let html='',used=new Set(),tries=0;
    while(used.size<10 && tries<20){
      const r=await fetch('https://v1.hitokoto.cn/?encode=json&_t='+Date.now()+Math.random());
      if(r.ok){const d=await r.json();if(d.hitokoto && !used.has(d.hitokoto)){used.add(d.hitokoto);html+='<div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:16px;height:16px;vertical-align:-.2em;margin-right:6px;opacity:.6"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+d.hitokoto+'<br><span class="src">—— '+(d.from_who||d.from||'佚名')+'</span></div>';}}
      tries++;
    }
    el.innerHTML=html||'<div class="loading">暂无</div>';
  }catch(e){el.innerHTML='<div class="loading">加载失败</div>'}
})();

// Fetch news (via server proxy)
(async function(){
  const el=document.getElementById('leftNews');
  try{
    const r=await fetch('/api/news');
    if(!r.ok)throw Error();
    const d=await r.json();
    el.innerHTML=(d.items||[]).map((item,i)=>'<div class="item"><span style="color:rgba(52,211,153,.4);margin-right:6px">📰</span>'+(i+1)+'. '+item+'</div>').join('')||'<div class="loading">暂无</div>';
  }catch(e){el.innerHTML='<div class="loading">加载失败</div>'}
})();

// Weather
(async function(){
  try{
    const r=await fetch('https://wttr.in/Nanning?format=j1');
    if(!r.ok)return;const d=await r.json();const c=d.current_condition[0];
    document.getElementById('weatherTemp').textContent=c.temp_C+'°';
    document.getElementById('weatherDesc').textContent=c.weatherDesc[0].value;
    const icons={113:'☀️',116:'⛅',119:'☁️',176:'🌦',200:'⛈',227:'🌨',248:'🌫',266:'🌦',293:'🌦',296:'🌦',302:'🌧',311:'🌧',317:'🌧',320:'🌨',350:'🌧',353:'🌦',356:'🌧',362:'🌧',368:'🌨',386:'⛈',389:'⛈',392:'⛈'};
    document.getElementById('weatherIcon').textContent=icons[parseInt(c.weatherCode)]||'🌤';
  }catch(e){}
})();

// Dashboard sidebar clock
setInterval(()=>{document.getElementById('dashClock').textContent=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000);

function toggleDashPanel(){
  document.getElementById('dashPanel').classList.toggle('open');
  document.getElementById('dashOverlay').classList.toggle('show');
}
(async function(){
  try{
    const r=await fetch('/api/dashboard');if(!r.ok)throw Error();
    const d=await r.json();
    document.getElementById('svUptime').textContent=d.server.uptime;
    document.getElementById('svRAM').textContent=d.server.ram;
    document.getElementById('aiToday').textContent=d.ai.today;
    document.getElementById('aiTokens').textContent=(d.ai.tokens||0).toLocaleString();
    document.getElementById('aiMonth').textContent=(d.ai.month||0).toLocaleString();
    const p=Math.min(100,(d.ai.tokens||0)/5000000*100);
    document.getElementById('aiBar').style.width=p+'%';
    document.getElementById('aiQuota').textContent=((d.ai.tokens||0)/1000000).toFixed(1)+'M / 5M';
  }catch(e){}
})();
</script>
</body>
</html>
