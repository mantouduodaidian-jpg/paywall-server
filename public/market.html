<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>二豆 · 校园二手</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,'Microsoft YaHei',sans-serif;background:#f7f3ea;color:#555;min-height:100vh}

/* ===== Announcement Bar ===== */
.ann-bar{background:rgba(96,184,142,.06);border-bottom:1px solid rgba(96,184,142,.1);padding:8px 24px;font-size:12px;color:rgba(0,0,0,.4);display:none;align-items:center;gap:8px;overflow:hidden}
.ann-bar.show{display:flex}
.ann-bar .ann-dot{width:6px;height:6px;border-radius:50%;background:#34d399;flex-shrink:0}
.ann-bar .ann-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.promo-bar{background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(251,191,36,.02));border-bottom:1px solid rgba(251,191,36,.1);padding:7px 24px;font-size:12px;color:rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;overflow:hidden;cursor:pointer}
.promo-bar:hover{background:rgba(251,191,36,.06)}
.promo-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== Header ===== */
.header{background:#ffffff;border-bottom:1px solid rgba(0,0,0,.04);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header .logo{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.header .logo span{color:#4e9e80}
.header .sub{font-size:12px;color:rgba(0,0,0,.2)}
.header .actions{display:flex;gap:8px}
.header .actions a{padding:8px 20px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600;transition:all .2s}
.header .actions .pub{background:#60b88e;color:#fff}
.header .actions .pub:hover{background:#4e9e80}
.header .actions .dash{border:1px solid rgba(0,0,0,.08);color:rgba(0,0,0,.3)}
.header .actions .dash:hover{border-color:#60b88e;color:#60b88e}

/* ===== Main Layout ===== */
.main{display:flex;max-width:1200px;margin:0 auto;padding:20px 24px;gap:24px}
.sidebar{width:220px;flex-shrink:0}
.content{flex:1;min-width:0}

/* Sidebar */
.sidebar .search{margin-bottom:16px}
.sidebar .search input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.06);background:#ffffff;color:#555;font-size:14px;outline:none;font-family:inherit}
.sidebar .search input:focus{border-color:#60b88e}
.sidebar .section-title{font-size:11px;color:rgba(0,0,0,.2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sidebar .cat{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:rgba(0,0,0,.35);transition:all .1s;margin-bottom:2px}
.sidebar .cat:hover{background:rgba(0,0,0,.02);color:rgba(0,0,0,.5)}
.sidebar .cat.active{background:rgba(96,184,142,.08);color:#60b88e;font-weight:600}

/* Stats */
.sidebar .stats{margin-top:20px;padding-top:16px;border-top:1px solid rgba(0,0,0,.04)}
.sidebar .stats .row{display:flex;justify-content:space-between;font-size:11px;color:rgba(0,0,0,.2);padding:3px 0}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.card{background:#ffffff;border:1px solid rgba(0,0,0,.04);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative}
.card:hover{border-color:rgba(0,0,0,.1);transform:translateY(-6px);box-shadow:0 8px 24px rgba(0,0,0,.04)}
.card .img{width:100%;aspect-ratio:1;background:rgba(0,0,0,.03);display:flex;align-items:center;justify-content:center;font-size:36px;color:rgba(0,0,0,.06)}
.card .info{padding:8px 10px}
.card .info .title{font-size:13px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .info .price{font-size:17px;font-weight:700;color:#60b88e;margin:3px 0}
.card .info .meta{display:flex;gap:6px;font-size:10px;color:rgba(0,0,0,.2);flex-wrap:wrap}
.card .info .meta .tag{padding:2px 8px;border-radius:4px;background:rgba(0,0,0,.04);color:rgba(0,0,0,.3)}
.card .pin-bar{height:3px;background:linear-gradient(90deg,#4e9e80,#bce0cc,#4e9e80);border-radius:14px 14px 0 0;flex-shrink:0}
.card .sold-badge{position:absolute;top:8px;right:8px;background:#ef4444;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px}
.card .mine-badge{position:absolute;top:8px;left:8px;background:rgba(96,184,142,.12);color:#60b88e;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.status-badge{font-size:10px;padding:2px 8px;border-radius:4px;display:inline-block}
.status-badge.pending{background:rgba(251,191,36,.1);color:#fbbf24}
.status-badge.approved{background:rgba(52,211,153,.1);color:#34d399}
.status-badge.rejected{background:rgba(239,68,68,.1);color:#ef4444}
.status-badge.sold{background:rgba(239,68,68,.1);color:#ef4444}

.empty{text-align:center;padding:60px;color:rgba(0,0,0,.15);font-size:14px;grid-column:1/-1}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;overflow-y:auto;padding:20px}
.modal-overlay.show{display:block}
.modal-box{background:#ffffff;border-radius:16px;max-width:600px;margin:40px auto;border:1px solid rgba(0,0,0,.08);display:flex;flex-direction:column}
.modal-box .img-big{width:100%;max-height:400px;background:rgba(0,0,0,.03);display:flex;align-items:center;justify-content:center;overflow:hidden}
.modal-box .img-big img{width:100%;height:100%;object-fit:cover}
.modal-box .body{padding:20px}
.modal-box .body .title{font-size:22px;font-weight:600;color:#333}
.modal-box .body .price{font-size:32px;font-weight:700;color:#60b88e;margin:8px 0 12px}
.modal-box .body .tags{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.modal-box .body .tags span{padding:3px 12px;border-radius:6px;font-size:12px;background:rgba(0,0,0,.04);color:rgba(0,0,0,.3)}
.modal-box .body .desc{font-size:14px;line-height:1.8;color:rgba(0,0,0,.4);margin-bottom:20px}
.modal-box .body .btns{display:flex;gap:8px}
.modal-box .body .btns .contact{flex:1;padding:12px;border-radius:12px;border:none;background:#60b88e;color:#fff;font-size:15px;cursor:pointer;font-weight:600;text-align:center;text-decoration:none}
.modal-box .body .btns .close{padding:12px 20px;border-radius:12px;border:1px solid rgba(0,0,0,.08);background:transparent;color:rgba(0,0,0,.4);font-size:14px;cursor:pointer}
.modal-box .body .report-link{display:inline-block;margin-top:8px;padding:6px 14px;border-radius:8px;font-size:11px;color:rgba(239,68,68,.4);cursor:pointer;border:1px solid rgba(239,68,68,.08);background:rgba(239,68,68,.04);transition:all.15s}
.modal-box .body .report-link:hover{background:rgba(239,68,68,.1);color:rgba(239,68,68,.7)}

/* Publish Form */
.pub-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:60;overflow-y:auto;padding:20px}
.pub-overlay.show{display:block}
.pub-box{background:#ffffff;border-radius:16px;max-width:560px;margin:30px auto;padding:28px;border:1px solid rgba(0,0,0,.08)}
.pub-box h2{font-size:20px;color:rgba(0,0,0,.5);margin-bottom:20px}
.pub-box .row{display:flex;gap:10px;margin-bottom:10px}
.pub-box .row input,.pub-box .row select{flex:1}
.pub-box input,.pub-box select,.pub-box textarea{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.08);background:#f7f3ea;color:#555;font-size:14px;outline:0;font-family:inherit;-webkit-tap-highlight-color:transparent;box-shadow:none}
.pub-box select option{background:#fff;color:#555}
.pub-box input:focus,.pub-box select:focus,.pub-box textarea:focus{border-color:#60b88e;background:#f0ece3;outline:0;-webkit-tap-highlight-color:transparent;box-shadow:0 0 0 2px rgba(96,184,142,.08)}
.pub-box textarea{min-height:100px;resize:vertical}
.pub-box .btns{display:flex;gap:8px;margin-top:16px}
.pub-box .btns button{flex:1;padding:12px;border-radius:12px;border:none;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit}
.pub-box .btns .submit{background:#60b88e;color:#fff}
.pub-box .btns .cancel{background:rgba(0,0,0,.04);color:rgba(0,0,0,.4);border:1px solid rgba(0,0,0,.08)}

/* Report Modal */
.report-modal .pub-box{max-width:460px}
.report-modal select,.report-modal textarea,.report-modal input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.06);background:#fff;color:#555;font-size:14px;outline:none;font-family:inherit;margin-bottom:10px;-webkit-tap-highlight-color:transparent}
.report-modal select:focus,.report-modal textarea:focus,.report-modal input:focus{border-color:#60b88e;background:#f0ece3;-webkit-tap-highlight-color:transparent}
.report-modal textarea{min-height:80px;resize:vertical}

.toast-notif{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:14px;padding:14px 24px;display:flex;align-items:center;gap:10px;z-index:200;transition:top .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(0,0,0,.08);font-size:14px;white-space:nowrap;max-width:90vw}
.toast-notif.show{top:24px}
.toast-icon{font-size:18px}
.toast-msg{color:#555;font-weight:500}

.cat-select-wrap{position:relative;flex:1}
.cat-select-real{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:2;font-size:14px}
.cat-select-display{padding:10px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.06);background:#f7f3ea;color:#555;font-size:14px;display:flex;align-items:center;gap:8px;pointer-events:none;z-index:1;position:relative}
.cat-select-display svg{width:16px;height:16px;flex-shrink:0;vertical-align:middle}
.cat-select-display:after{content:'\25BE';margin-left:auto;color:rgba(0,0,0,.2);font-size:10px}

/* Chat Backdrop */
.chat-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.15);z-index:190;display:none}
.chat-backdrop.show{display:block}

/* Chat Button */
.chat-btn{position:fixed;bottom:24px;left:24px;width:56px;height:56px;border-radius:50%;background:#60b88e;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:199;box-shadow:0 4px 12px rgba(96,184,142,.2);transition:transform .2s}
.chat-btn:hover{transform:scale(1.1)}
.chat-btn .chat-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 2px 8px rgba(239,68,68,.3)}
/* Contact Sidebar */
.contact-sidebar{position:fixed;top:0;left:-320px;width:300px;height:100vh;background:#fff;border-right:1px solid rgba(0,0,0,.04);z-index:200;transition:left .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.06);overflow:hidden;display:flex;flex-direction:column}
.contact-sidebar.show{left:0}
.contact-sidebar-header{padding:16px;border-bottom:1px solid rgba(0,0,0,.04);display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:rgba(0,0,0,.5)}
.contact-list{flex:1;overflow-y:auto;padding:8px}
.contact-item{padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;transition:all.1s}
.contact-item:hover{background:rgba(0,0,0,.02)}
.contact-item .badge{background:#ef4444;color:#fff;font-size:10px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;margin-left:auto}
/* Chat Panel */
.chat-panel{position:fixed;bottom:88px;left:24px;width:400px;height:500px;background:#ffffff;border:1px solid rgba(0,0,0,.08);border-radius:16px;z-index:200;box-shadow:0 4px 30px rgba(0,0,0,.08);overflow:hidden;display:none;flex-direction:column}
#contactsOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;display:none}
#contactsOverlay.show{display:block}
.chat-panel.show{display:flex;flex-direction:column}
.chat-panel-header{padding:14px 16px;background:#fff;border-bottom:1px solid rgba(0,0,0,.04);display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:rgba(0,0,0,.5);flex-shrink:0}
.chat-body{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.chat-body::-webkit-scrollbar,.chat-msgs::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-track,.chat-msgs::-webkit-scrollbar-track{background:transparent}
.chat-body::-webkit-scrollbar-thumb,.chat-msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:4px}
.chat-msgs{padding:14px;flex:1;overflow-y:auto;min-height:0}
.chat-msg{margin-bottom:12px}
.chat-msg .sender{font-size:10px;color:rgba(0,0,0,.2);margin-bottom:2px;padding:0 4px}
.chat-msg .bubble{display:inline-block;padding:8px 14px;border-radius:14px;max-width:85%;word-break:break-word;font-size:13px;line-height:1.5}
.chat-msg.mine{text-align:right}
.chat-msg.mine .bubble{background:rgba(96,184,142,.12);color:#60b88e;border-radius:14px 14px 14px 4px}
.chat-msg.other .bubble{background:rgba(0,0,0,.04);color:rgba(0,0,0,.5);border-radius:4px 14px 14px 14px}
.chat-msg .time{font-size:9px;color:rgba(0,0,0,.2);margin-top:3px;display:block}
.chat-input-row{display:flex;gap:6px;padding:10px 12px;border-top:1px solid rgba(0,0,0,.04);flex-shrink:0}
.chat-input-row input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid rgba(0,0,0,.08);background:#f7f3ea;color:#555;font-size:12px;outline:0}
.chat-input-row input:focus{border-color:rgba(52,211,153,.3)}
.chat-convs{padding:8px;flex:1;overflow-y:auto;min-height:0}
.chat-conv-item{padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;transition:all.1s;color:rgba(0,0,0,.5)}
.chat-conv-item:hover{background:rgba(96,184,142,.06)}
.chat-conv{display:none;flex-direction:column;flex:1;min-height:0}
.chat-conv.show{display:flex}

.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:40;background:rgba(247,243,234,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.login-overlay .logo-icon{width:80px;height:80px;border-radius:50%;background:#fff;border:3px solid #bce0cc;display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.login-overlay .logo-icon img{width:80px;height:80px;border-radius:50%;object-fit:cover}
.login-overlay h1{font-size:24px;font-weight:800;color:#60b88e;letter-spacing:3px;margin-bottom:4px}
.login-overlay p{font-size:13px;color:rgba(0,0,0,.3);margin-bottom:24px}
.login-overlay .btn{display:inline-block;padding:12px 40px;border-radius:10px;background:#60b88e;color:#fff;font-size:15px;font-weight:600;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:background .2s}
.login-overlay .btn:hover{background:#4e9e80}
.login-overlay .link{margin-top:12px;font-size:12px;color:rgba(0,0,0,.2);cursor:pointer;text-decoration:underline}

@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.skeleton{background:linear-gradient(90deg,rgba(0,0,0,.02) 25%,rgba(0,0,0,.06) 50%,rgba(0,0,0,.02) 75%);background-size:400px 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:8px}
.skeleton-card{background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.04);border-radius:10px;overflow:hidden}
.skeleton-card .skeleton-img{width:100%;aspect-ratio:1;background:rgba(0,0,0,.03)}
.skeleton-card .skeleton-info{padding:8px 10px}
.skeleton-card .skeleton-line{height:12px;margin-bottom:6px;width:70%}
.skeleton-card .skeleton-line:last-child{width:40%}

@media(max-width:768px){
  .main{flex-direction:column;padding:12px}
  .sidebar{width:100%}
  .sidebar .cats{display:flex;gap:6px;overflow-x:auto}
  .sidebar .cats .cat{white-space:nowrap;flex-shrink:0;font-size:12px;padding:6px 10px}
  .sidebar .stats{display:none}
  .grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .card .info{padding:6px 8px}
  .card .info .title{font-size:12px}
  .card .info .price{font-size:15px}
  .pub-box{padding:20px;margin:10px auto}
  .pub-box .row{flex-wrap:wrap}
  .pub-box .row input,.pub-box .row select{min-width:100%}
  .modal-box{margin:10px;max-width:100%}
  .chat-panel{left:0;right:0;bottom:0;width:100%;border-radius:16px 16px 0 0;max-height:92vh;touch-action:auto;display:none;flex-direction:column}
  .chat-panel.show{display:flex}
  .chat-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .chat-msgs{flex:1;min-height:0;overflow-y:auto}
  .contact-sidebar{max-height:100vh;touch-action:auto;z-index:201}
  .chat-btn{bottom:16px;left:16px;width:50px;height:50px}
  .chat-input-row input{font-size:16px}
  .chat-input-row button{padding:10px 18px;font-size:14px}
  #pageNav{margin-top:8px!important;padding:8px 0!important}
  .header{padding:12px 16px}
  .header .logo{font-size:17px}
  .header .sub{font-size:10px}
  .header .actions a{padding:6px 14px;font-size:12px}
  .chat-panel .chat-panel-header span[onclick*="toggleChat"]{font-size:18px!important;padding:8px}
}
</style>
</head>
<body>

<!-- Announcement Bar -->
<div class="ann-bar" id="annBar">
  <span class="ann-dot"></span>
  <span class="ann-text" id="annText"></span>
</div>
<!-- Promotions Bar -->
<div class="promo-bar" id="promoBar" style="display:none">
  <span style="font-size:12px">🎁</span>
  <span class="promo-text" id="promoText"></span>
</div>
<!-- Muted Banner -->
<div id="mutedBanner" style="display:none;background:rgba(196,168,76,.1);border-bottom:1px solid rgba(196,168,76,.2);padding:8px 24px;font-size:12px;color:#c4a84c;text-align:center;font-weight:500">🔇 <span id="mutedBannerMsg"></span></div>


<!-- Header -->
<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <span id="hamburgerBtn" onclick="toggleContacts()" style="cursor:pointer;font-size:20px;color:rgba(0,0,0,.3);margin-right:8px;display:none">☰</span>
    <div class="logo" style="display:flex;align-items:center;gap:10px">
	      <img src="/logo.jpg" alt="二豆" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #bce0cc;box-shadow:0 2px 8px rgba(0,0,0,.04)">
	      <span style="font-size:18px;font-weight:800;color:#60b88e;letter-spacing:2px">二豆</span>
	    </div>
    <div class="sub">校园二手 · 严格认证</div>
  </div>
  <div class="actions">
    <span id="userInfo" style="display:none;font-size:12px;color:rgba(0,0,0,.4);align-items:center;gap:6px">
      <span id="userName"></span>
      <a href="#" onclick="logout();return false" style="color:rgba(0,0,0,.2);font-size:11px;text-decoration:none">退出</a>
    </span>
    <a href="#" class="dash" id="loginBtn" onclick="showLogin();return false">登录</a>
    <a href="#" class="pub" onclick="if(showLoginForPub())showPub();return false">+ 发布闲置</a>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="search">
      <input id="searchInput" type="text" autocomplete="off" placeholder="搜索物品..." onkeydown="if(event.key==='Enter')load()">
    </div>

<script>
let selCat = '';
let itemTypeFilter = 'sell';
const SCHOOLS = [
  { id: 'gxny', name: '广西农业职业技术大学', sidLen: 12, sidHint: 'XXXXXXXXXXXX' },
  { id: 'hnkj', name: '海南科技职业大学', sidLen: 12, sidHint: 'XXXXXXXXXXXX' },
  { id: 'gdcj', name: '广东财经大学', sidLen: 12, sidHint: 'XXXXXXXXXXXX' },
];
let sellerFilter = null;
let reportingProductId = null;

function setTypeFilter(type) {
  itemTypeFilter = type;
  document.getElementById('typeFilterSell').style.cssText = 'flex:1;padding:6px;border-radius:8px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;background:' + (type==='sell'?'rgba(96,184,142,.08)':'rgba(0,0,0,.02)') + ';color:' + (type==='sell'?'#60b88e':'rgba(0,0,0,.25)') + ';border:1px solid ' + (type==='sell'?'rgba(96,184,142,.15)':'rgba(0,0,0,.06)');
  document.getElementById('typeFilterRent').style.cssText = 'flex:1;padding:6px;border-radius:8px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;background:' + (type==='rent'?'rgba(96,184,142,.08)':'rgba(0,0,0,.02)') + ';color:' + (type==='rent'?'#60b88e':'rgba(0,0,0,.25)') + ';border:1px solid ' + (type==='rent'?'rgba(96,184,142,.15)':'rgba(0,0,0,.06');
  selCat = '';
  load();
}

// ====== Toast Notification ======
function notify(msg, icon) {
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = icon||'✅';
  const el = document.getElementById('toastNotif');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ====== Sound ======
var _soundEnabled = localStorage.getItem('chatSound') !== 'off';
function playMsgSound() {
  if (!_soundEnabled) return;
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function toggleSound() {
  _soundEnabled = !_soundEnabled;
  localStorage.setItem('chatSound', _soundEnabled ? 'on' : 'off');
  document.getElementById('soundToggle').textContent = _soundEnabled ? '🔔' : '🔕';
  notify(_soundEnabled ? '提示音已开启' : '提示音已关闭', '🔔');
}

// ====== Categories ======
async function loadCats() {
  try {
    const r = await fetch('/api/marketplace/categories');
    const cats = await r.json();
    const arr = Array.isArray(cats) ? cats : [];
    var mineCat = currentUser ? '<div class="cat" onclick="setCat(\'__mine__\')"><svg viewBox="0 0 24 24" width="16" height="16" style="vertical-align:middle;margin-right:4px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" fill="#60b88e" stroke="#bce0cc" stroke-width=".9" stroke-linecap="round"/><circle cx="12" cy="7" r="4" fill="#60b88e" stroke="#bce0cc" stroke-width=".9"/></svg> 我的</div>' : '';
    const catHtml = '<div class="cat active" onclick="setCat(\'\')">'+getCatIcon('全部')+' 全部</div>' + mineCat +
      arr.map(c => '<div class="cat" onclick="setCat(\''+esc(c.name)+'\')">'+(getCatIcon(c.name))+' '+esc(c.name)+'</div>').join('');
    document.getElementById('catList').innerHTML = catHtml;
    // Restore saved category highlight
    if (selCat) {
      document.querySelectorAll('#catList .cat').forEach(function(el) {
        if (selCat === '') el.classList.toggle('active', el.textContent.includes('全部'));
        else if (selCat === '__mine__') el.classList.toggle('active', el.textContent.includes('我的'));
        else el.classList.toggle('active', el.textContent.includes(selCat));
      });
    }
    // Populate category select + display
    var sel = document.getElementById('fCat');
    sel.innerHTML = '<option value="">分类</option>' +
      arr.map(c => '<option value="'+esc(c.name)+'">'+esc(c.name)+'</option>').join('');
    sel.onchange = function() {

let pageOffset = 0;
const PAGE_SIZE = 10;

async function load(reset) {
  var userSchool = currentUser ? currentUser.school : localStorage.getItem('visitorSchool');
  if (!currentUser) {
    document.getElementById('guestOverlay').style.display = 'flex';
    if (!userSchool) { showSchoolSelect(); return; }
  } else {
    document.getElementById('guestOverlay').style.display = 'none';
  }
  if (reset !== false) { pageOffset = 0; document.getElementById('productList').innerHTML =
    '<div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-info"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>'.repeat(4); }
  const search = document.getElementById('searchInput').value.trim();
  // Save state
  try { localStorage.setItem('marketState', JSON.stringify({cat:selCat,search:search,page:Math.floor(pageOffset/10)+1})); } catch(e) {}
  let url = '/api/marketplace/products?limit='+PAGE_SIZE+'&offset='+pageOffset+'&item_type='+itemTypeFilter;
  if (userSchool) url += '&school='+userSchool;
  if (sellerFilter) url += '&owner='+sellerFilter;
  else if (selCat === '__mine__') url += '&owner='+(currentUser?currentUser.student_id:'');
  else if (selCat) url += '&category='+selCat;
  if (search) url += '&search='+encodeURIComponent(search);
  try {
    const r = await fetch(url); const json = await r.json();
    const data = Array.isArray(json.data) ? json.data : (Array.isArray(json) ? json : []);
    var searchVal = document.getElementById('searchInput').value.trim();
    const total = searchVal ? data.length : (json.total || data.length);
    document.getElementById('statCount').textContent = total;
    document.getElementById('resultLabel').textContent = (sellerFilter ? '卖家「'+(window._sellerName||'')+'」的商品' : (selCat||'全部'))+(search?' · "'+search+'"':'')+' · '+total+' 件';
    document.getElementById('sellerClear').style.display = sellerFilter ? 'inline' : 'none';
    const list = document.getElementById('productList');
    if (reset !== false) {
      if (!data.length) { list.innerHTML = '<div class="empty">🌱 还没有商品，快来发布第一个</div>'; return; }
      list.innerHTML = '';
    } else {
      list.innerHTML = '';
    }
    data.forEach(function(p) {
      var div = document.createElement('div');
      div.className = 'card' + (!currentUser ? ' card-blur' : '');
      if (!currentUser) {
        var overlay = document.createElement('div');
        overlay.className = 'card-login-overlay';
        overlay.innerHTML = '<svg viewBox="0 0 28 28" width="32" height="32"><path d="M6 2h12l4 4v18a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" fill="url(#gF)" stroke="#a7f3d0" stroke-width="1" stroke-linejoin="round"/><path d="M18 2v4h4" fill="url(#gF)" stroke="#a7f3d0" stroke-width=".8" stroke-linejoin="round"/><polygon points="14 8 17.5 12.5 14 17 10.5 12.5" fill="url(#lo2)" stroke="#a7f3d0" stroke-width=".8" stroke-linejoin="round"/></svg><div style="font-size:11px;margin-top:6px;color:rgba(52,211,153,.4);font-weight:500">登录查看</div>';
        div.appendChild(overlay);
      }
      div.onclick = function() { if (!currentUser) { hideDetail();notify('请登录查看商品', '🔑'); showLogin(); return; } showDetail(p.id); };
      var priceHtml = p.item_type === 'rent' ? '<div class="price">¥'+parseFloat(p.rent_price).toFixed(0)+'<span style="font-size:11px;color:rgba(0,0,0,.2);font-weight:400">/'+({day:'天',week:'周',month:'月'}[p.rent_period]||'天')+'</span></div>' : '<div class="price">¥'+parseFloat(p.price).toFixed(0)+'</div>';
      var typeTag = p.item_type === 'rent' ? '<span class="tag" style="background:rgba(52,211,153,.08);color:#34d399">📅 可租</span>' : '';
      div.innerHTML = (p.pinned?'<div class="pin-bar"></div>':'')+'<div class="img">📦</div><div class="info"><div class="title">'+esc(p.title)+'</div>'+priceHtml+'<div class="meta">'+typeTag+'<span class="tag">'+esc(p.quality)+'</span><span class="tag">'+esc(p.category)+'</span></div></div>'+
        (p.sold?'<div class="sold-badge">已售罄</div>':'')+
        (currentUser && p.owner_student_id === currentUser.student_id ? '<div class="mine-badge">我的</div>':'');
      list.appendChild(div);
    });
    // Page navigation (fixed position, always same spot)
    var totalPages = Math.ceil(total / PAGE_SIZE);
    var currentPage = Math.floor(pageOffset / PAGE_SIZE) + 1;
    var nav = document.getElementById('pageNav');
    var navContainer = document.getElementById('pageNavContainer');
    if (!nav) {
      nav = document.createElement('div');
      nav.id = 'pageNav';
      nav.style.cssText = 'display:flex;gap:4px;justify-content:flex-end;align-items:center';
      if (navContainer) navContainer.appendChild(nav);
    }
    var navHtml = '';
    if (currentPage > 1) navHtml += '<a href="#" onclick="gotoPage('+(currentPage-1)+');return false" style="color:rgba(0,0,0,.3);font-size:12px;text-decoration:none;padding:5px 10px;border:1px solid rgba(0,0,0,.06);border-radius:5px">‹</a>';
    for (var i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
      if (i === currentPage) navHtml += '<span style="background:rgba(52,211,153,.1);color:#34d399;padding:5px 10px;border-radius:5px;font-size:12px;font-weight:600">'+i+'</span>';
      else navHtml += '<a href="#" onclick="gotoPage('+i+');return false" style="color:rgba(0,0,0,.25);font-size:12px;text-decoration:none;padding:5px 10px;border:1px solid rgba(0,0,0,.04);border-radius:5px">'+i+'</a>';
    }
    if (currentPage < totalPages) navHtml += '<a href="#" onclick="gotoPage('+(currentPage+1)+');return false" style="color:rgba(0,0,0,.3);font-size:12px;text-decoration:none;padding:5px 10px;border:1px solid rgba(0,0,0,.06);border-radius:5px">›</a>';
    nav.innerHTML = navHtml;
  } catch(e) { document.getElementById('productList').innerHTML = '<div class="empty">加载失败</div>'; }
}

function gotoPage(page) {
  pageOffset = (page - 1) * PAGE_SIZE;
  document.getElementById('productList').innerHTML = '<div class="empty">加载中...</div>';
  load(false);
}

// ====== Student Card Upload ======
window._cardImage = '';
function previewStudentCard(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5*1024*1024) { notify('图片不能超过5MB', '⚠️'); return; }
  document.getElementById('vCardName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(e) { window._cardImage = e.target.result; };
  reader.readAsDataURL(file);
}

// ====== Image Upload ======
window._uploadedImages = [];
function previewImg(input) {
  var files = Array.from(input.files || []).slice(0, 4);
  if (!files.length) return;
  document.getElementById('fImageName').textContent = files.length + '张图片 (压缩中...)';
  window._uploadedImages = [];
  var loaded = 0;
  files.forEach(function(file) {
    if (file.size > 5*1024*1024) { notify('图片不能超过5MB', '⚠️'); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var maxW = 800, maxH = 800;
        var w = img.width, h = img.height;
        if (w > maxW || h > maxH) { var r = Math.min(maxW/w, maxH/h); w = Math.round(w*r); h = Math.round(h*r); }
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        var quality = 0.6;
        var dataUrl = canvas.toDataURL('image/jpeg', quality);
        while (dataUrl.length > 200*1024 && quality > 0.1) { quality -= 0.1; dataUrl = canvas.toDataURL('image/jpeg', quality); }
        window._uploadedImages.push(dataUrl);
        loaded++;
        if (loaded === files.length) {
          document.getElementById('fImageName').textContent = files.length + '张 (' + Math.round(dataUrl.length/1024) + 'KB/张)';
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function fmtDate(d) { if(!d) return ''; var dt=new Date(d); var now=new Date(); if(dt.getDate()===now.getDate()&&now-dt<864e5) return String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0'); return (dt.getMonth()+1)+'/'+dt.getDate(); }

function toggleChat() {
  var panel = document.getElementById('chatPanel');
  var btn = document.getElementById('chatBtn');
  var bd = document.getElementById('chatBackdrop');
  if (panel.classList.contains('show')) {
    panel.classList.remove('show');
    btn.style.display = '';
    bd.classList.remove('show');
    document.body.style.overflow = '';
  } else {
    panel.classList.add('show');
    btn.style.display = 'none';
    bd.classList.add('show');
    document.body.style.overflow = 'hidden';
    setTimeout(loadConvs, 50);
  }
}


function connectWS() {
  if (!currentUser) return;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  wsChat = new WebSocket(proto + '//' + location.host);
  wsChat.onerror = function(e) { console.error('WS error', e); };
  wsChat.onopen = function() {
    document.getElementById('chatBadge').textContent = '0';
    wsChat.send(JSON.stringify({type:'auth', student_id: currentUser.student_id}));
  };
  wsChat.onmessage = function(e) {
    try {
      var d = JSON.parse(e.data);
      if (d.type === 'product_update') {
        load();
        return;
      }
      if (d.type === 'chat' && d.data) {
        var badge = document.getElementById('chatBadge');
        var c = parseInt(badge.textContent) || 0;
        badge.textContent = c + 1;
        if (chatProductId && chatProductId == d.data.product_id) {
          appendMsg(d.data, false);
        }
      }
    } catch(e) {}
  };
  wsChat.onclose = function() { setTimeout(connectWS, 3000); };
}

function openChat(productId, sellerStudentId, sellerName, productTitle) {
  if (!currentUser) { notify('请先登录后联系卖家', '🔑'); showLogin(); return; }
  if (sellerStudentId === 'unknown') { notify('卖家信息不完整', '⚠️'); return; }
  chatProductId = productId;
  chatOtherStudent = sellerStudentId;
  chatOtherName = sellerName;
  if (sellerStudentId === 'kefu_001') {
    document.getElementById('chatConvLabel').textContent = '💬 校园严选客服';
  } else if (productId) {
    fetch('/api/marketplace/products/'+productId).then(function(r){return r.json();}).then(function(p){
      fetch('/api/verify/list').then(function(r2){return r2.json();}).then(function(vers){
        var arr = Array.isArray(vers)?vers:[];
        var seller = arr.find(function(v){ return v.student_id === sellerStudentId; });
        var nick = (seller && seller.nickname) ? seller.nickname : sellerName;
        if (p && p.trade_status === 'completed') {
          document.getElementById('chatConvLabel').textContent = '💬 ' + nick + (sellerName && nick !== sellerName ? '('+sellerName+')' : '');
        } else {
          document.getElementById('chatConvLabel').textContent = '💬 ' + (nick || '买家');
        }
      }).catch(function(){});
    }).catch(function(){});
  } else {
    document.getElementById('chatConvLabel').textContent = '💬 ' + sellerName;
  }
  document.getElementById('chatPanel').classList.add('show');
  document.getElementById('chatBtn').style.display = 'none';
  document.getElementById('chatConvs').style.display = 'none';
  document.getElementById('chatConv').classList.add('show');
  document.getElementById('chatMsgs').innerHTML = '<div style="text-align:center;padding:20px;color:rgba(0,0,0,.15);font-size:12px">加载中...</div>';
  document.getElementById('chatConvLabel').textContent = '💬 ' + (sellerStudentId === 'kefu_001' ? '校园严选客服' : sellerName);
  startChatPoll();
  setTimeout(function() {
    fetch('/api/marketplace/messages?student_id='+currentUser.student_id+'&other_student_id='+sellerStudentId)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var arr = Array.isArray(data) ? data : [];
        document.getElementById('chatMsgs').innerHTML = '';
        arr.forEach(function(m) { appendMsg(m, true); });
        var msgs = document.getElementById('chatMsgs');
        msgs.scrollTop = msgs.scrollHeight;
        fetch('/api/marketplace/messages/read', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from_student_id:sellerStudentId,student_id:currentUser.student_id})});
      }).catch(function(){});
  }, 100);
}

function showConvs() {
  stopChatPoll();
  document.getElementById('chatConvs').style.display = '';
  document.getElementById('chatConv').classList.remove('show');
  chatProductId = null;
  loadConvs();
}

function loadConvs() {
  if (!currentUser) return;
  var search = (document.getElementById('chatSearch').value || '').trim().toLowerCase();
  fetch('/api/marketplace/contacts?student_id='+currentUser.student_id)
    .then(function(r) { return r.json(); })
    .then(function(contacts) {
      var arr = Array.isArray(contacts) ? contacts : [];
      // Filter by search
      if (search) arr = arr.filter(function(c) { return (c.name||'').toLowerCase().includes(search) || (c.student_id||'').includes(search); });
      // Count unread
      var unread = 0;
      var el = document.getElementById('chatConvs');
      var badge = document.getElementById('chatBadge');
      if (!arr.length) {
        el.innerHTML = '<div style="text-align:center;padding:30px;color:rgba(0,0,0,.1);font-size:12px">' + (search ? '未找到联系人' : '暂无消息') + '</div>';
        badge.textContent = '0'; return;
      }
      el.innerHTML = arr.map(function(c) {
        var sid = c.student_id;
        var unBadge = (c.unread && c.unread > 0) ? '<span style="background:#ef4444;color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;margin-left:4px">'+c.unread+'</span>' : '';
        return '<div class="chat-conv-item" onclick="openChat('+c.product_id+',\''+sid+'\',\''+esc(c.name)+'\',\'\')">💬 <span style="flex:1;overflow:hidden;text-overflow:ellipsis">'+esc(c.name)+'</span>'+unBadge+'</div>';
      }).join('');
      var totalUnread = arr.reduce(function(sum, c) { return sum + (c.unread || 0); }, 0);
      badge.textContent = totalUnread > 0 ? totalUnread : '0';
    });
}

function closeConv(key) {
  var closed = JSON.parse(localStorage.getItem('closedConvs') || '[]');
  if (!closed.includes(key)) closed.push(key);
  localStorage.setItem('closedConvs', JSON.stringify(closed));
  loadConvs();
}

var _lastChatTime = 0;
function updateTradeButtons(p) {
  var actions = document.getElementById('tradeActions');
  var status = document.getElementById('tradeStatus');
  var buyerBtn = document.getElementById('tradeBuyer');
  var sellerBtns = document.getElementById('tradeSeller');
  actions.style.display = 'none'; buyerBtn.style.display = 'none'; sellerBtns.style.display = 'none'; status.style.display = 'none';
  if (!p || p.sold) return;
  var isOwner = currentUser && p.owner_student_id === currentUser.student_id;
  var isBuyer = currentUser && p.trade_buyer_id === currentUser.student_id;

  actions.style.display = 'flex';

  if (isOwner && p.trade_status === 'trading') {
    // Seller sees confirm/cancel for active trade
    status.style.display = ''; status.innerHTML = '👤 ' + esc(p.trade_buyer_name||'买家') + ' 想购买';
    status.style.cssText = 'text-align:center;padding:8px;font-size:12px;border-radius:8px;margin-bottom:6px;background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(251,191,36,.05));color:#fbbf24;border:1px solid rgba(251,191,36,.1)';
    sellerBtns.style.display = 'flex';
  } else if (isBuyer && p.trade_status === 'trading') {
    // Buyer sees waiting message
    status.style.display = ''; status.innerHTML = '⏳ 等待卖家确认';
    status.style.cssText = 'text-align:center;padding:8px;font-size:12px;border-radius:8px;margin-bottom:6px;background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(251,191,36,.05));color:#fbbf24;border:1px solid rgba(251,191,36,.1)';
  } else if (isOwner && p.trade_status === 'completed') {
    status.style.display = ''; status.innerHTML = '✅ 交易成功 🎉';
    status.style.cssText = 'text-align:center;padding:8px;font-size:12px;border-radius:8px;margin-bottom:6px;background:linear-gradient(135deg,rgba(52,211,153,.12),rgba(52,211,153,.05));color:#34d399;border:1px solid rgba(52,211,153,.1)';
  } else if (!isOwner && p.trade_status === 'completed') {
    status.style.display = ''; status.innerHTML = '✅ 交易成功 🎉';
    status.style.cssText = 'text-align:center;padding:8px;font-size:12px;border-radius:8px;margin-bottom:6px;background:linear-gradient(135deg,rgba(52,211,153,.12),rgba(52,211,153,.05));color:#34d399;border:1px solid rgba(52,211,153,.1)';
  } else if (!isOwner && p.trade_status !== 'trading' && p.trade_status !== 'completed') {
    // Normal buyer sees request button
    buyerBtn.style.display = '';
  } else if (isOwner && !p.trade_status) {
    // Seller with no pending trade - nothing to show
    actions.style.display = 'none';
  }
}

function requestTrade() {
  if (!chatProductId || !currentUser) return;
  fetch('/api/marketplace/trade/request', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product_id:chatProductId,buyer_id:currentUser.student_id,buyer_name:currentUser.name})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok){
        notify('已发送购买请求', '🤝');
        // Send chat message
        fetch('/api/marketplace/messages', {method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({product_id:chatProductId,from_student_id:currentUser.student_id,from_name:currentUser.name,to_student_id:chatOtherStudent||'',to_name:chatOtherName||'',content:'🤝 我想购买此商品'})
        }).catch(function(){});
        // Reload product to update buttons
        fetch('/api/marketplace/products/'+chatProductId).then(function(r){return r.json();}).then(function(p){updateTradeButtons(p);}).catch(function(){});
      } else notify('操作失败','❌');
    }).catch(function(){notify('操作失败','❌');});
}

function confirmTrade() {
  if (!chatProductId) return;
  fetch('/api/marketplace/trade/confirm', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product_id:chatProductId})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok){
        notify('✅ 交易成功');
        fetch('/api/marketplace/messages', {method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({product_id:chatProductId,from_student_id:currentUser.student_id,from_name:currentUser.name,to_student_id:chatOtherStudent||'',to_name:chatOtherName||'',content:'✅ 交易成功'})
        }).catch(function(){});
        fetch('/api/marketplace/products/'+chatProductId).then(function(r){return r.json();}).then(function(p){updateTradeButtons(p);load();}).catch(function(){});
      } else notify('操作失败','❌');
    }).catch(function(){notify('操作失败','❌');});
}

function showRejectTrade() { document.getElementById('rejectTradeModal').classList.add('show'); }
function closeRejectTrade() { document.getElementById('rejectTradeModal').classList.remove('show'); }
function confirmRejectTrade() {
  var reason = document.getElementById('rejectTradeReason').value;
  var detail = document.getElementById('rejectTradeDetail').value.trim();
  var msg = reason + (detail ? ' - '+detail : '');
  if (!chatProductId) return;
  fetch('/api/marketplace/trade/cancel', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product_id:chatProductId})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok){
        notify('已拒绝交易','✕');
        fetch('/api/marketplace/messages', {method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({product_id:chatProductId,from_student_id:currentUser.student_id,from_name:currentUser.name,to_student_id:chatOtherStudent||'',to_name:chatOtherName||'',content:'✕ 拒绝交易：'+msg})
        }).catch(function(){});
        closeRejectTrade();
        fetch('/api/marketplace/products/'+chatProductId).then(function(r){return r.json();}).then(function(p){updateTradeButtons(p);}).catch(function(){});
      }
    }).catch(function(){});
}

function sendChat() {
  try {
    var now = Date.now();
    if (now - _lastChatTime < 1000) { notify('发送太快，请稍等', '⏳'); return; }
    _lastChatTime = now;
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text) { notify('输入消息', '✏️'); return; }
    if (chatProductId === null || chatProductId === undefined) { notify('请先选择对话', '💬'); return; }
    if (!currentUser) { notify('请先登录', '🔑'); showLogin(); return; }
    input.value = '';
    fetch('/api/marketplace/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({product_id:chatProductId,from_student_id:currentUser.student_id,from_name:currentUser.name,to_student_id:chatOtherStudent||'',to_name:chatOtherName||'',content:text})
    }).then(function(r){return r.json();}).then(function(m){
      if (m && m.id) { appendMsg({id:m.id,product_id:chatProductId,from_student_id:currentUser.student_id,from_name:currentUser.name,content:text,created_at:new Date().toISOString()}, false); }
    }).catch(function(e){notify('发送失败','❌');});
  } catch(e) { notify('发送出错', '❌'); console.error(e); }
}

var _chatPollTimer = null;
function startChatPoll() {
  stopChatPoll();
  if (chatProductId === null || chatProductId === undefined || !currentUser) return;
  var lastId = 0;
  _chatPollTimer = setInterval(function() {
    if ((chatProductId === null || chatProductId === undefined) || !currentUser) { stopChatPoll(); return; }
    var url = '/api/marketplace/messages?student_id='+currentUser.student_id+'&other_student_id='+(chatOtherStudent||'');
    if (lastId) url += '&since_id='+lastId;
    fetch(url)
      .then(function(r){return r.json();})
      .then(function(data){
        var arr = Array.isArray(data)?data:[];
        arr.forEach(function(m) {
          if (m.id > lastId) { lastId = m.id; appendMsg(m, true); }
        });
      }).catch(function(){});
  }, 1000);
}
function stopChatPoll() {
  if (_chatPollTimer) { clearInterval(_chatPollTimer); _chatPollTimer = null; }
}

  fetch('/api/marketplace/contacts?student_id='+currentUser.student_id)
    .then(function(r){return r.json();})
    .then(function(data){
      var arr = Array.isArray(data)?data:[];
      if (search) arr = arr.filter(function(c) { return (c.name||'').toLowerCase().includes(search) || (c.student_id||'').includes(search); });
      var el = document.getElementById('contactList');
      if (!arr.length) { el.innerHTML = '<div style="text-align:center;padding:30px;color:rgba(0,0,0,.1);font-size:12px">暂无联系人</div>'; return; }

      }).join('');
    });
}
function closeContacts() { var _ov=document.getElementById('contactsOverlay');document.getElementById('contactSidebar').classList.remove('show');if(_ov)_ov.classList.remove('show'); }

var _unreadTimer = null;
function startUnreadPoll() {
  if (_unreadTimer) clearInterval(_unreadTimer);
  if (!currentUser) return;
  var lastCheck = 0;
  _unreadTimer = setInterval(function() {
    if (!currentUser) { clearInterval(_unreadTimer); _unreadTimer = null; return; }
    fetch('/api/marketplace/messages?student_id='+currentUser.student_id)
      .then(function(r){return r.json();})
      .then(function(data){
        var arr = Array.isArray(data)?data:[];
        var unread = 0;
        var latest = 0;
        arr.forEach(function(m) {
          var t = new Date(m.created_at).getTime();
          if (t > latest) latest = t;
          if (m.to_student_id === currentUser.student_id && !m.read) unread++;
        });
        if (latest > lastCheck) { lastCheck = latest; }
        var badge = document.getElementById('chatBadge');
        if (unread > 0) { badge.textContent = unread; playMsgSound(); }
        else { badge.textContent = '0'; }
        // Also update conv list if open
        if (document.getElementById('chatPanel').classList.contains('show')) loadConvs();
      }).catch(function(){});
  }, 2000);
}

var _productTimer = null;
function startProductPoll() {
  if (_productTimer) clearInterval(_productTimer);
  var lastCount = 0;
  _productTimer = setInterval(function() {
    fetch('/api/marketplace/products?limit=1&offset=0')
      .then(function(r){return r.json();})
      .then(function(json){
        var total = json.total || (Array.isArray(json)?json.length:0);
        if (lastCount > 0 && total !== lastCount) { load(); }
        lastCount = total;
      }).catch(function(){});
  }, 5000);
}

function showMyProducts() {
  document.getElementById('myOverlay').classList.add('show');
  loadMyProducts();
}
function hideMyProducts() { document.getElementById('myOverlay').classList.remove('show'); }
function loadMyProducts() {
  if (!currentUser) return;
  fetch('/api/marketplace/products?owner='+currentUser.student_id+'&limit=50&offset=0')
    .then(function(r){return r.json();})
    .then(function(json){
      var data = Array.isArray(json.data) ? json.data : (Array.isArray(json) ? json : []);
      var el = document.getElementById('myProductList');
      if (!data.length) { el.innerHTML = '<div class="empty" style="padding:30px">还没有发布过商品</div>'; return; }
      el.innerHTML = '<div style="display:grid;gap:8px">' + data.map(function(p){
        var statusMap = {pending:'待审核',approved:'已上架',rejected:'未通过'};
        var sLabel = p.sold ? '已售罄' : (statusMap[p.status]||p.status);
        var sClass = p.sold ? 'sold' : p.status;
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.04);border-radius:10px;font-size:12px"><span style="flex:1">'+esc(p.title)+'</span><span style="color:#34d399;font-weight:600;margin:0 12px">¥'+parseFloat(p.price).toFixed(0)+'</span><span class="status-badge '+sClass+'">'+sLabel+'</span></div>';
      }).join('') + '</div>';
    }).catch(function(){document.getElementById('myProductList').innerHTML='<div class="empty">加载失败</div>';});
}

function appendMsg(m, isHistory) {
  var el = document.getElementById('chatMsgs');
  if (!el) return;
  // Dedup by checking if message already exists
  if (m.id && el.querySelector('[data-msgid="'+m.id+'"]')) return;
  var mine = currentUser && m.from_student_id === currentUser.student_id;
  var d = new Date(m.created_at);
  var timeStr = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  var name = m.from_name || (mine ? '我' : '对方');
  // Try to show nickname
  if (!mine) {
    fetch('/api/verify/list').then(function(r){return r.json();}).then(function(vers){
      var arr = Array.isArray(vers)?vers:[];
      var sender = arr.find(function(v){ return v.student_id === m.from_student_id; });
      if (sender && sender.nickname) {
        var msgDiv = el.lastChild;
        if (msgDiv) { var s = msgDiv.querySelector('.sender'); if (s) s.textContent = sender.nickname; }
      }
    }).catch(function(){});
  }
  var div = document.createElement('div');
  div.className = 'chat-msg ' + (mine ? 'mine' : 'other');
  if (m.id) div.setAttribute('data-msgid', m.id);
  div.innerHTML = '<div class="sender">'+esc(name)+'</div><div class="bubble">'+esc(m.content)+'</div><span class="time">'+timeStr+'</span>';
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// Restore state
try {
  var saved = JSON.parse(localStorage.getItem('marketState'));
  if (saved) {
    if (saved.cat) { selCat = saved.cat; }
    if (saved.search) { document.getElementById('searchInput').value = saved.search; }
    if (saved.page && saved.page > 1) { pageOffset = (saved.page - 1) * 10; }
  }
} catch(e) {}
// Populate school selector
var schoolSel = document.getElementById('vSchool');
if (schoolSel && SCHOOLS) {
  SCHOOLS.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s.id; opt.textContent = s.name;
    schoolSel.appendChild(opt);
  });
}
// Populate visitor school selector
var visSel = document.getElementById('visitorSchool');
if (visSel && SCHOOLS) {
  SCHOOLS.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s.id; opt.textContent = s.name;
    visSel.appendChild(opt);
  });
  // Restore saved selection
  var savedSchool = localStorage.getItem('visitorSchool');
  if (savedSchool) visSel.value = savedSchool;
}
// School selection changes
document.getElementById('visitorSchool').onchange = function() {
  localStorage.setItem('visitorSchool', this.value);
  load();
};
loadCats();
load(false);
loadAnn();
loadPromos();
startProductPoll();
</script>
