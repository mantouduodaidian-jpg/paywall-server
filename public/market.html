<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>校园严选 · 二手集市</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a1a0f;color:#c8e6c9;min-height:100vh}

/* ===== Announcement Bar ===== */
.ann-bar{background:rgba(52,211,153,.06);border-bottom:1px solid rgba(52,211,153,.1);padding:8px 24px;font-size:12px;color:rgba(255,255,255,.4);display:none;align-items:center;gap:8px;overflow:hidden}
.ann-bar.show{display:flex}
.ann-bar .ann-dot{width:6px;height:6px;border-radius:50%;background:#34d399;flex-shrink:0}
.ann-bar .ann-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== Header ===== */
.header{background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.04);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header .logo{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.header .logo span{background:linear-gradient(135deg,#6ee7b7,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:12px;color:rgba(255,255,255,.15)}
.header .actions{display:flex;gap:8px}
.header .actions a{padding:8px 20px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600;transition:all .15s}
.header .actions .pub{background:linear-gradient(135deg,#059669,#34d399);color:#fff}
.header .actions .pub:hover{opacity:.9}
.header .actions .dash{border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.3)}
.header .actions .dash:hover{border-color:rgba(52,211,153,.2);color:rgba(255,255,255,.5)}

/* ===== Main Layout ===== */
.main{display:flex;max-width:1200px;margin:0 auto;padding:20px 24px;gap:24px}
.sidebar{width:220px;flex-shrink:0}
.content{flex:1;min-width:0}

/* Sidebar */
.sidebar .search{margin-bottom:16px}
.sidebar .search input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#c8e6c9;font-size:14px;outline:none;font-family:inherit}
.sidebar .search input:focus{border-color:rgba(52,211,153,.2)}
.sidebar .section-title{font-size:11px;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sidebar .cat{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.35);transition:all .1s;margin-bottom:2px}
.sidebar .cat:hover{background:rgba(255,255,255,.03);color:rgba(255,255,255,.5)}
.sidebar .cat.active{background:rgba(52,211,153,.06);color:#34d399;font-weight:600}

/* Stats */
.sidebar .stats{margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.04)}
.sidebar .stats .row{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.2);padding:3px 0}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:rgba(52,211,153,.15);transform:translateY(-4px);box-shadow:0 8px 25px rgba(0,0,0,.2)}
.card .img{width:100%;aspect-ratio:1;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:48px;color:rgba(255,255,255,.06)}
.card .info{padding:12px 14px}
.card .info .title{font-size:15px;color:rgba(255,255,255,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .info .price{font-size:20px;font-weight:700;color:#34d399;margin:4px 0}
.card .info .meta{display:flex;gap:8px;font-size:11px;color:rgba(255,255,255,.2);flex-wrap:wrap}
.card .info .meta .tag{padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.04)}
.card .sold-badge{position:absolute;top:8px;right:8px;background:rgba(239,68,68,.15);color:#ef4444;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;backdrop-filter:blur(4px)}

.empty{text-align:center;padding:60px;color:rgba(255,255,255,.06);font-size:14px;grid-column:1/-1}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;overflow-y:auto;padding:20px}
.modal-overlay.show{display:block}
.modal-box{background:#0a1a0f;border-radius:16px;max-width:600px;margin:40px auto;border:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column}
.modal-box .img-big{width:100%;max-height:400px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;overflow:hidden}
.modal-box .img-big img{width:100%;height:100%;object-fit:cover}
.modal-box .body{padding:20px}
.modal-box .body .title{font-size:22px;font-weight:600;color:rgba(255,255,255,.7)}
.modal-box .body .price{font-size:32px;font-weight:700;color:#34d399;margin:8px 0 12px}
.modal-box .body .tags{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.modal-box .body .tags span{padding:3px 12px;border-radius:6px;font-size:12px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.3)}
.modal-box .body .desc{font-size:14px;line-height:1.8;color:rgba(255,255,255,.4);margin-bottom:20px}
.modal-box .body .btns{display:flex;gap:8px}
.modal-box .body .btns .contact{flex:1;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#059669,#34d399);color:#fff;font-size:15px;cursor:pointer;font-weight:600;text-align:center;text-decoration:none}
.modal-box .body .btns .close{padding:12px 20px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:transparent;color:rgba(255,255,255,.3);font-size:14px;cursor:pointer}
.modal-box .body .report-link{display:inline-block;margin-top:12px;font-size:11px;color:rgba(255,255,255,.15);cursor:pointer;text-decoration:underline}
.modal-box .body .report-link:hover{color:rgba(239,68,68,.5)}

/* Publish Form */
.pub-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:60;overflow-y:auto;padding:20px}
.pub-overlay.show{display:block}
.pub-box{background:#0a1a0f;border-radius:16px;max-width:560px;margin:30px auto;padding:28px;border:1px solid rgba(255,255,255,.06)}
.pub-box h2{font-size:20px;color:rgba(255,255,255,.5);margin-bottom:20px}
.pub-box .row{display:flex;gap:10px;margin-bottom:10px}
.pub-box .row input,.pub-box .row select{flex:1}
.pub-box input,.pub-box select,.pub-box textarea{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:14px;outline:0;font-family:inherit;-webkit-tap-highlight-color:transparent;box-shadow:none}
.pub-box input:focus,.pub-box select:focus,.pub-box textarea:focus{border-color:rgba(52,211,153,.4);background:rgba(0,0,0,.35);outline:0;-webkit-tap-highlight-color:transparent;box-shadow:0 0 0 2px rgba(52,211,153,.08)}
.pub-box textarea{min-height:100px;resize:vertical}
.pub-box .btns{display:flex;gap:8px;margin-top:16px}
.pub-box .btns button{flex:1;padding:12px;border-radius:12px;border:none;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit}
.pub-box .btns .submit{background:linear-gradient(135deg,#059669,#34d399);color:#fff}
.pub-box .btns .cancel{background:rgba(255,255,255,.04);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.06)}

/* Report Modal */
.report-modal .pub-box{max-width:460px}
.report-modal select,.report-modal textarea,.report-modal input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:14px;outline:none;font-family:inherit;margin-bottom:10px;-webkit-tap-highlight-color:transparent}
.report-modal select:focus,.report-modal textarea:focus,.report-modal input:focus{border-color:rgba(52,211,153,.3);background:rgba(0,0,0,.3);-webkit-tap-highlight-color:transparent}
.report-modal textarea{min-height:80px;resize:vertical}

.toast-notif{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:rgba(10,26,15,.95);border:1px solid rgba(52,211,153,.2);border-radius:14px;padding:14px 24px;display:flex;align-items:center;gap:10px;z-index:200;transition:top .4s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.4);font-size:14px;white-space:nowrap;max-width:90vw}
.toast-notif.show{top:24px}
.toast-icon{font-size:18px}
.toast-msg{color:#c8e6c9;font-weight:500}

@media(max-width:768px){
  .main{flex-direction:column;padding:16px}
  .sidebar{width:100%}
  .sidebar .cats{display:flex;gap:6px;overflow-x:auto}
  .sidebar .cats .cat{white-space:nowrap;flex-shrink:0}
  .sidebar .stats{display:none}
  .grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- Announcement Bar -->
<div class="ann-bar" id="annBar">
  <span class="ann-dot"></span>
  <span class="ann-text" id="annText"></span>
</div>

<!-- Header -->
<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo"><svg viewBox="0 0 28 28" width="22" height="22" style="vertical-align:middle"><path d="M6 2h12l4 4v18a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" fill="url(#gF)" stroke="#a7f3d0" stroke-width="1" stroke-linejoin="round"/><path d="M18 2v4h4" fill="url(#gF)" stroke="#a7f3d0" stroke-width=".8" stroke-linejoin="round"/><polygon points="14 8 17.5 12.5 14 17 10.5 12.5" fill="url(#lo2)" stroke="#a7f3d0" stroke-width=".8" stroke-linejoin="round"/><polygon points="14 10 15.8 12.5 14 15 12.2 12.5" fill="rgba(255,255,255,.25)"/></svg> <span>校园严选</span></div>
    <div class="sub">严格认证 · 当面交易</div>
  </div>
  <div class="actions">
    <span id="userInfo" style="display:none;font-size:12px;color:rgba(255,255,255,.4);align-items:center;gap:6px">
      <span id="userName"></span>
      <a href="#" onclick="logout();return false" style="color:rgba(255,255,255,.2);font-size:11px;text-decoration:none">退出</a>
    </span>
    <a href="#" class="dash" id="loginBtn" onclick="showLogin();return false">登录</a>
    <a href="#" class="pub" onclick="if(showLoginForPub())showPub();return false">+ 发布闲置</a>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="search">
      <input id="searchInput" placeholder="搜索物品..." onkeydown="if(event.key==='Enter')load()">
    </div>
    <div class="section-title">分类</div>
    <div class="cats" id="catList"></div>
    <div class="stats">
      <div class="row"><span>收录商品</span><span id="statCount">0</span></div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:13px;color:rgba(255,255,255,.2)" id="resultLabel">全部商品</span>
    </div>
    <div class="grid" id="productList"><div class="empty">加载中...</div></div>
  </div>
</div>

<!-- Publish -->
<div class="pub-overlay" id="pubOverlay">
  <div class="pub-box">
    <h2>📝 发布闲置</h2>
    <input type="text" id="fTitle" placeholder="物品名称 *">
    <div class="row">
      <input type="number" id="fPrice" placeholder="价格（元）*" step="0.01">
      <select id="fCat"><option value="">分类</option></select>
    </div>
    <div class="row">
      <select id="fQuality"><option value="">新旧程度</option><option>全新</option><option>九成新</option><option>八成新</option><option>七成新</option><option>五成新</option></select>
      <input type="text" id="fContact" placeholder="联系方式 (微信)">
    </div>
    <textarea id="fDesc" placeholder="描述（版本、使用情况、面交地点...）"></textarea>
    <div style="margin-bottom:10px">
      <label style="display:inline-block;padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:rgba(255,255,255,.3);font-size:12px;cursor:pointer">📷 添加照片
        <input type="file" id="fImage" accept="image/*" style="display:none" onchange="previewImg(this)">
      </label>
      <span id="fImageName" style="font-size:11px;color:rgba(255,255,255,.2);margin-left:8px"></span>
    </div>
    <div id="fImagePreview" style="margin-bottom:10px;display:none">
      <img id="fImagePreviewImg" style="max-width:100%;max-height:150px;border-radius:8px;border:1px solid rgba(255,255,255,.06)">
    </div>
    <div class="btns">
      <button class="submit" onclick="publish()">✅ 确认发布</button>
      <button class="cancel" onclick="hidePub()">取消</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)hideDetail()">
  <div class="modal-box" id="detailBox"></div>
</div>

<!-- Report Modal -->
<div class="pub-overlay report-modal" id="reportOverlay">
  <div class="pub-box">
    <h2>🚨 举报商品</h2>
    <select id="rReason">
      <option value="">请选择举报原因</option>
      <option>虚假信息</option>
      <option>已售不删</option>
      <option>价格欺诈</option>
      <option>违规商品</option>
      <option>其他</option>
    </select>
    <textarea id="rDetail" placeholder="补充说明（选填）"></textarea>
    <input type="text" id="rContact" placeholder="你的联系方式（选填）">
    <div class="btns">
      <button class="submit" onclick="submitReport()">提交举报</button>
      <button class="cancel" onclick="hideReport()">取消</button>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast-notif" id="toastNotif">
  <span class="toast-icon" id="toastIcon">✅</span>
  <span class="toast-msg" id="toastMsg"></span>
</div>

<!-- Login Modal -->
<div class="pub-overlay" id="loginOverlay">
  <div class="pub-box" style="max-width:400px">
    <h2>🔑 登录</h2>
    <input type="text" id="loginId" placeholder="学号 *">
    <input type="password" id="loginPhone" placeholder="电话（密码）*">
    <div style="font-size:12px;color:rgba(255,255,255,.15);margin-bottom:10px">还没有账号？<a href="#" onclick="hideLogin();showVerify();return false" style="color:#34d399">立即认证</a></div>
    <div class="btns">
      <button class="submit" onclick="doLogin()">登录</button>
      <button class="cancel" onclick="hideLogin()">取消</button>
    </div>
  </div>
</div>

<!-- Verify Modal -->
<div class="pub-overlay" id="verifyOverlay">
  <div class="pub-box" style="max-width:460px">
    <h2>🪪 实名认证</h2>
    <p style="font-size:13px;color:rgba(255,255,255,.25);margin-bottom:16px">认证通过后即可用学号+电话登录</p>
    <input type="text" id="vName" placeholder="真实姓名 *">
    <input type="text" id="vStudentId" placeholder="学号 *">
    <input type="text" id="vPhone" placeholder="手机号 *">
    <div style="margin-bottom:10px">
      <label style="display:inline-block;padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:rgba(255,255,255,.3);font-size:12px;cursor:pointer">📷 上传学生证照片
        <input type="file" id="vStudentCard" accept="image/*" style="display:none" onchange="previewStudentCard(this)">
      </label>
      <span id="vCardName" style="font-size:11px;color:rgba(255,255,255,.2);margin-left:8px"></span>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.15);margin:8px 0">信息仅用于认证，不会公开</div>
    <div class="btns">
      <button class="submit" onclick="applyVerify()">提交认证</button>
      <button class="cancel" onclick="hideVerify()">取消</button>
    </div>
  </div>
</div>

<script>
let selCat = '';
let reportingProductId = null;

// ====== Toast Notification ======
function notify(msg, icon) {
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = icon||'✅';
  const el = document.getElementById('toastNotif');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ====== Categories ======
async function loadCats() {
  try {
    const r = await fetch('/api/marketplace/categories');
    const cats = await r.json();
    const arr = Array.isArray(cats) ? cats : [];
    const catHtml = '<div class="cat active" onclick="setCat(\'\')">'+getCatIcon('全部')+' 全部</div>' +
      arr.map(c => '<div class="cat" onclick="setCat(\''+esc(c.name)+'\')">'+(getCatIcon(c.name))+' '+esc(c.name)+'</div>').join('');
    document.getElementById('catList').innerHTML = catHtml;
    // Also populate publish form
    document.getElementById('fCat').innerHTML = '<option value="">分类</option>' +
      arr.map(c => '<option value="'+esc(c.name)+'">'+(c.icon||'')+' '+esc(c.name)+'</option>').join('');
  } catch(e) {
    // Fallback hardcoded
    document.getElementById('catList').innerHTML = '<div class="cat active" onclick="setCat(\'\')">🏠 全部</div>' +
      ['教材笔记','数码配件','宿舍神器','生活百货','其他'].map(c => '<div class="cat" onclick="setCat(\''+c+'\')">'+c+'</div>').join('');
  }
}

// ====== Announcements ======
async function loadAnn() {
  try {
    const r = await fetch('/api/marketplace/announcements');
    const data = await r.json();
    const arr = Array.isArray(data) ? data : [];
    if (arr.length) {
      document.getElementById('annText').textContent = arr[0].title + (arr[0].content ? ' — ' + arr[0].content : '');
      document.getElementById('annBar').classList.add('show');
    }
  } catch(e) {}
}

// ====== Products ======
function setCat(c) {
  selCat = c;
  document.querySelectorAll('#catList .cat').forEach(el => el.classList.toggle('active', el.textContent.includes(c) || (c==='' && el.textContent.includes('全部'))));
  load();
}

async function load() {
  const search = document.getElementById('searchInput').value.trim();
  let url = '/api/marketplace/products';
  if (selCat) url += '?category='+selCat;
  if (search) url += (selCat?'&':'?')+'search='+encodeURIComponent(search);
  try {
    const r = await fetch(url); const data = await r.json();
    document.getElementById('statCount').textContent = data.length;
    document.getElementById('resultLabel').textContent = (selCat||'全部')+(search?' · "'+search+'"':'')+' · '+data.length+' 件';
    const list = document.getElementById('productList');
    if (!data.length) { list.innerHTML = '<div class="empty">🌱 还没有商品，快来发布第一个</div>'; return; }
    list.innerHTML = data.map(p =>
      '<div class="card" onclick="showDetail('+p.id+')"><div class="img">📦</div><div class="info"><div class="title">'+esc(p.title)+'</div><div class="price">¥'+parseFloat(p.price).toFixed(0)+'</div><div class="meta"><span class="tag">'+esc(p.quality)+'</span><span class="tag">'+esc(p.category)+'</span></div></div>'+
      (p.sold?'<div class="sold-badge">已售罄</div>':'')+
      '</div>'
    ).join('');
  } catch(e) { document.getElementById('productList').innerHTML = '<div class="empty">加载失败</div>'; }
}

// ====== Detail ======
async function showDetail(id) {
  try {
    const r = await fetch('/api/marketplace/products/'+id); const p = await r.json();
    if(!p) return;
    reportingProductId = p.id;
    document.getElementById('detailBox').innerHTML =
      '<div class="img-big">'+(p.images && p.images[0] && p.images[0].startsWith('data:') ? '<img src="'+p.images[0]+'">' : '<span style="font-size:80px">📦</span>')+'</div><div class="body">'+
      '<div class="title">'+esc(p.title)+(p.sold?' <span style="color:#ef4444;font-size:14px">[已售罄]</span>':'')+'</div>'+
      '<div class="price">¥'+parseFloat(p.price).toFixed(2)+'</div>'+
      '<div class="tags"><span>'+esc(p.quality)+'</span><span>'+esc(p.category)+'</span></div>'+
      (p.desc?'<div class="desc">'+esc(p.desc)+'</div>':'')+
      '<div class="btns">'+
      (p.contact && !p.sold ? '<a class="contact" href="https://weixin://dl/business/?t='+p.contact+'">📱 联系卖家：'+esc(p.contact)+'</a>' : (p.sold ? '<span class="contact" style="opacity:.3;cursor:default">已售罄</span>' : ''))+
      '<button class="close" onclick="hideDetail()">关闭</button></div>'+
      '<div class="report-link" onclick="hideDetail();showReport('+p.id+')">🚨 举报</div></div>';
    document.getElementById('detailModal').classList.add('show');
  } catch(e) {}
}
function hideDetail(){document.getElementById('detailModal').classList.remove('show')}

// ====== Publish ======
function showPub(){document.getElementById('pubOverlay').classList.add('show')}
function hidePub(){document.getElementById('pubOverlay').classList.remove('show')}

async function publish(){
  const title=document.getElementById('fTitle').value.trim();
  const price=document.getElementById('fPrice').value;
  if(!title||!price){notify('请填写名称和价格', '⚠️');return}
  const btn = document.querySelector('.pub-box .submit');
  btn.textContent='⏳ 发布中...'; btn.disabled=true;
  const data={
    title,price:parseFloat(price),category:document.getElementById('fCat').value||'其他',
    quality:document.getElementById('fQuality').value||'八成新',
    desc:document.getElementById('fDesc').value.trim(),
    contact:document.getElementById('fContact').value.trim(),
    images: window._uploadedImages || []
  };
  try{
    const r=await fetch('/api/marketplace/products',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const d=await r.json();
    btn.textContent='✅ 确认发布'; btn.disabled=false;
    const ok = d?.id || d?.[0]?.id || d?.ok;
    if(ok){hidePub();document.getElementById('fTitle').value='';document.getElementById('fPrice').value='';document.getElementById('fDesc').value='';document.getElementById('fContact').value='';document.getElementById('fImageName').textContent='';document.getElementById('fImagePreview').style.display='none';document.getElementById('fImage').value='';window._uploadedImages=[];load();}
    else notify(d.error || '发布失败', '❌');
  }catch(e){btn.textContent='✅ 确认发布'; btn.disabled=false; notify('发布失败', '❌');}
}

// ====== Report ======
function showReport(id) {
  reportingProductId = id;
  document.getElementById('reportOverlay').classList.add('show');
}
function hideReport() {
  document.getElementById('reportOverlay').classList.remove('show');
  reportingProductId = null;
}
async function submitReport(){
  const reason = document.getElementById('rReason').value;
  if (!reason || !reportingProductId) { notify('请选择举报原因', '⚠️'); return; }
  try {
    const r = await fetch('/api/marketplace/reports', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({product_id: reportingProductId, reason, detail: document.getElementById('rDetail').value.trim(), reporter_contact: document.getElementById('rContact').value.trim()})
    });
    const d = await r.json();
    if (d.ok) { notify('举报已提交，管理员会尽快处理', '✅'); hideReport(); }
    else notify('提交失败', '❌');
  } catch(e) { notify('提交失败', '❌'); }
}

// ====== Login / Auth ======
let currentUser = null;
try { const u = localStorage.getItem('marketUser'); if (u) currentUser = JSON.parse(u); } catch(e) {}
if (currentUser) { renderLoggedIn(); }

function renderLoggedIn() {
  document.getElementById('loginBtn').style.display = 'none';
  document.getElementById('userInfo').style.display = 'flex';
  document.getElementById('userName').textContent = '👤 ' + (currentUser?.name || '用户');
}
function renderLoggedOut() {
  document.getElementById('loginBtn').style.display = '';
  document.getElementById('userInfo').style.display = 'none';
  currentUser = null;
  localStorage.removeItem('marketUser');
}

function showLogin(){document.getElementById('loginOverlay').classList.add('show')}
function hideLogin(){document.getElementById('loginOverlay').classList.remove('show')}
async function doLogin(){
  const student_id = document.getElementById('loginId').value.trim();
  const phone = document.getElementById('loginPhone').value.trim();
  if(!student_id||!phone){notify('请填写学号和电话', '⚠️');return}
  if(student_id.length!==13){notify('学号应为13位', '⚠️');return}
  if(phone.length!==11){notify('手机号应为11位', '⚠️');return}
  const btn=document.querySelector('#loginOverlay .submit');
  btn.textContent='⏳';btn.disabled=true;
  try{
    const r=await fetch('/api/marketplace/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({student_id,phone})});
    const d=await r.json();
    btn.textContent='登录';btn.disabled=false;
    if(d.ok&&d.user){currentUser=d.user;localStorage.setItem('marketUser',JSON.stringify(d.user));renderLoggedIn();hideLogin();notify('登录成功', '✅');}
    else notify(d.msg||'登录失败', '❌');
  }catch(e){btn.textContent='登录';btn.disabled=false;notify('登录失败', '❌');}
}

function logout(){
  if(!confirm('确认退出？'))return;
  renderLoggedOut();
}

function showLoginForPub() {
  if (!currentUser) { notify('请先登录再发布', '⚠️'); showLogin(); return false; }
  return true;
}

// ====== Verification ======
function showVerify(){document.getElementById('verifyOverlay').classList.add('show');document.getElementById('loginOverlay').classList.remove('show')}
function hideVerify(){document.getElementById('verifyOverlay').classList.remove('show')}
async function applyVerify(){
  const n=document.getElementById('vName').value.trim(),s=document.getElementById('vStudentId').value.trim(),p=document.getElementById('vPhone').value.trim();
  if(!n||!s||!p){notify('请填写完整信息', '⚠️');return}
  if(s.length!==13){notify('学号应为13位', '⚠️');return}
  if(p.length!==11){notify('手机号应为11位', '⚠️');return}
  const btn=document.querySelector('#verifyOverlay .submit');
  btn.textContent='⏳';btn.disabled=true;
  try{
    const r=await fetch('/api/marketplace/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,student_id:s,phone:p,image:window._cardImage||''})});
    const d=await r.json();
    btn.textContent='提交认证';btn.disabled=false;
    if(d.ok){notify(d.msg, '✅');hideVerify();window._cardImage='';document.getElementById('vCardName').textContent='';}
    else notify(d.msg||'提交失败', '❌');
  }catch(e){btn.textContent='提交认证';btn.disabled=false;notify('提交失败', '❌');}
}

// ====== Student Card Upload ======
window._cardImage = '';
function previewStudentCard(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5*1024*1024) { notify('图片不能超过5MB', '⚠️'); return; }
  document.getElementById('vCardName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(e) { window._cardImage = e.target.result; };
  reader.readAsDataURL(file);
}

// ====== Image Upload ======
window._uploadedImages = [];
function previewImg(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5*1024*1024) { notify('图片不能超过5MB', '⚠️'); return; }
  document.getElementById('fImageName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(e) {
    window._uploadedImages = [e.target.result];
    document.getElementById('fImagePreviewImg').src = e.target.result;
    document.getElementById('fImagePreview').style.display = '';
  };
  reader.readAsDataURL(file);
}
