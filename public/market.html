<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>校园严选 · 二手集市</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a1a0f;color:#c8e6c9;min-height:100vh}

/* ===== Announcement Bar ===== */
.ann-bar{background:rgba(52,211,153,.06);border-bottom:1px solid rgba(52,211,153,.1);padding:8px 24px;font-size:12px;color:rgba(255,255,255,.4);display:none;align-items:center;gap:8px;overflow:hidden}
.ann-bar.show{display:flex}
.ann-bar .ann-dot{width:6px;height:6px;border-radius:50%;background:#34d399;flex-shrink:0}
.ann-bar .ann-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== Header ===== */
.header{background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.04);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header .logo{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.header .logo span{background:linear-gradient(135deg,#6ee7b7,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:12px;color:rgba(255,255,255,.15)}
.header .actions{display:flex;gap:8px}
.header .actions a{padding:8px 20px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600;transition:all .15s}
.header .actions .pub{background:linear-gradient(135deg,#059669,#34d399);color:#fff}
.header .actions .pub:hover{opacity:.9}
.header .actions .dash{border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.3)}
.header .actions .dash:hover{border-color:rgba(52,211,153,.2);color:rgba(255,255,255,.5)}

/* ===== Main Layout ===== */
.main{display:flex;max-width:1200px;margin:0 auto;padding:20px 24px;gap:24px}
.sidebar{width:220px;flex-shrink:0}
.content{flex:1;min-width:0}

/* Sidebar */
.sidebar .search{margin-bottom:16px}
.sidebar .search input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#c8e6c9;font-size:14px;outline:none;font-family:inherit}
.sidebar .search input:focus{border-color:rgba(52,211,153,.2)}
.sidebar .section-title{font-size:11px;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sidebar .cat{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.35);transition:all .1s;margin-bottom:2px}
.sidebar .cat:hover{background:rgba(255,255,255,.03);color:rgba(255,255,255,.5)}
.sidebar .cat.active{background:rgba(52,211,153,.06);color:#34d399;font-weight:600}

/* Stats */
.sidebar .stats{margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.04)}
.sidebar .stats .row{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.2);padding:3px 0}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:rgba(52,211,153,.15);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.card .img{width:100%;aspect-ratio:1;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:36px;color:rgba(255,255,255,.06)}
.card .info{padding:8px 10px}
.card .info .title{font-size:13px;color:rgba(255,255,255,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .info .price{font-size:17px;font-weight:700;color:#34d399;margin:3px 0}
.card .info .meta{display:flex;gap:6px;font-size:10px;color:rgba(255,255,255,.2);flex-wrap:wrap}
.card .info .meta .tag{padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.04)}
.card .sold-badge{position:absolute;top:8px;right:8px;background:rgba(239,68,68,.15);color:#ef4444;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;backdrop-filter:blur(4px)}

.empty{text-align:center;padding:60px;color:rgba(255,255,255,.06);font-size:14px;grid-column:1/-1}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;overflow-y:auto;padding:20px}
.modal-overlay.show{display:block}
.modal-box{background:#0a1a0f;border-radius:16px;max-width:600px;margin:40px auto;border:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column}
.modal-box .img-big{width:100%;max-height:400px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;overflow:hidden}
.modal-box .img-big img{width:100%;height:100%;object-fit:cover}
.modal-box .body{padding:20px}
.modal-box .body .title{font-size:22px;font-weight:600;color:rgba(255,255,255,.7)}
.modal-box .body .price{font-size:32px;font-weight:700;color:#34d399;margin:8px 0 12px}
.modal-box .body .tags{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.modal-box .body .tags span{padding:3px 12px;border-radius:6px;font-size:12px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.3)}
.modal-box .body .desc{font-size:14px;line-height:1.8;color:rgba(255,255,255,.4);margin-bottom:20px}
.modal-box .body .btns{display:flex;gap:8px}
.modal-box .body .btns .contact{flex:1;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#059669,#34d399);color:#fff;font-size:15px;cursor:pointer;font-weight:600;text-align:center;text-decoration:none}
.modal-box .body .btns .close{padding:12px 20px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:transparent;color:rgba(255,255,255,.3);font-size:14px;cursor:pointer}
.modal-box .body .report-link{display:inline-block;margin-top:12px;font-size:11px;color:rgba(255,255,255,.15);cursor:pointer;text-decoration:underline}
.modal-box .body .report-link:hover{color:rgba(239,68,68,.5)}

/* Publish Form */
.pub-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:60;overflow-y:auto;padding:20px}
.pub-overlay.show{display:block}
.pub-box{background:#0a1a0f;border-radius:16px;max-width:560px;margin:30px auto;padding:28px;border:1px solid rgba(255,255,255,.06)}
.pub-box h2{font-size:20px;color:rgba(255,255,255,.5);margin-bottom:20px}
.pub-box .row{display:flex;gap:10px;margin-bottom:10px}
.pub-box .row input,.pub-box .row select{flex:1}
.pub-box input,.pub-box select,.pub-box textarea{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#d4f0d4;font-size:14px;outline:0;font-family:inherit;-webkit-tap-highlight-color:transparent;box-shadow:none}
.pub-box select option{background:#0a1a0f;color:#c8e6c9}
.pub-box input:focus,.pub-box select:focus,.pub-box textarea:focus{border-color:rgba(52,211,153,.4);background:rgba(0,0,0,.35);outline:0;-webkit-tap-highlight-color:transparent;box-shadow:0 0 0 2px rgba(52,211,153,.08)}
.pub-box textarea{min-height:100px;resize:vertical}
.pub-box .btns{display:flex;gap:8px;margin-top:16px}
.pub-box .btns button{flex:1;padding:12px;border-radius:12px;border:none;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit}
.pub-box .btns .submit{background:linear-gradient(135deg,#059669,#34d399);color:#fff}
.pub-box .btns .cancel{background:rgba(255,255,255,.04);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.06)}

/* Report Modal */
.report-modal .pub-box{max-width:460px}
.report-modal select,.report-modal textarea,.report-modal input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:14px;outline:none;font-family:inherit;margin-bottom:10px;-webkit-tap-highlight-color:transparent}
.report-modal select:focus,.report-modal textarea:focus,.report-modal input:focus{border-color:rgba(52,211,153,.3);background:rgba(0,0,0,.3);-webkit-tap-highlight-color:transparent}
.report-modal textarea{min-height:80px;resize:vertical}

.toast-notif{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:rgba(10,26,15,.95);border:1px solid rgba(52,211,153,.2);border-radius:14px;padding:14px 24px;display:flex;align-items:center;gap:10px;z-index:200;transition:top .4s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.4);font-size:14px;white-space:nowrap;max-width:90vw}
.toast-notif.show{top:24px}
.toast-icon{font-size:18px}
.toast-msg{color:#c8e6c9;font-weight:500}

.cat-select-wrap{position:relative;flex:1}
.cat-select-real{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:2;font-size:14px}
.cat-select-display{padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:14px;display:flex;align-items:center;gap:8px;pointer-events:none;z-index:1;position:relative}
.cat-select-display svg{width:16px;height:16px;flex-shrink:0;vertical-align:middle}
.cat-select-display:after{content:'\25BE';margin-left:auto;color:rgba(255,255,255,.2);font-size:10px}

/* Chat Button */
.chat-btn{position:fixed;bottom:24px;left:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#059669,#34d399);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:199;box-shadow:0 4px 20px rgba(52,211,153,.3);transition:transform .2s}
.chat-btn:hover{transform:scale(1.1)}
.chat-btn .chat-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 2px 8px rgba(239,68,68,.3)}
/* Contact Sidebar */
.contact-sidebar{position:fixed;top:0;left:-320px;width:300px;height:100vh;background:rgba(10,26,15,.98);border-right:1px solid rgba(52,211,153,.15);z-index:200;transition:left .3s ease;backdrop-filter:blur(12px);overflow:hidden;display:flex;flex-direction:column}
.contact-sidebar.show{left:0}
.contact-sidebar-header{padding:16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:rgba(255,255,255,.5)}
.contact-list{flex:1;overflow-y:auto;padding:8px}
.contact-item{padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;transition:all.1s}
.contact-item:hover{background:rgba(52,211,153,.04)}
.contact-item .badge{background:#ef4444;color:#fff;font-size:10px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;margin-left:auto}
/* Chat Panel */
.chat-panel{position:fixed;bottom:88px;left:24px;width:340px;background:rgba(10,26,15,.98);border:1px solid rgba(52,211,153,.15);border-radius:16px;z-index:200;backdrop-filter:blur(12px);box-shadow:0 4px 30px rgba(0,0,0,.5);display:none;overflow:hidden}
.chat-panel.show{display:block}
.chat-panel-header{padding:14px 16px;background:rgba(52,211,153,.06);border-bottom:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:rgba(255,255,255,.5)}
.chat-body{max-height:450px;overflow-y:auto}
.chat-msgs{padding:14px;min-height:200px;max-height:320px;overflow-y:auto}
.chat-msg{margin-bottom:12px}
.chat-msg .sender{font-size:10px;color:rgba(255,255,255,.2);margin-bottom:2px;padding:0 4px}
.chat-msg .bubble{display:inline-block;padding:8px 14px;border-radius:14px;max-width:85%;word-break:break-word;font-size:13px;line-height:1.5}
.chat-msg.mine{text-align:right}
.chat-msg.mine .bubble{background:rgba(52,211,153,.15);color:#c8e6c9;border-radius:14px 14px 14px 4px}
.chat-msg.other .bubble{background:rgba(255,255,255,.04);color:#c8e6c9;border-radius:4px 14px 14px 14px}
.chat-msg .time{font-size:9px;color:rgba(255,255,255,.12);margin-top:3px;display:block}
.chat-input-row{display:flex;gap:6px;padding:10px 12px;border-top:1px solid rgba(255,255,255,.04)}
.chat-input-row input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.3);color:#c8e6c9;font-size:12px;outline:0}
.chat-input-row input:focus{border-color:rgba(52,211,153,.3)}
.chat-convs{padding:8px}
.chat-conv-item{padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;transition:all.1s}
.chat-conv-item:hover{background:rgba(52,211,153,.04)}

@media(max-width:768px){
  .main{flex-direction:column;padding:12px}
  .sidebar{width:100%}
  .sidebar .cats{display:flex;gap:6px;overflow-x:auto}
  .sidebar .cats .cat{white-space:nowrap;flex-shrink:0;font-size:12px;padding:6px 10px}
  .sidebar .stats{display:none}
  .grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .card .info{padding:6px 8px}
  .card .info .title{font-size:12px}
  .card .info .price{font-size:15px}
  .pub-box{padding:20px;margin:10px auto}
  .pub-box .row{flex-wrap:wrap}
  .pub-box .row input,.pub-box .row select{min-width:100%}
  .modal-box{margin:10px;max-width:100%}
  .chat-panel{left:0;right:0;bottom:0;width:100%;border-radius:16px 16px 0 0;max-height:60vh;touch-action:auto}
  .contact-sidebar{max-height:100vh;touch-action:auto}
  .chat-btn{bottom:16px;left:16px;width:50px;height:50px}
  .chat-msgs{min-height:120px;max-height:200px}
  .chat-input-row input{font-size:16px}
  .chat-input-row button{padding:10px 18px;font-size:14px}
  #pageNav{margin-top:8px!important;padding:8px 0!important}
  .header{padding:12px 16px}
  .header .logo{font-size:17px}
  .header .sub{font-size:10px}
  .header .actions a{padding:6px 14px;font-size:12px}
}
</style>
</head>
<body>

<!-- Announcement Bar -->
<div class="ann-bar" id="annBar">
  <span class="ann-dot"></span>
  <span class="ann-text" id="annText"></span>
</div>

<!-- Header -->
<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <span id="hamburgerBtn" onclick="toggleContacts()" style="cursor:pointer;font-size:20px;color:rgba(255,255,255,.3);margin-right:8px;display:none">☰</span>
    <div class="logo"><svg viewBox="0 0 28 28" width="22" height="22" style="vertical-align:middle"><path d="M6 2h12l4 4v18a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" fill="#064e3b" opacity=".5" transform="translate(1,2)"/><path d="M18 2v4h4" fill="#064e3b" opacity=".5" transform="translate(1,2)"/><polygon points="14 8 17.5 12.5 14 17 10.5 12.5" fill="#064e3b" opacity=".5" transform="translate(1,2)"/><path d="M6 2h12l4 4v18a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" fill="#065f46" opacity=".6" transform="translate(.7,1.3)"/><path d="M18 2v4h4" fill="#065f46" opacity=".6" transform="translate(.7,1.3)"/><polygon points="14 8 17.5 12.5 14 17 10.5 12.5" fill="#065f46" opacity=".6" transform="translate(.7,1.3)"/><path d="M6 2h12l4 4v18a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" fill="url(#gF)" stroke="#a7f3d0" stroke-width="1.2" stroke-linejoin="round"/><path d="M18 2v4h4" fill="url(#gF)" stroke="#a7f3d0" stroke-width=".8" stroke-linejoin="round"/><polygon points="14 8 17.5 12.5 14 17 10.5 12.5" fill="url(#lo2)" stroke="#a7f3d0" stroke-width="1" stroke-linejoin="round"/><polygon points="14 10 15.8 12.5 14 15 12.2 12.5" fill="rgba(255,255,255,.25)"/><line x1="8" y1="10" x2="11" y2="10" stroke="#a7f3d0" stroke-width=".8" stroke-linecap="round" opacity=".3"/><line x1="8" y1="13" x2="10" y2="13" stroke="#a7f3d0" stroke-width=".8" stroke-linecap="round" opacity=".3"/><line x1="8" y1="22" x2="19" y2="22" stroke="#a7f3d0" stroke-width=".8" stroke-linecap="round" opacity=".15"/><line x1="8" y1="24" x2="16" y2="24" stroke="#a7f3d0" stroke-width=".8" stroke-linecap="round" opacity=".15"/></svg> <span>校园严选</span></div>
    <div class="sub">严格认证 · 当面交易</div>
  </div>
  <div class="actions">
    <span id="userInfo" style="display:none;font-size:12px;color:rgba(255,255,255,.4);align-items:center;gap:6px">
      <span id="userName"></span>
      <a href="#" onclick="logout();return false" style="color:rgba(255,255,255,.2);font-size:11px;text-decoration:none">退出</a>
    </span>
    <a href="#" class="dash" id="loginBtn" onclick="showLogin();return false">登录</a>
    <a href="#" class="pub" onclick="if(showLoginForPub())showPub();return false">+ 发布闲置</a>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="search">
      <input id="searchInput" type="text" autocomplete="off" placeholder="搜索物品..." onkeydown="if(event.key==='Enter')load()">
    </div>
    <div class="section-title">分类</div>
    <div class="cats" id="catList"></div>
    <div class="stats">
      <div class="row"><span>收录商品</span><span id="statCount">0</span></div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:13px;color:rgba(255,255,255,.2)" id="resultLabel">全部商品</span>
    </div>
    <div class="grid" id="productList"><div class="empty">加载中...</div></div>
  </div>
</div>

<!-- Publish -->
<div class="pub-overlay" id="pubOverlay">
  <div class="pub-box">
    <h2>📝 发布闲置</h2>
    <input type="text" id="fTitle" placeholder="物品名称 *">
    <div class="row">
      <input type="number" id="fPrice" placeholder="价格（元）*" step="0.01">
      <div class="cat-select-wrap">
        <select id="fCat" class="cat-select-real"><option value="">分类</option></select>
        <div class="cat-select-display" id="fCatDisplay"><span style="color:rgba(255,255,255,.2)">分类</span></div>
      </div>
    </div>
    <div class="row">
      <select id="fQuality"><option value="">新旧程度</option><option>全新</option><option>九成新</option><option>八成新</option><option>七成新</option><option>五成新</option></select>
          </div>
    <textarea id="fDesc" placeholder="描述（版本、使用情况、面交地点...）"></textarea>
    <div style="margin-bottom:10px">
      <label style="display:inline-block;padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:rgba(255,255,255,.3);font-size:12px;cursor:pointer">📷 添加照片
        <input type="file" id="fImage" accept="image/*" multiple style="display:none" onchange="previewImg(this)">
      </label>
      <span id="fImageName" style="font-size:11px;color:rgba(255,255,255,.2);margin-left:8px"></span>
    </div>
    <div id="fImagePreview" style="margin-bottom:10px;display:none">
      <img id="fImagePreviewImg" style="max-width:100%;max-height:150px;border-radius:8px;border:1px solid rgba(255,255,255,.06)">
    </div>
    <div class="btns">
      <button class="submit" onclick="publish()">✅ 确认发布</button>
      <button class="cancel" onclick="hidePub()">取消</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)hideDetail()">
  <div class="modal-box" id="detailBox"></div>
</div>

<!-- Report Modal -->
<div class="pub-overlay report-modal" id="reportOverlay">
  <div class="pub-box">
    <h2>🚨 举报商品</h2>
    <select id="rReason">
      <option value="">请选择举报原因</option>
      <option>虚假信息</option>
      <option>已售不删</option>
      <option>价格欺诈</option>
      <option>违规商品</option>
      <option>其他</option>
    </select>
    <textarea id="rDetail" placeholder="补充说明（选填）"></textarea>
    <input type="text" id="rContact" placeholder="你的联系方式（选填）">
    <div class="btns">
      <button class="submit" onclick="submitReport()">提交举报</button>
      <button class="cancel" onclick="hideReport()">取消</button>
    </div>
  </div>
</div>

<!-- Chat Button -->
<div class="chat-btn" id="chatBtn" onclick="toggleChat()" style="display:none">
  <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="13" y2="13"/></svg>
  <span class="chat-badge" id="chatBadge">0</span>
</div>

<!-- Chat Panel -->
<div class="chat-panel" id="chatPanel" onclick="event.stopPropagation()">
  <div class="chat-panel-header">
    <span>💬 最近对话</span>
    <span onclick="toggleChat()" style="cursor:pointer;font-size:12px;color:rgba(255,255,255,.2)">✕</span>
  </div>
  <div class="chat-body" id="chatBody">
    <div style="padding:8px 8px 0">
      <input type="text" id="chatSearch" autocomplete="off" placeholder="搜索联系人..." onkeyup="loadConvs()" style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:12px;outline:0">
    </div>
    <div class="chat-convs" id="chatConvs"></div>
    <div class="chat-conv" id="chatConv" style="display:none">
      <div style="padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;color:rgba(255,255,255,.3);display:flex;justify-content:space-between;align-items:center">
        <span onclick="showConvs()" style="cursor:pointer;color:#34d399">← 返回</span>
        <span id="chatConvLabel">💬 聊天</span>
        <span></span>
      </div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()" style="background:linear-gradient(135deg,#059669,#34d399);border:none;border-radius:10px;color:#fff;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;flex-shrink:0;letter-spacing:1px">发送</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast-notif" id="toastNotif">
  <span class="toast-icon" id="toastIcon">✅</span>
  <span class="toast-msg" id="toastMsg"></span>
</div>

<!-- Login Modal -->
<div class="pub-overlay" id="loginOverlay" onclick="if(event.target===this)hideLogin()">
  <div class="pub-box" style="max-width:400px;text-align:center">
    <div style="font-size:48px;margin-bottom:8px">🔑</div>
    <h2 style="font-size:18px;color:rgba(255,255,255,.6);margin-bottom:4px">欢迎回来</h2>
    <p style="font-size:12px;color:rgba(255,255,255,.2);margin-bottom:20px">登录后可以发布闲置和联系卖家</p>
    <input type="text" id="loginId" placeholder="学号">
    <input type="password" id="loginPhone" placeholder="电话">
    <div style="font-size:12px;color:rgba(255,255,255,.15);margin-bottom:14px">还没有账号？<a href="#" onclick="hideLogin();showVerify();return false" style="color:#34d399;font-weight:600">立即认证 →</a></div>
    <div class="btns">
      <button class="submit" onclick="doLogin()" style="padding:12px">登录</button>
    </div>
    <div style="margin-top:10px"><a href="#" onclick="hideLogin();return false" style="font-size:12px;color:rgba(255,255,255,.15);text-decoration:none">稍后再说</a></div>
  </div>
</div>

<!-- Contact Sidebar -->
<div class="contact-sidebar" id="contactSidebar" onclick="event.stopPropagation()">
  <div class="contact-sidebar-header">
    <span>👥 全部联系人</span>
    <span onclick="toggleContacts()" style="cursor:pointer;font-size:14px;color:rgba(255,255,255,.2)">✕</span>
  </div>
  <div style="padding:8px">
    <input type="text" id="contactSearch" placeholder="搜索联系人..." onkeyup="loadContacts()" style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:12px;outline:0">
  </div>
  <div class="contact-list" id="contactList"></div>
</div>

<!-- Verify Modal -->
<div class="pub-overlay" id="verifyOverlay">
  <div class="pub-box" style="max-width:460px">
    <h2>🪪 实名认证</h2>
    <p style="font-size:13px;color:rgba(255,255,255,.25);margin-bottom:16px">认证通过后即可用学号+电话登录</p>
    <input type="text" id="vName" placeholder="真实姓名 *">
    <input type="text" id="vStudentId" placeholder="学号 *">
    <input type="text" id="vPhone" placeholder="手机号 *">
    <div style="margin-bottom:10px">
      <label style="display:inline-block;padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:rgba(255,255,255,.3);font-size:12px;cursor:pointer">📷 上传学生证照片
        <input type="file" id="vStudentCard" accept="image/*" style="display:none" onchange="previewStudentCard(this)">
      </label>
      <span id="vCardName" style="font-size:11px;color:rgba(255,255,255,.2);margin-left:8px"></span>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.15);margin:8px 0">信息仅用于认证，不会公开</div>
    <div class="btns">
      <button class="submit" onclick="applyVerify()">提交认证</button>
      <button class="cancel" onclick="hideVerify()">取消</button>
    </div>
  </div>
</div>

<script>
let selCat = '';
let reportingProductId = null;

// ====== Toast Notification ======
function notify(msg, icon) {
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = icon||'✅';
  const el = document.getElementById('toastNotif');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ====== Categories ======
async function loadCats() {
  try {
    const r = await fetch('/api/marketplace/categories');
    const cats = await r.json();
    const arr = Array.isArray(cats) ? cats : [];
    const catHtml = '<div class="cat active" onclick="setCat(\'\')">'+getCatIcon('全部')+' 全部</div>' +
      arr.map(c => '<div class="cat" onclick="setCat(\''+esc(c.name)+'\')">'+(getCatIcon(c.name))+' '+esc(c.name)+'</div>').join('');
    document.getElementById('catList').innerHTML = catHtml;
    // Populate category select + display
    var sel = document.getElementById('fCat');
    sel.innerHTML = '<option value="">分类</option>' +
      arr.map(c => '<option value="'+esc(c.name)+'">'+esc(c.name)+'</option>').join('');
    sel.onchange = function() {
      var val = sel.value;
      var name = val || '分类';
      var icon = val ? (getCatIcon(val) || CAT_ICONS_EMOJI[val] || '') : '';
      document.getElementById('fCatDisplay').innerHTML = (icon || '<span style="color:rgba(255,255,255,.2)">分类</span>') + ' ' + (val || '');
    };
  } catch(e) {
    // Fallback hardcoded
    document.getElementById('catList').innerHTML = '<div class="cat active" onclick="setCat(\'\')">🏠 全部</div>' +
      ['教材笔记','数码配件','宿舍神器','生活百货','其他'].map(c => '<div class="cat" onclick="setCat(\''+c+'\')">'+c+'</div>').join('');
  }
}

// ====== Announcements ======
async function loadAnn() {
  try {
    const r = await fetch('/api/marketplace/announcements');
    const data = await r.json();
    const arr = Array.isArray(data) ? data : [];
    if (arr.length) {
      document.getElementById('annText').textContent = arr[0].title + (arr[0].content ? ' — ' + arr[0].content : '');
      document.getElementById('annBar').classList.add('show');
    }
  } catch(e) {}
}

// ====== Products ======
function setCat(c) {
  selCat = c;
  document.querySelectorAll('#catList .cat').forEach(el => {
    if (c === '') el.classList.toggle('active', el.textContent.includes('全部'));
    else el.classList.toggle('active', el.textContent.includes(c));
  });
  load();
}

let pageOffset = 0;
const PAGE_SIZE = 10;

async function load(reset) {
  if (reset !== false) { pageOffset = 0; document.getElementById('productList').innerHTML = '<div class="empty">加载中...</div>'; }
  const search = document.getElementById('searchInput').value.trim();
  // Save state
  try { localStorage.setItem('marketState', JSON.stringify({cat:selCat,search:search,page:Math.floor(pageOffset/10)+1})); } catch(e) {}
  let url = '/api/marketplace/products?limit='+PAGE_SIZE+'&offset='+pageOffset;
  if (selCat) url += '&category='+selCat;
  if (search) url += '&search='+encodeURIComponent(search);
  try {
    const r = await fetch(url); const json = await r.json();
    const data = Array.isArray(json.data) ? json.data : (Array.isArray(json) ? json : []);
    var searchVal = document.getElementById('searchInput').value.trim();
    const total = searchVal ? data.length : (json.total || data.length);
    document.getElementById('statCount').textContent = total;
    document.getElementById('resultLabel').textContent = (selCat||'全部')+(search?' · "'+search+'"':'')+' · '+total+' 件';
    const list = document.getElementById('productList');
    if (reset !== false) {
      if (!data.length) { list.innerHTML = '<div class="empty">🌱 还没有商品，快来发布第一个</div>'; return; }
      list.innerHTML = '';
    } else {
      list.innerHTML = '';
    }
    data.forEach(function(p) {
      var div = document.createElement('div');
      div.className = 'card';
      div.onclick = function() { showDetail(p.id); };
      div.innerHTML = '<div class="img">📦</div><div class="info"><div class="title">'+esc(p.title)+'</div><div class="price">¥'+parseFloat(p.price).toFixed(0)+'</div><div class="meta"><span class="tag">'+esc(p.quality)+'</span><span class="tag">'+esc(p.category)+'</span></div></div>'+
        (p.sold?'<div class="sold-badge">已售罄</div>':'');
      list.appendChild(div);
    });
    // Page navigation (fixed position, always same spot)
    var totalPages = Math.ceil(total / PAGE_SIZE);
    var currentPage = Math.floor(pageOffset / PAGE_SIZE) + 1;
    var nav = document.getElementById('pageNav');
    if (!nav) {
      nav = document.createElement('div');
      nav.id = 'pageNav';
      nav.style.cssText = 'text-align:right;padding:12px 0;margin-top:16px;display:flex;gap:4px;justify-content:flex-end;align-items:center;border-top:1px solid rgba(255,255,255,.04)';
      list.parentNode.appendChild(nav);
    }
    var navHtml = '';
    if (currentPage > 1) navHtml += '<a href="#" onclick="gotoPage('+(currentPage-1)+');return false" style="color:rgba(255,255,255,.3);font-size:12px;text-decoration:none;padding:5px 10px;border:1px solid rgba(255,255,255,.06);border-radius:5px">‹</a>';
    for (var i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
      if (i === currentPage) navHtml += '<span style="background:rgba(52,211,153,.1);color:#34d399;padding:5px 10px;border-radius:5px;font-size:12px;font-weight:600">'+i+'</span>';
      else navHtml += '<a href="#" onclick="gotoPage('+i+');return false" style="color:rgba(255,255,255,.25);font-size:12px;text-decoration:none;padding:5px 10px;border:1px solid rgba(255,255,255,.04);border-radius:5px">'+i+'</a>';
    }
    if (currentPage < totalPages) navHtml += '<a href="#" onclick="gotoPage('+(currentPage+1)+');return false" style="color:rgba(255,255,255,.3);font-size:12px;text-decoration:none;padding:5px 10px;border:1px solid rgba(255,255,255,.06);border-radius:5px">›</a>';
    nav.innerHTML = navHtml;
  } catch(e) { document.getElementById('productList').innerHTML = '<div class="empty">加载失败</div>'; }
}

function gotoPage(page) {
  pageOffset = (page - 1) * PAGE_SIZE;
  document.getElementById('productList').innerHTML = '<div class="empty">加载中...</div>';
  load(false);
}

// ====== Detail ======
async function showDetail(id) {
  try {
    const r = await fetch('/api/marketplace/products/'+id); const p = await r.json();
    if(!p) return;
    reportingProductId = p.id;
    document.getElementById('detailBox').innerHTML =
      '<div class="img-big">'+(p.images && p.images.length > 0 ? '<div id="detailImgs">'+p.images.map(function(src,i){ return '<img src="'+src+'" style="'+(i>0?'display:none':'')+'max-width:100%;max-height:300px;border-radius:8px" class="detail-img">'; }).join('')+'<div style="text-align:center;margin-top:6px;font-size:11px;color:rgba(255,255,255,.2)">'+(p.images.length>1?'<span onclick="prevImg()" style="cursor:pointer;padding:4px 10px">‹</span> <span id="imgIdx">1/'+p.images.length+'</span> <span onclick="nextImg()" style="cursor:pointer;padding:4px 10px">›</span>':'')+'</div></div>' : '<span style="font-size:80px">📦</span>')+'</div><div class="body">'+
      '<div class="title">'+esc(p.title)+(p.sold?' <span style="color:#ef4444;font-size:14px">[已售罄]</span>':'')+'</div>'+
      '<div class="price">¥'+parseFloat(p.price).toFixed(2)+'</div>'+
      '<div class="tags"><span>'+esc(p.quality)+'</span><span>'+esc(p.category)+'</span></div>'+
      (p.desc?'<div class="desc">'+esc(p.desc)+'</div>':'')+
      '<div class="btns">'+
      (!p.sold ? '<button class="contact" onclick="hideDetail();openChat('+p.id+',\''+(p.owner_student_id||'unknown')+'\',\''+esc(p.owner_name||'卖家')+'\',\''+esc(p.title)+'\')">💬 联系卖家</button>' : '<span class="contact" style="opacity:.3;cursor:default">已售罄</span>')+
      '<button class="close" onclick="hideDetail()">关闭</button></div>'+
      '<div class="report-link" onclick="hideDetail();showReport('+p.id+')">🚨 举报</div></div>';
    document.getElementById('detailModal').classList.add('show');
  } catch(e) {}
}
function hideDetail(){document.getElementById('detailModal').classList.remove('show')}

function prevImg() {
  var imgs = document.querySelectorAll('.detail-img');
  var vis = Array.from(imgs).findIndex(function(i) { return i.style.display !== 'none'; });
  if (vis > 0) { imgs[vis].style.display = 'none'; imgs[vis-1].style.display = ''; document.getElementById('imgIdx').textContent = (vis)+'/'+imgs.length; }
}
function nextImg() {
  var imgs = document.querySelectorAll('.detail-img');
  var vis = Array.from(imgs).findIndex(function(i) { return i.style.display !== 'none'; });
  if (vis < imgs.length-1) { imgs[vis].style.display = 'none'; imgs[vis+1].style.display = ''; document.getElementById('imgIdx').textContent = (vis+2)+'/'+imgs.length; }
}

// ====== Publish ======
function showPub(){document.getElementById('pubOverlay').classList.add('show')}
function hidePub(){document.getElementById('pubOverlay').classList.remove('show')}

async function publish(){
  const title=document.getElementById('fTitle').value.trim();
  const price=document.getElementById('fPrice').value;
  if(!title||!price){notify('请填写名称和价格', '⚠️');return}
  const btn = document.querySelector('.pub-box .submit');
  btn.textContent='⏳ 发布中...'; btn.disabled=true;
  const data={
    title,price:parseFloat(price),category:document.getElementById('fCat').value||'其他',
    quality:document.getElementById('fQuality').value||'八成新',
    desc:document.getElementById('fDesc').value.trim(),
    owner_student_id: currentUser ? currentUser.student_id : '',
    owner_name: currentUser ? currentUser.name : '',
    images: window._uploadedImages || []
  };
  try{
    const r=await fetch('/api/marketplace/products',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const d=await r.json();
    btn.textContent='✅ 确认发布'; btn.disabled=false;
    const ok = d?.id || d?.[0]?.id || d?.ok;
    if(ok){hidePub();document.getElementById('fTitle').value='';document.getElementById('fPrice').value='';document.getElementById('fDesc').value='';document.getElementById('fImageName').textContent='';document.getElementById('fImagePreview').style.display='none';document.getElementById('fImage').value='';window._uploadedImages=[];load();}
    else notify(d.error || '发布失败', '❌');
  }catch(e){btn.textContent='✅ 确认发布'; btn.disabled=false; notify('发布失败', '❌');}
}

// ====== Report ======
function showReport(id) {
  if (!currentUser) { notify('请先登录后举报', '🔑'); showLogin(); return; }
  reportingProductId = id;
  document.getElementById('reportOverlay').classList.add('show');
}
function hideReport() {
  document.getElementById('reportOverlay').classList.remove('show');
  reportingProductId = null;
}
async function submitReport(){
  const reason = document.getElementById('rReason').value;
  if (!reason || !reportingProductId) { notify('请选择举报原因', '⚠️'); return; }
  try {
    const r = await fetch('/api/marketplace/reports', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({product_id: reportingProductId, reason, detail: document.getElementById('rDetail').value.trim(), reporter_contact: document.getElementById('rContact').value.trim()})
    });
    const d = await r.json();
    if (d.ok) { notify('举报已提交，管理员会尽快处理', '✅'); hideReport(); }
    else notify('提交失败', '❌');
  } catch(e) { notify('提交失败', '❌'); }
}

// ====== Login / Auth ======
let currentUser = null;
try { const u = localStorage.getItem('marketUser'); if (u) currentUser = JSON.parse(u); } catch(e) {}
if (currentUser) { renderLoggedIn(); }
if (currentUser) { document.getElementById('chatBtn').style.display = ''; document.getElementById('hamburgerBtn').style.display = ''; startUnreadPoll(); startProductPoll(); }

function renderLoggedIn() {
  document.getElementById('loginBtn').style.display = 'none';
  document.getElementById('userInfo').style.display = 'flex';
  document.getElementById('userName').textContent = '👤 ' + (currentUser?.name || '用户');
}
function renderLoggedOut() {
  document.getElementById('loginBtn').style.display = '';
  document.getElementById('userInfo').style.display = 'none';
  currentUser = null;
  localStorage.removeItem('marketUser');
  document.getElementById('chatBtn').style.display = 'none';
  document.getElementById('chatPanel').classList.remove('show');
}

function showLogin(){document.getElementById('loginOverlay').classList.add('show')}
function hideLogin(){document.getElementById('loginOverlay').classList.remove('show')}
async function doLogin(){
  const student_id = document.getElementById('loginId').value.trim();
  const phone = document.getElementById('loginPhone').value.trim();
  if(!student_id||!phone){notify('请填写学号和电话', '⚠️');return}
  if(student_id.length!==13){notify('学号应为13位', '⚠️');return}
  if(phone.length!==11){notify('手机号应为11位', '⚠️');return}
  const btn=document.querySelector('#loginOverlay .submit');
  btn.textContent='⏳';btn.disabled=true;
  try{
    const r=await fetch('/api/marketplace/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({student_id,phone})});
    const d=await r.json();
    btn.textContent='登录';btn.disabled=false;
    if(d.ok&&d.user){currentUser=d.user;localStorage.setItem('marketUser',JSON.stringify(d.user));renderLoggedIn();document.getElementById('chatBtn').style.display='';document.getElementById('hamburgerBtn').style.display='';startUnreadPoll();hideLogin();notify('登录成功', '✅');}
    else notify(d.msg||'登录失败', '❌');
  }catch(e){btn.textContent='登录';btn.disabled=false;notify('登录失败', '❌');}
}

function logout(){
  if(!confirm('确认退出？'))return;
  renderLoggedOut();
}

function showLoginForPub() {
  if (!currentUser) { notify('请先登录再发布', '🔑'); showLogin(); return false; }
  return true;
}

// ====== Verification ======
function showVerify(){document.getElementById('verifyOverlay').classList.add('show');document.getElementById('loginOverlay').classList.remove('show')}
function hideVerify(){document.getElementById('verifyOverlay').classList.remove('show')}
async function applyVerify(){
  const n=document.getElementById('vName').value.trim(),s=document.getElementById('vStudentId').value.trim(),p=document.getElementById('vPhone').value.trim();
  if(!n||!s||!p){notify('请填写完整信息', '⚠️');return}
  if(s.length!==13){notify('学号应为13位', '⚠️');return}
  if(p.length!==11){notify('手机号应为11位', '⚠️');return}
  const btn=document.querySelector('#verifyOverlay .submit');
  btn.textContent='⏳';btn.disabled=true;
  try{
    const r=await fetch('/api/marketplace/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,student_id:s,phone:p,image:window._cardImage||''})});
    const d=await r.json();
    btn.textContent='提交认证';btn.disabled=false;
    if(d.ok){notify(d.msg, '✅');hideVerify();window._cardImage='';document.getElementById('vCardName').textContent='';}
    else notify(d.msg||'提交失败', '❌');
  }catch(e){btn.textContent='提交认证';btn.disabled=false;notify('提交失败', '❌');}
}

// ====== Utils ======
function esc(s) { if (!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ====== SVG Icons ======

// ====== Student Card Upload ======
window._cardImage = '';
function previewStudentCard(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5*1024*1024) { notify('图片不能超过5MB', '⚠️'); return; }
  document.getElementById('vCardName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(e) { window._cardImage = e.target.result; };
  reader.readAsDataURL(file);
}

// ====== Image Upload ======
window._uploadedImages = [];
function previewImg(input) {
  var files = Array.from(input.files || []).slice(0, 4);
  if (!files.length) return;
  document.getElementById('fImageName').textContent = files.length + '张图片 (压缩中...)';
  window._uploadedImages = [];
  var loaded = 0;
  files.forEach(function(file) {
    if (file.size > 5*1024*1024) { notify('图片不能超过5MB', '⚠️'); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var maxW = 800, maxH = 800;
        var w = img.width, h = img.height;
        if (w > maxW || h > maxH) { var r = Math.min(maxW/w, maxH/h); w = Math.round(w*r); h = Math.round(h*r); }
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        var quality = 0.6;
        var dataUrl = canvas.toDataURL('image/jpeg', quality);
        while (dataUrl.length > 200*1024 && quality > 0.1) { quality -= 0.1; dataUrl = canvas.toDataURL('image/jpeg', quality); }
        window._uploadedImages.push(dataUrl);
        loaded++;
        if (loaded === files.length) {
          document.getElementById('fImageName').textContent = files.length + '张 (' + Math.round(dataUrl.length/1024) + 'KB/张)';
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

let wsChat = null;
let chatProductId = null;
let chatOtherStudent = null;
let chatOtherName = '';
let chatVisible = false;

function fmtDate(d) { if(!d) return ''; var dt=new Date(d); var now=new Date(); if(dt.getDate()===now.getDate()&&now-dt<864e5) return String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0'); return (dt.getMonth()+1)+'/'+dt.getDate(); }

function toggleChat() {
  var panel = document.getElementById('chatPanel');
  var btn = document.getElementById('chatBtn');
  if (panel.classList.contains('show')) {
    panel.classList.remove('show');
    btn.style.display = '';
    document.body.style.overflow = '';
  } else {
    panel.classList.add('show');
    btn.style.display = 'none';
    document.body.style.overflow = 'hidden';
    // Load convs in background
    setTimeout(loadConvs, 50);
  }
}


function connectWS() {
  if (!currentUser) return;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  wsChat = new WebSocket(proto + '//' + location.host);
  wsChat.onerror = function(e) { console.error('WS error', e); };
  wsChat.onopen = function() {
    document.getElementById('chatBadge').textContent = '0';
    wsChat.send(JSON.stringify({type:'auth', student_id: currentUser.student_id}));
  };
  wsChat.onmessage = function(e) {
    try {
      var d = JSON.parse(e.data);
      if (d.type === 'product_update') {
        load();
        return;
      }
      if (d.type === 'chat' && d.data) {
        var badge = document.getElementById('chatBadge');
        var c = parseInt(badge.textContent) || 0;
        badge.textContent = c + 1;
        if (chatProductId && chatProductId == d.data.product_id) {
          appendMsg(d.data, false);
        }
      }
    } catch(e) {}
  };
  wsChat.onclose = function() { setTimeout(connectWS, 3000); };
}

function openChat(productId, sellerStudentId, sellerName, productTitle) {
  if (!currentUser) { notify('请先登录后联系卖家', '🔑'); showLogin(); return; }
  if (sellerStudentId === 'unknown') { notify('卖家信息不完整，暂无法联系', '⚠️'); return; }
  if (sellerStudentId === currentUser.student_id) { notify('这是你自己的商品', '👤'); return; }
  chatProductId = productId;
  chatOtherStudent = sellerStudentId;
  chatOtherName = sellerName;
  // Show panel immediately
  document.getElementById('chatPanel').classList.add('show');
  document.getElementById('chatBtn').style.display = 'none';
  document.getElementById('chatConvs').style.display = 'none';
  document.getElementById('chatConv').style.display = '';
  document.getElementById('chatMsgs').innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,.15);font-size:12px">加载中...</div>';
  document.getElementById('chatConvLabel').textContent = '💬 ' + sellerName;
  // Load messages async
  setTimeout(function() {
    fetch('/api/marketplace/messages?product_id='+productId+'&student_id='+currentUser.student_id+'&other_student_id='+sellerStudentId)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var arr = Array.isArray(data) ? data : [];
        document.getElementById('chatMsgs').innerHTML = '';
        arr.forEach(function(m) { appendMsg(m, true); });
        var msgs = document.getElementById('chatMsgs');
        msgs.scrollTop = msgs.scrollHeight;
        if (currentUser) {
          fetch('/api/marketplace/messages/read', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product_id:productId,student_id:currentUser.student_id})});
        }
      });
  }, 100);
  startChatPoll();
}

function showConvs() {
  stopChatPoll();
  document.getElementById('chatConvs').style.display = '';
  document.getElementById('chatConv').style.display = 'none';
  chatProductId = null;
  loadConvs();
}

function loadConvs() {
  if (!currentUser) return;
  var search = (document.getElementById('chatSearch').value || '').trim().toLowerCase();
  fetch('/api/marketplace/contacts?student_id='+currentUser.student_id)
    .then(function(r) { return r.json(); })
    .then(function(contacts) {
      var arr = Array.isArray(contacts) ? contacts : [];
      // Filter by search
      if (search) arr = arr.filter(function(c) { return (c.name||'').toLowerCase().includes(search) || (c.student_id||'').includes(search); });
      // Count unread
      var unread = 0;
      var el = document.getElementById('chatConvs');
      var badge = document.getElementById('chatBadge');
      if (!arr.length) {
        el.innerHTML = '<div style="text-align:center;padding:30px;color:rgba(255,255,255,.1);font-size:12px">' + (search ? '未找到联系人' : '暂无消息') + '</div>';
        badge.textContent = '0'; return;
      }
      el.innerHTML = arr.map(function(c) {
        var sid = c.student_id;
        var unBadge = (c.unread && c.unread > 0) ? '<span style="background:#ef4444;color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;margin-left:4px">'+c.unread+'</span>' : '';
        return '<div class="chat-conv-item" onclick="openChat('+c.product_id+',\''+sid+'\',\''+esc(c.name)+'\',\'\')">💬 <span style="flex:1;overflow:hidden;text-overflow:ellipsis">'+esc(c.name)+'</span>'+unBadge+'</div>';
      }).join('');
      var totalUnread = arr.reduce(function(sum, c) { return sum + (c.unread || 0); }, 0);
      badge.textContent = totalUnread > 0 ? totalUnread : '0';
    });
}

function closeConv(key) {
  var closed = JSON.parse(localStorage.getItem('closedConvs') || '[]');
  if (!closed.includes(key)) closed.push(key);
  localStorage.setItem('closedConvs', JSON.stringify(closed));
  loadConvs();
}

var _lastChatTime = 0;
function sendChat() {
  try {
    var now = Date.now();
    if (now - _lastChatTime < 1000) { notify('发送太快，请稍等', '⏳'); return; }
    _lastChatTime = now;
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text) { notify('输入消息', '✏️'); return; }
    if (!chatProductId) { notify('请先选择对话', '💬'); return; }
    if (!currentUser) { notify('请先登录', '🔑'); showLogin(); return; }
    input.value = '';
    fetch('/api/marketplace/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({product_id:chatProductId,from_student_id:currentUser.student_id,from_name:currentUser.name,to_student_id:chatOtherStudent||'',to_name:chatOtherName||'',content:text})
    }).then(function(r){return r.json();}).then(function(m){
      if (m && m.id) { appendMsg({id:m.id,product_id:chatProductId,from_student_id:currentUser.student_id,from_name:currentUser.name,content:text,created_at:new Date().toISOString()}, false); }
    }).catch(function(e){notify('发送失败','❌');});
  } catch(e) { notify('发送出错', '❌'); console.error(e); }
}

var _chatPollTimer = null;
function startChatPoll() {
  stopChatPoll();
  if (!chatProductId || !currentUser) return;
  var lastId = 0;
  _chatPollTimer = setInterval(function() {
    if (!chatProductId || !currentUser) { stopChatPoll(); return; }
    fetch('/api/marketplace/messages?product_id='+chatProductId+'&student_id='+currentUser.student_id+'&other_student_id='+(chatOtherStudent||''))
      .then(function(r){return r.json();})
      .then(function(data){
        var arr = Array.isArray(data)?data:[];
        arr.forEach(function(m) {
          if (m.id > lastId) { lastId = m.id; appendMsg(m, true); }
        });
      }).catch(function(){});
  }, 1000);
}
function stopChatPoll() {
  if (_chatPollTimer) { clearInterval(_chatPollTimer); _chatPollTimer = null; }
}

function toggleContacts() {
  var s = document.getElementById('contactSidebar');
  s.classList.toggle('show');
  if (s.classList.contains('show')) loadContacts();
}
function loadContacts() {
  if (!currentUser) return;
  var search = (document.getElementById('contactSearch').value || '').trim().toLowerCase();
  fetch('/api/marketplace/contacts?student_id='+currentUser.student_id)
    .then(function(r){return r.json();})
    .then(function(data){
      var arr = Array.isArray(data)?data:[];
      if (search) arr = arr.filter(function(c) { return (c.name||'').toLowerCase().includes(search) || (c.student_id||'').includes(search); });
      var el = document.getElementById('contactList');
      if (!arr.length) { el.innerHTML = '<div style="text-align:center;padding:30px;color:rgba(255,255,255,.1);font-size:12px">暂无联系人</div>'; return; }
      el.innerHTML = arr.map(function(c) {
        var unBadge = (c.unread && c.unread > 0) ? '<span class="badge">'+c.unread+'</span>' : '';
        return '<div class="contact-item" onclick="closeContacts();openChat('+c.product_id+',\''+c.student_id+'\',\''+esc(c.name)+'\',\'\')">💬 <span style="flex:1;overflow:hidden;text-overflow:ellipsis">'+esc(c.name)+'</span>'+unBadge+'</div>';
      }).join('');
    });
}
function closeContacts() { document.getElementById('contactSidebar').classList.remove('show'); }

var _unreadTimer = null;
function startUnreadPoll() {
  if (_unreadTimer) clearInterval(_unreadTimer);
  if (!currentUser) return;
  var lastCheck = 0;
  _unreadTimer = setInterval(function() {
    if (!currentUser) { clearInterval(_unreadTimer); _unreadTimer = null; return; }
    fetch('/api/marketplace/messages?student_id='+currentUser.student_id)
      .then(function(r){return r.json();})
      .then(function(data){
        var arr = Array.isArray(data)?data:[];
        var unread = 0;
        var latest = 0;
        arr.forEach(function(m) {
          var t = new Date(m.created_at).getTime();
          if (t > latest) latest = t;
          if (m.to_student_id === currentUser.student_id && !m.read) unread++;
        });
        if (latest > lastCheck) { lastCheck = latest; }
        var badge = document.getElementById('chatBadge');
        if (unread > 0) { badge.textContent = unread; }
        else { badge.textContent = '0'; }
        // Also update conv list if open
        if (document.getElementById('chatPanel').classList.contains('show')) loadConvs();
      }).catch(function(){});
  }, 2000);
}

var _productTimer = null;
function startProductPoll() {
  if (_productTimer) clearInterval(_productTimer);
  var lastCount = 0;
  _productTimer = setInterval(function() {
    fetch('/api/marketplace/products?limit=1&offset=0')
      .then(function(r){return r.json();})
      .then(function(json){
        var total = json.total || (Array.isArray(json)?json.length:0);
        if (lastCount > 0 && total !== lastCount) { load(); }
        lastCount = total;
      }).catch(function(){});
  }, 5000);
}

function appendMsg(m, isHistory) {
  var el = document.getElementById('chatMsgs');
  if (!el) return;
  // Dedup by checking if message already exists
  if (m.id && el.querySelector('[data-msgid="'+m.id+'"]')) return;
  var mine = currentUser && m.from_student_id === currentUser.student_id;
  var d = new Date(m.created_at);
  var timeStr = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  var name = m.from_name || (mine ? '我' : '对方');
  var div = document.createElement('div');
  div.className = 'chat-msg ' + (mine ? 'mine' : 'other');
  if (m.id) div.setAttribute('data-msgid', m.id);
  div.innerHTML = '<div class="sender">'+esc(name)+'</div><div class="bubble">'+esc(m.content)+'</div><span class="time">'+timeStr+'</span>';
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}
