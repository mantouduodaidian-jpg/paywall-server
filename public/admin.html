<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔑 付费管理后台</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:system-ui,-apple-system,sans-serif; background:#0a0a14; color:#c8c8d0; padding:20px; }
  .app { max-width:800px; margin:0 auto; }
  h1 { font-size:24px; margin-bottom:4px; }
  h1 span { color:#8b5cf6; }
  .sub { color:#666; font-size:13px; margin-bottom:20px; }
  .cards { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:20px; }
  .card { background:#0e0e22; border:1px solid #1e1e3a; border-radius:12px; padding:14px; text-align:center; }
  .card .n { font-size:24px; font-weight:700; }
  .card .l { font-size:11px; color:#666; margin-top:2px; }
  .section { background:#0e0e22; border:1px solid #1e1e3a; border-radius:14px; padding:20px; margin-bottom:16px; }
  .section h3 { font-size:14px; margin-bottom:12px; color:#aaa; }
  .row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .row input { flex:1; min-width:80px; padding:10px 14px; border-radius:10px; border:1px solid #1e1e3a; background:#0a0a16; color:#c8c8d0; font-size:14px; outline:none; }
  .row input:focus { border-color:#8b5cf6; }
  .row button { padding:10px 20px; border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
  .btn-primary { background:#8b5cf6; color:#fff; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(139,92,246,.25); }
  .btn-ghost { background:#1e1e3a; color:#aaa; }
  .btn-ghost:hover { background:#2e2e5a; }
  .btn-danger { background:#3a1a1a; color:#ef4444; }
  .btn-danger:hover { background:#4a2a2a; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:#666; font-weight:400; padding:6px 4px; border-bottom:1px solid #1e1e3a; }
  td { padding:6px 4px; border-bottom:1px solid #14142a; }
  .badge { font-size:11px; padding:2px 8px; border-radius:6px; }
  .badge-green { background:#0a1a0a; color:#6bcb77; }
  .badge-red { background:#1a0a0a; color:#ef4444; }
  .badge-yellow { background:#1a1a0a; color:#f7c948; }
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1e1e3a; padding:10px 20px; border-radius:10px; font-size:13px; border:1px solid #2e2e5a; opacity:0; transition:all .4s; z-index:100; }
  .toast.show { opacity:1; }
  .tabs { display:flex; gap:4px; margin-bottom:16px; }
  .tab { padding:8px 18px; border-radius:10px; font-size:13px; cursor:pointer; background:#0e0e22; border:1px solid #1e1e3a; color:#666; }
  .tab.active { background:#1e1e3a; border-color:#8b5cf6; color:#c0b0ff; }
</style>
</head>
<body>
<div class="app">
  <h1>🔑 付费<span>管理后台</span></h1>
  <div class="sub">光纤通信复习题库 · 通用付费验证系统</div>

  <div class="cards">
    <div class="card"><div class="n" style="color:#8b5cf6;" id="statTotal">0</div><div class="l">总密码</div></div>
    <div class="card"><div class="n" style="color:#6bcb77;" id="statUsed">0</div><div class="l">已使用</div></div>
    <div class="card"><div class="n" style="color:#f7c948;" id="statOrders">0</div><div class="l">总订单</div></div>
    <div class="card"><div class="n" style="color:#86efac;" id="statRevenue">¥0</div><div class="l">收入</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('passwords',this)">🔑 密码管理</div>
    <div class="tab" onclick="switchTab('orders',this)">📋 订单记录</div>
  </div>

  <div id="tabPasswords">
    <div class="section">
      <h3>➕ 批量生成密码</h3>
      <div class="row">
        <input type="text" id="labelInput" placeholder="批量标识（如：第一批）">
        <input type="number" id="countInput" value="10" min="1" max="100" style="max-width:80px;">
        <button class="btn-primary" onclick="batchGen()">🚀 生成</button>
        <button class="btn-ghost" onclick="loadPasswords()">🔄 刷新</button>
      </div>
      <div style="max-height:300px;overflow-y:auto;" id="pwdList"></div>
    </div>
  </div>

  <div id="tabOrders" style="display:none;">
    <div class="section">
      <h3>📋 订单记录</h3>
      <div style="max-height:400px;overflow-y:auto;" id="orderList"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = '';
let showToast, toastTimer;

function initToast() {
  showToast = function(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  };
}

async function api(url, opts) {
  try {
    const r = await fetch(API + url, opts);
    return await r.json();
  } catch(e) { showToast('请求失败: ' + e.message); return null; }
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tabPasswords').style.display = name === 'passwords' ? 'block' : 'none';
  document.getElementById('tabOrders').style.display = name === 'orders' ? 'block' : 'none';
  if (name === 'orders') loadOrders();
}

async function loadStats() {
  const d = await api('/api/stats');
  if (!d) return;
  document.getElementById('statTotal').textContent = d.totalPwd;
  document.getElementById('statUsed').textContent = d.usedPwd;
  document.getElementById('statOrders').textContent = d.totalOrders;
  document.getElementById('statRevenue').textContent = '¥' + d.revenue.toFixed(2);
}

async function loadPasswords() {
  const list = await api('/api/passwords');
  if (!list) return;
  const el = document.getElementById('pwdList');
  if (list.length === 0) { el.innerHTML = '<div style="color:#444;padding:20px;text-align:center;">暂无密码</div>'; return; }
  const fmt = t => { if (!t) return ''; const d=new Date(t); return (d.getMonth()+1)+'月'+d.getDate()+'日'; };
  el.innerHTML = '<table><tr><th>密码</th><th>标识</th><th>状态</th><th>创建</th></tr>' +
    list.map(p => `<tr>
      <td style="font-family:monospace;font-weight:700;color:${p.used?'#555':'#a78bfa'}">${p.code}</td>
      <td style="color:#888;">${p.label||'-'}</td>
      <td><span class="badge ${p.used?'badge-red':'badge-green'}">${p.used?'已使用':'未用'}</span></td>
      <td style="color:#666;font-size:12px;">${fmt(p.created_at)}</td>
    </tr>`).join('') + '</table>';
}

async function loadOrders() {
  const list = await api('/api/orders');
  if (!list) return;
  const el = document.getElementById('orderList');
  if (list.length === 0) { el.innerHTML = '<div style="color:#444;padding:20px;text-align:center;">暂无订单</div>'; return; }
  el.innerHTML = '<table><tr><th>订单号</th><th>金额</th><th>状态</th><th>密钥</th><th>时间</th></tr>' +
    list.map(o => `<tr>
      <td style="font-family:monospace;font-size:11px;color:#888;">${o.order_no||'-'}</td>
      <td>¥${o.amount.toFixed(2)}</td>
      <td><span class="badge ${o.status==='paid'?'badge-green':'badge-yellow'}">${o.status==='paid'?'已支付':'待支付'}</span></td>
      <td style="font-family:monospace;color:#a78bfa;">${o.password_code||'-'}</td>
      <td style="color:#666;font-size:12px;">${o.paid_at||o.created_at||'-'}</td>
    </tr>`).join('') + '</table>';
}

async function batchGen() {
  const label = document.getElementById('labelInput').value.trim();
  const count = parseInt(document.getElementById('countInput').value) || 10;
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '⏳ 生成中...'; btn.disabled = true;
  const d = await api('/api/passwords', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({count, label}) });
  btn.textContent = '🚀 生成'; btn.disabled = false;
  if (d && d.ok) { showToast('✅ 已生成 ' + d.count + ' 个密码'); loadPasswords(); loadStats(); }
}

initToast();
loadStats();
loadPasswords();
</script>
</body>
</html>
