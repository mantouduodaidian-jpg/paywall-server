<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔑 密钥管理后台</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:system-ui,-apple-system,sans-serif; background:#0a0a14; color:#c8c8d0; padding:20px; }
  .app { max-width:900px; margin:0 auto; }

  h1 { font-size:22px; margin-bottom:2px; }
  h1 span { color:#8b5cf6; }
  .sub { color:#666; font-size:13px; margin-bottom:20px; }

  .product-tabs { display:flex; gap:4px; margin-bottom:16px; }
  .product-tab {
    flex:1; padding:12px; border-radius:12px; border:1px solid #1e1e3a; background:#0e0e22;
    text-align:center; cursor:pointer; transition:all .2s; font-size:14px; font-weight:500;
  }
  .product-tab:hover { border-color:#3a3a6a; }
  .product-tab.active { background:#1a1040; border-color:#8b5cf6; color:#c0b0ff; box-shadow:0 0 20px rgba(139,92,246,.1); }
  .product-tab .badge { display:inline-block; background:#1e1e3a; color:#888; font-size:11px; padding:1px 8px; border-radius:8px; margin-left:6px; }

  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
  .stat { background:#0e0e22; border:1px solid #1e1e3a; border-radius:12px; padding:14px; text-align:center; }
  .stat .n { font-size:22px; font-weight:700; }
  .stat .n.purple { color:#8b5cf6; }
  .stat .n.green { color:#6bcb77; }
  .stat .n.yellow { color:#f7c948; }
  .stat .l { font-size:11px; color:#666; margin-top:2px; }

  .section { background:#0e0e22; border:1px solid #1e1e3a; border-radius:14px; padding:20px; margin-bottom:16px; }

  .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
  .toolbar input { padding:10px 14px; border-radius:10px; border:1px solid #1e1e3a; background:#0a0a16; color:#c8c8d0; font-size:14px; outline:none; flex:1; min-width:80px; }
  .toolbar input:focus { border-color:#8b5cf6; }

  .btn { padding:10px 20px; border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:6px; }
  .btn:hover { transform:translateY(-1px); }
  .btn-primary { background:#8b5cf6; color:#fff; }
  .btn-primary:hover { box-shadow:0 4px 16px rgba(139,92,246,.25); }
  .btn-ghost { background:#1e1e3a; color:#aaa; }
  .btn-ghost:hover { background:#2e2e5a; }
  .btn-danger { background:#2a1010; color:#ef4444; }
  .btn-danger:hover { background:#3a1a1a; }
  .btn-sm { padding:6px 12px; font-size:12px; border-radius:8px; }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:#666; font-weight:400; padding:8px 4px; border-bottom:1px solid #1e1e3a; font-size:12px; }
  td { padding:8px 4px; border-bottom:1px solid #14142a; vertical-align:middle; }
  tr:hover td { background:rgba(139,92,246,.03); }
  .code-cell { font-family:monospace; font-weight:700; font-size:15px; letter-spacing:1px; }
  .code-cell.used { color:#555; }
  .code-cell.fresh { color:#a78bfa; }

  .badge { font-size:11px; padding:3px 10px; border-radius:8px; display:inline-block; }
  .badge-green { background:#0a1a0a; color:#6bcb77; }
  .badge-red { background:#1a0a0a; color:#ef4444; }

  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1e1e3a; padding:12px 24px; border-radius:12px; font-size:13px; border:1px solid #2e2e5a; transition:all .4s; z-index:100; opacity:0; }
  .toast.show { opacity:1; }

  .empty { color:#444; padding:30px; text-align:center; font-size:13px; }
  .count-input { max-width:80px; }

  .pwd-table-wrap { max-height:400px; overflow-y:auto; }
  .pwd-table-wrap::-webkit-scrollbar { width:4px; }
  .pwd-table-wrap::-webkit-scrollbar-thumb { background:#1e1e3a; border-radius:2px; }
</style>
</head>
<body>
<div class="app">
  <h1>🔑 密钥<span>管理后台</span></h1>
  <div class="sub">多产品密钥生成 · 使用统计 · 管理</div>

  <div class="product-tabs" id="productTabs"></div>
  <div class="stats-row" id="statsRow">
    <div class="stat"><div class="n purple" id="statTotal">0</div><div class="l">总密钥</div></div>
    <div class="stat"><div class="n green" id="statUsed">0</div><div class="l">已使用</div></div>
    <div class="stat"><div class="n yellow" id="statRevenue">¥0</div><div class="l">收入</div></div>
  </div>

  <div class="section">
    <div class="toolbar">
      <input type="text" id="labelInput" placeholder="批次标识（如：第一批）">
      <input type="number" id="countInput" value="10" min="1" max="200" class="count-input">
      <button class="btn btn-primary" onclick="batchGen()">🚀 生成</button>
      <button class="btn btn-ghost" onclick="loadPasswords()">🔄 刷新</button>
      <button class="btn btn-danger" onclick="cleanUsed()">🧹 清理已用</button>
    </div>
    <div class="pwd-table-wrap" id="pwdList"><div class="empty">暂无密钥</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const API = 'https://paywall-server.onrender.com';
let currentProductId = 0;
let products = [];

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function api(url, opts) {
  try {
    const r = await fetch(API + url, { ...opts, headers: { 'Content-Type': 'application/json', ...opts?.headers } });
    return await r.json();
  } catch(e) { toast('请求失败: ' + e.message); return null; }
}

// ===== 产品 =====
async function loadProducts() {
  const list = await api('/api/products');
  if (!list) return;
  products = list;
  const tabs = document.getElementById('productTabs');
  tabs.innerHTML = '<div class="product-tab' + (currentProductId === 0 ? ' active' : '') + '" onclick="switchProduct(0)">📋 全部</div>' +
    list.map(p => '<div class="product-tab' + (currentProductId === p.id ? ' active' : '') + '" onclick="switchProduct(' + p.id + ')">' + (p.id === 1 ? '🔦' : '🔢') + ' ' + p.name + '</div>').join('');
}

function switchProduct(pid) {
  currentProductId = pid;
  loadProducts();
  loadPasswords();
  loadStats();
}

// ===== 密码列表 =====
async function loadPasswords() {
  const list = await api('/api/passwords' + (currentProductId ? '?product_id=' + currentProductId : ''));
  if (!list) return;
  const el = document.getElementById('pwdList');
  if (list.length === 0) { el.innerHTML = '<div class="empty">暂无密钥</div>'; return; }
  const fmt = t => { if (!t) return ''; const d=new Date(t); return (d.getMonth()+1)+'月'+d.getDate()+'日 ' + String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
  el.innerHTML = `<table>
    <tr><th>密钥</th><th>产品</th><th>批次</th><th>状态</th><th>创建</th><th style="text-align:center">操作</th></tr>
    ${list.map(p => `<tr>
      <td class="code-cell ${p.used?'used':'fresh'}">${p.code} <button class="btn btn-sm btn-ghost" onclick="copyPwd('${p.code}')" style="font-size:11px;padding:2px 8px;margin-left:4px" title="复制密码">📋</button></td>
      <td style="color:#888;font-size:12px">${p.product_name || '-'}</td>
      <td style="color:#888;font-size:12px">${p.label || '-'}</td>
      <td><span class="badge ${p.used?'badge-red':'badge-green'}">${p.used?'已用':'未用'}</span></td>
      <td style="color:#666;font-size:12px">${fmt(p.created_at)}</td>
      <td style="text-align:center">${p.used
        ? '<span style="color:#444;font-size:11px">—</span>'
        : `<button class="btn btn-sm btn-danger" onclick="deletePwd(${p.id})">✕ 删除</button>`
      }</td>
    </tr>`).join('')}
  </table>`;
}

// ===== 统计 =====
async function loadStats() {
  const d = await api('/api/stats' + (currentProductId ? '?product_id=' + currentProductId : ''));
  if (!d) return;
  document.getElementById('statTotal').textContent = d.totalPwd;
  document.getElementById('statUsed').textContent = d.usedPwd;
  document.getElementById('statRevenue').textContent = '¥' + d.revenue.toFixed(2);
}

// ===== 操作 =====


function copyPwd(code) {
  var ta = document.createElement('textarea');
  ta.value = code;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select(); ta.setSelectionRange(0, 99999);
  try { document.execCommand('copy'); toast('✅ 已复制: ' + code); }
  catch(e) { toast('❌ 复制失败，请手动选中复制'); }
  document.body.removeChild(ta);
}
async function batchGen() {
  const label = document.getElementById('labelInput').value.trim();
  const count = parseInt(document.getElementById('countInput').value) || 10;
  if (!currentProductId) { toast('请先选择具体产品'); return; }
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '⏳ 生成中...'; btn.disabled = true;
  const d = await api('/api/passwords', { method:'POST', body:JSON.stringify({count, label, product_id: currentProductId}) });
  btn.textContent = '🚀 生成'; btn.disabled = false;
  if (d && d.ok) { toast('✅ 已生成 ' + d.count + ' 个密钥'); loadPasswords(); loadStats(); }
}

async function deletePwd(id) {
  if (!confirm('确认删除此密钥？')) return;
  const d = await api('/api/passwords/' + id, { method:'DELETE' });
  if (d && d.ok) { toast('✅ 已删除'); loadPasswords(); loadStats(); }
}

async function cleanUsed() {
  if (!confirm('删除当前产品所有已使用的密钥？')) return;
  const url = '/api/passwords/used/all' + (currentProductId ? '?product_id=' + currentProductId : '');
  const d = await api(url, { method:'DELETE' });
  if (d && d.ok) { toast('✅ 已清理'); loadPasswords(); loadStats(); }
}

// ===== 初始化 =====
loadProducts();
loadPasswords();
loadStats();
</script>
</body>
</html>
