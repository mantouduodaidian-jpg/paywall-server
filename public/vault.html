<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>密码管理器</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a1a0f;color:#c8e6c9;min-height:100vh;padding:20px}
  .wrap{max-width:600px;margin:0 auto}
  h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:20px}
  h1 span{background:linear-gradient(135deg,#6ee7b7,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

  .lock-screen{position:fixed;inset:0;background:#0a1a0f;display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column}
  .lock-screen input{padding:12px 18px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#c8e6c9;font-size:18px;text-align:center;width:240px;outline:none;font-family:inherit;margin-bottom:12px}
  .lock-screen input:focus{border-color:rgba(52,211,153,.2)}
  .lock-screen button{padding:10px 28px;border-radius:10px;border:none;background:linear-gradient(135deg,#059669,#34d399);color:#fff;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit}
  .lock-screen .err{color:#f87171;font-size:13px;margin-top:8px;display:none}

  .add-btn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;border:none;background:linear-gradient(135deg,#059669,#34d399);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(5,150,105,.3);display:flex;align-items:center;justify-content:center;z-index:10}

  .item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
  .item:hover{border-color:rgba(52,211,153,.12)}
  .item .icon{width:36px;height:36px;border-radius:10px;background:rgba(52,211,153,.08);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .item .info{flex:1;min-width:0}
  .item .info .name{font-size:14px;color:rgba(255,255,255,.5)}
  .item .info .user{font-size:12px;color:rgba(255,255,255,.2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .copy{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.06);background:transparent;color:rgba(255,255,255,.15);font-size:11px;cursor:pointer;font-family:inherit;flex-shrink:0}
  .item .copy:hover{border-color:rgba(52,211,153,.2);color:rgba(52,211,153,.4)}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;overflow-y:auto;padding:20px}
  .modal-overlay.show{display:block}
  .modal-box{background:#0a1a0f;border-radius:16px;max-width:480px;margin:30px auto;padding:24px;border:1px solid rgba(255,255,255,.06)}
  .modal-box h2{font-size:18px;color:rgba(255,255,255,.4);margin-bottom:16px}
  .modal-box label{font-size:11px;color:rgba(255,255,255,.15);display:block;margin-bottom:4px;margin-top:10px}
  .modal-box input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);color:#c8e6c9;font-size:14px;outline:none;font-family:inherit}
  .modal-box input:focus{border-color:rgba(52,211,153,.2)}
  .modal-box .row{display:flex;gap:8px}
  .modal-box .row input{flex:1}
  .modal-box button{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
  .modal-box .btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
  .modal-box .btns .save{background:linear-gradient(135deg,#059669,#34d399);color:#fff}
  .modal-box .btns .save:hover{opacity:.9}
  .modal-box .btns .del{background:rgba(239,68,68,.1);color:#f87171}
  .modal-box .btns .del:hover{background:rgba(239,68,68,.2)}
  .modal-box .btns .cancel{background:rgba(255,255,255,.04);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.06)}

  .empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,.06);font-size:14px}

  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:4px}
</style>
</head>
<body>
<div class="lock-screen" id="lockScreen">
  <div style="font-size:40px;margin-bottom:12px">🔐</div>
  <div style="font-size:16px;color:rgba(255,255,255,.3);margin-bottom:16px">输入主密码解锁</div>
  <input type="password" id="masterPwd" placeholder="主密码" onkeydown="if(event.key==='Enter')unlock()">
  <button onclick="unlock()">解锁</button>
  <div class="err" id="lockErr">密码错误</div>
</div>

<div class="wrap">
  <h1>🔐 <span>密码管理器</span></h1>
  <div id="list"><div class="empty">请先解锁</div></div>
</div>
<button class="add-btn" onclick="showAdd()">+</button>

<!-- Edit/Add Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h2 id="modalTitle">添加密码</h2>
    <label>网站/应用名</label><input type="text" id="fName" placeholder="例如: 微信">
    <label>用户名/邮箱</label><input type="text" id="fUser" placeholder="your@email.com">
    <label>密码</label>
    <div class="row"><input type="text" id="fPass" placeholder="••••••••"><button onclick="genPass()" style="font-size:12px;padding:0 12px;white-space:nowrap">生成</button></div>
    <label>备注</label><input type="text" id="fNote" placeholder="选填">
    <div class="btns">
      <button class="cancel" onclick="closeModal()">取消</button>
      <button class="del" id="delBtn" onclick="delItem()" style="display:none">删除</button>
      <button class="save" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>

<script>
let masterKey = null;
let items = [];
let editId = null;

function unlock() {
  const pwd = document.getElementById('masterPwd').value;
  if (!pwd) return;
  // Simple key derivation
  masterKey = pwd;
  document.getElementById('lockScreen').style.display = 'none';
  loadItems();
}

function encrypt(text) {
  if (!masterKey) return text;
  // Simple XOR + base64 (note: not crypto-grade, but keeps casual eyes out)
  let result = '';
  for (let i = 0; i < text.length; i++) {
    result += String.fromCharCode(text.charCodeAt(i) ^ masterKey.charCodeAt(i % masterKey.length));
  }
  return btoa(unescape(encodeURIComponent(result)));
}

function decrypt(encoded) {
  if (!masterKey || !encoded) return '';
  try {
    const text = decodeURIComponent(escape(atob(encoded)));
    let result = '';
    for (let i = 0; i < text.length; i++) {
      result += String.fromCharCode(text.charCodeAt(i) ^ masterKey.charCodeAt(i % masterKey.length));
    }
    return result;
  } catch(e) { return ''; }
}

async function loadItems() {
  try {
    const r = await fetch('/api/vault');
    const data = await r.json();
    items = data || [];
    render();
  } catch(e) { document.getElementById('list').innerHTML = '<div class="empty">加载失败</div>'; }
}

function render() {
  const el = document.getElementById('list');
  if (!items.length) { el.innerHTML = '<div class="empty">🔐 还没有密码，点 + 添加</div>'; return; }
  el.innerHTML = items.map(item => {
    const name = decrypt(item.name);
    const user = decrypt(item.username || '');
    const icon = name ? name.charAt(0).toUpperCase() : '?';
    return '<div class="item" onclick="showEdit('+item.id+')"><div class="icon">'+icon+'</div><div class="info"><div class="name">'+(name||'未命名')+'</div><div class="user">'+(user||'')+'</div></div><button class="copy" onclick="event.stopPropagation();copyField('+item.id+',\'pass\')">复制密码</button></div>';
  }).join('');
}

function showAdd() { editId = null; document.getElementById('modalTitle').textContent = '添加密码'; document.getElementById('fName').value = ''; document.getElementById('fUser').value = ''; document.getElementById('fPass').value = genPass(); document.getElementById('fNote').value = ''; document.getElementById('delBtn').style.display = 'none'; document.getElementById('modal').classList.add('show'); }

function showEdit(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  editId = id;
  document.getElementById('modalTitle').textContent = '编辑密码';
  document.getElementById('fName').value = decrypt(item.name);
  document.getElementById('fUser').value = decrypt(item.username||'');
  document.getElementById('fPass').value = decrypt(item.password||'');
  document.getElementById('fNote').value = decrypt(item.note||'');
  document.getElementById('delBtn').style.display = 'inline-block';
  document.getElementById('modal').classList.add('show');
}

async function saveItem() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('请输入名称'); return; }
  const data = {
    name: encrypt(name),
    username: encrypt(document.getElementById('fUser').value),
    password: encrypt(document.getElementById('fPass').value),
    note: encrypt(document.getElementById('fNote').value.trim())
  };
  try {
    if (editId) {
      await fetch('/api/vault/'+editId, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    } else {
      await fetch('/api/vault', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    }
    closeModal(); loadItems();
  } catch(e) { alert('保存失败'); }
}

async function delItem() {
  if (!editId || !confirm('删除这条密码？')) return;
  try { await fetch('/api/vault/'+editId, { method: 'DELETE' }); closeModal(); loadItems(); }
  catch(e) { alert('删除失败'); }
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function genPass() {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
  let pass = '';
  for (let i = 0; i < 16; i++) pass += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('fPass').value = pass;
  return pass;
}

async function copyField(id, field) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const val = decrypt(item[field === 'pass' ? 'password' : field]);
  try { await navigator.clipboard.writeText(val); } catch(e) {}
}
</script>
</body>
</html>
