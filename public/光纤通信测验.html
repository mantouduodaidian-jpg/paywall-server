<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光纤通信 — 交互式复习</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: linear-gradient(135deg, #eef4ff 0%, #d8e6ff 50%, #e8f0fe 100%);
    padding: 20px; min-height: 100vh; overflow-y: scroll;
  }
  .container { max-width: 780px; margin: 0 auto; }
  h1 { text-align: center; font-size: 26px; color: #1a3a5c; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #7a9ab8; font-size: 14px; margin-bottom: 20px; }

  .mode-selector { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
  .mode-btn {
    padding: 8px 20px; border: 2px solid #d0e0f0; border-radius: 20px;
    background: #fff; color: #5a7a9a; cursor: pointer; font-size: 14px; transition: all .2s;
  }
  .mode-btn:hover { border-color: #7ab0d8; background: #f0f6ff; }
  .mode-btn.active { border-color: #3a7ab8; background: #e6f0ff; color: #2a5a8a; font-weight: 600; }

  .panel-selector { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
  .panel-btn {
    padding: 6px 14px; border: 1px solid #d0e0f0; border-radius: 14px;
    background: #fff; color: #7a9ab8; cursor: pointer; font-size: 13px; transition: all .2s;
  }
  .panel-btn:hover { border-color: #7ab0d8; background: #f0f6ff; }
  .panel-btn.active { border-color: #3a7ab8; background: #e6f0ff; color: #2a5a8a; font-weight: 600; }

  .filter-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .filter-row label {
    display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px;
    background: #fff; border: 1px solid #d0e0f0; border-radius: 16px;
    color: #5a7a9a; font-size: 13px; cursor: pointer;
  }

  .stats-row {
    display: flex; gap: 10px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap;
  }
  .stat-card {
    background: #fff; padding: 8px 18px; border-radius: 14px; box-shadow: 0 2px 8px rgba(42,90,138,.06);
    color: #4a6a8a; font-size: 13px; display: flex; align-items: center; gap: 6px;
  }
  .stat-card .num { font-weight: 700; font-size: 16px; }
  .stat-card .num.green { color: #38a169; }
  .stat-card .num.red { color: #e53e3e; }
  .stat-card .num.blue { color: #2b6cb0; }

  .progress-bar-wrap {
    background: #e2e8f0; border-radius: 10px; height: 8px; overflow: hidden; margin-bottom: 16px;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 10px; transition: width .5s cubic-bezier(.34,1.24,.64,1);
    background: linear-gradient(90deg, #63b3ed, #4299e1);
  }

  .question-card {
    background: #fff; border-radius: 16px; padding: 28px;
    display: none; box-shadow: 0 4px 20px rgba(42,90,138,.08);
    border: 1px solid #e2e8f0;
  }
  .question-card.active { display: block; }
  .q-number {
    display: inline-block; padding: 3px 12px; border-radius: 10px;
    font-size: 13px; margin-bottom: 12px; background: #ebf4ff; color: #2b6cb0;
  }
  .q-badge {
    display: inline-block; padding: 2px 10px; border-radius: 8px;
    font-size: 12px; margin-left: 8px; background: #fef3c7; color: #d69e2e;
  }
  .q-text { font-size: 18px; line-height: 1.7; margin-bottom: 18px; color: #2d3748; font-weight: 500; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px;
    cursor: pointer; font-size: 16px; background: #fafcff; color: #4a5568; transition: all .2s;
  }
  .option:hover:not(.disabled) { border-color: #90c4f0; background: #f0f6ff; }
  .option.selected { border-color: #4299e1; background: #ebf6ff; }
  .option.correct {
    border-color: #38a169; background: #f0fff4; color: #276749;
    animation: pop 0.35s ease;
  }
  .option.correct.viewed { animation: none; }
  .option.wrong {
    border-color: #e53e3e; background: #fff5f5; color: #c53030;
    animation: shake 0.4s ease;
  }
  .option.wrong.viewed { animation: none; }
  .option.disabled { cursor: default; }
  .multi-confirm-btn {
    display: block; width: 100%; margin-top: 14px;
    padding: 12px; border: 2px solid #4299e1; border-radius: 12px;
    background: #ebf6ff; color: #2b6cb0; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }
  .multi-confirm-btn:hover { background: #dceeff; border-color: #2b6cb0; transform: translateY(-1px); }
  .hint-btn { font-size: 13px; color: #7a9ab8; cursor: pointer; border-bottom: 1px dashed #c0d0e0; transition: all .2s; }
  .hint-btn:hover { color: #5a8ab8; border-color: #8ab8e0; }
  .feedback.hint-show {
    display: block; background: linear-gradient(135deg, #fffbeb, #fef3c7);
    border: 1px solid #fde68a; border-radius: 12px;
    padding: 16px 18px; color: #92400e; margin-top: 14px;
    box-shadow: 0 2px 8px rgba(251,191,36,.08);
    animation: fadeUp .35s ease;
  }
  .feedback.hint-show .hint-icon {
    display: inline-flex; width: 28px; height: 28px;
    background: #fbbf24; border-radius: 50%;
    align-items: center; justify-content: center;
    font-size: 14px; margin-right: 8px; flex-shrink: 0;
  }
  .feedback.hint-show .hint-title {
    font-weight: 700; font-size: 14px; margin-bottom: 4px; display: flex; align-items: center;
  }
  .feedback.hint-show .hint-body {
    font-size: 13px; line-height: 1.7; color: #a06800; padding-left: 36px;
  }
  .option .key {
    display: inline-block; width: 26px; height: 26px; line-height: 26px; text-align: center;
    border-radius: 8px; background: #edf2f7; margin-right: 12px; font-size: 14px; font-weight: 700; color: #a0aec0;
  }
  .option.selected .key { background: #bee3f8; color: #2b6cb0; }
  .option.correct .key { background: #c6f6d5; color: #276749; }
  .option.wrong .key { background: #fed7d7; color: #c53030; }

  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.03)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }

  .feedback { display: none; margin-top: 14px; padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.7; }
  .feedback.show { display: block; }
  .feedback.correct { background: #f0fff4; border: 1px solid #c6f6d5; color: #276749; }
  .feedback.wrong { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; }

  .nav-bar { display: none; justify-content: center; gap: 10px; margin-top: 18px; flex-wrap: wrap; align-items: center; }
  .nav-btn {
    padding: 8px 22px; border: 1px solid #d0e0f0; border-radius: 10px;
    background: #fff; color: #5a7a9a; cursor: pointer; font-size: 14px; transition: all .2s;
  }
  .nav-btn:hover { border-color: #7ab0d8; background: #f0f6ff; }
  .nav-btn.primary { border-color: #4299e1; background: #ebf6ff; color: #2b6cb0; }
  .nav-btn.primary:hover { background: #dceeff; }
  .nav-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Panel Stats Module */
  .panel-stats-module { display: none; margin-bottom: 16px; }
  .panel-stats-module.show { display: block; }
  .panel-stats-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; background: #fff; border-radius: 12px;
    border: 1px solid #e2e8f0; cursor: pointer; margin-bottom: 8px;
    transition: all .2s;
  }
  .panel-stats-header:hover { border-color: #90c4f0; box-shadow: 0 2px 8px rgba(42,90,138,.06); transform: translateY(-1px); }
  .panel-stats-header .title { font-size: 14px; color: #2d3748; font-weight: 600; }
  .panel-stats-toggle { display: inline-block; transition: transform .5s cubic-bezier(.34,1.56,.64,1); }
  .panel-stats-toggle.rotated { transform: rotate(180deg); }
  .panel-stats-toggle .arrow-wrap { position: relative; display: inline-block; width: 18px; height: 12px; }
  .panel-stats-toggle .arrow-inner, .panel-stats-toggle .arrow-outer {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 7px solid transparent; border-right: 7px solid transparent;
    transition: all .3s;
  }
  .panel-stats-toggle .arrow-outer {
    top: 0; border-top: 10px solid rgba(56,147,219,.25);
  }
  .panel-stats-toggle .arrow-inner {
    top: 3px; border-top: 7px solid #3893db;
  }
  .panel-stats-content {
    overflow: hidden; height: 0;
    transition: height .5s cubic-bezier(.34,1.24,.64,1);
  }
  .panel-stats-content.open { height: var(--content-h, 400px); }
  .ps-row {
    display: flex; align-items: center; gap: 10px; padding: 6px 0;
    font-size: 13px; color: #4a6a8a;
    opacity: 0; transform: translateY(-6px);
  }
  .panel-stats-content.open .ps-row {
    animation: rowIn .4s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes rowIn {
    0% { opacity: 0; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes rowOut {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-6px); }
  }
  .ps-row .ps-name { width: 80px; flex-shrink: 0; }
  .ps-row .ps-bar-bg { flex: 1; height: 8px; background: #edf2f7; border-radius: 6px; overflow: hidden; }
  .ps-row .ps-bar-fill { height: 100%; border-radius: 6px; transition: width .6s cubic-bezier(.4,0,.2,1); }
  .ps-row .ps-bar-fill.green { background: linear-gradient(90deg,#68d391,#38a169); }
  .ps-row .ps-bar-fill.yellow { background: linear-gradient(90deg,#f6e05e,#d69e2e); }
  .ps-row .ps-bar-fill.red { background: linear-gradient(90deg,#fc8181,#e53e3e); }
  .ps-row .ps-bar-fill.blue { background: linear-gradient(90deg,#63b3ed,#3182ce); }
  .ps-row .ps-pct { width: 50px; text-align: right; font-weight: 600; }

  .pd-color-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

  .sidebar-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,.2); z-index: 98;
  }
  .sidebar-overlay.show { display: block; }
  .sidebar {
    position: fixed; top: 0; right: -280px; width: 260px; height: 100%;
    background: #fff; box-shadow: -4px 0 20px rgba(0,0,0,.06);
    transition: right .3s; z-index: 99; padding: 20px; overflow-y: auto;
  }
  .sidebar.open { right: 0; }
  .sidebar h3 { font-size: 16px; margin-bottom: 12px; color: #2d3748; }
  .q-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .q-dot {
    width: 34px; height: 34px; border-radius: 8px; border: 2px solid #e2e8f0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; cursor: pointer; color: #a0aec0; background: #fff;
  }
  .q-dot:hover { border-color: #90c4f0; }
  .q-dot.current { border-color: #4299e1; color: #2b6cb0; }
  .q-dot.answered-correct { background: #f0fff4; border-color: #68d391; color: #276749; }
  .q-dot.answered-wrong { background: #fff5f5; border-color: #fc8181; color: #c53030; }

  .complete-msg { text-align: center; padding: 40px 20px; }
  .complete-msg h2 { font-size: 24px; color: #2d3748; margin-bottom: 8px; }
  .complete-msg p { color: #7a9ab8; }

  /* === Modal === */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,.3); z-index: 200;
    align-items: center; justify-content: center;
    animation: modalFade .25s ease;
  }
  .modal-overlay.show { display: flex; }
  @keyframes modalFade { 0%{opacity:0} 100%{opacity:1} }
  @keyframes modalPop {
    0% { transform: scale(.85); opacity: 0; }
    60% { transform: scale(1.03); }
    100% { transform: scale(1); opacity: 1; }
  }
  .modal-box {
    background: #fff; border-radius: 18px; padding: 28px; min-width: 320px; max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,.12);
    animation: modalPop .35s cubic-bezier(.34,1.56,.64,1);
  }
  .modal-box h3 { font-size: 18px; color: #1a202c; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .modal-box p { font-size: 14px; color: #4a5568; line-height: 1.6; margin-bottom: 20px; }
  .modal-box .btns { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-box .btns button {
    padding: 8px 22px; border-radius: 10px; border: 1px solid #d0e0f0;
    background: #fff; color: #4a6a8a; cursor: pointer; font-size: 14px; transition: all .15s;
  }
  .modal-box .btns button:hover { border-color: #90c4f0; background: #f0f6ff; }
  .modal-box .btns button.primary {
    border-color: #4299e1; background: #4299e1; color: #fff;
  }
  .modal-box .btns button.primary:hover { background: #3182ce; }
  .modal-box .btns button.danger {
    border-color: #e53e3e; background: #e53e3e; color: #fff;
  }
  .modal-box .btns button.danger:hover { background: #c53030; }

  @keyframes diceRoll {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  #randomBtn { padding: 8px 16px; }
  #randomBtn .dice { display: inline-block; line-height: 1; }
  #randomBtn.rolling .dice { animation: diceRoll .5s ease-out; }
  .question-card.flip-out {
    animation: cardFlipOut .25s ease-in forwards;
  }
  .question-card.flip-in {
    animation: cardFlipIn .35s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes cardFlipOut {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-12px) scale(.97); }
  }
  @keyframes cardFlipIn {
    0% { opacity: 0; transform: translateY(12px) scale(.97); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .question-card.belt-out-left {
    animation: beltOutLeft .25s ease-in forwards;
  }
  .question-card.belt-in-left {
    animation: beltInLeft .35s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  .question-card.belt-out-right {
    animation: beltOutRight .25s ease-in forwards;
  }
  .question-card.belt-in-right {
    animation: beltInRight .35s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes beltOutLeft  { 0% { opacity: 1; transform: translateX(0); } 100% { opacity: 0; transform: translateX(-60px); } }
  @keyframes beltInLeft   { 0% { opacity: 0; transform: translateX(-60px); } 100% { opacity: 1; transform: translateX(0); } }
  @keyframes beltOutRight { 0% { opacity: 1; transform: translateX(0); } 100% { opacity: 0; transform: translateX(60px); } }
  @keyframes beltInRight  { 0% { opacity: 0; transform: translateX(60px); } 100% { opacity: 1; transform: translateX(0); } }

  .kbd-hint { text-align: center; font-size: 11px; color: #a0aec0; margin-top: 8px; }
  .kbd-hint span { display: inline-block; padding: 1px 6px; border: 1px solid #e2e8f0; border-radius: 4px; margin: 0 2px; }

  .egg-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: #fff; border-radius: 16px; padding: 14px 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,.12); border: 1px solid #e2e8f0;
    z-index: 300; opacity: 0; transition: all .4s cubic-bezier(.34,1.56,.64,1);
    font-size: 15px; color: #2d3748; white-space: nowrap;
  }
  .egg-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .egg-toast .egg-icon { display: inline-block; margin-right: 8px; }
  /* 🔒 Lock Screen */
  .lock-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; animation: fadeIn .4s ease;
  }
  .lock-overlay.unlocked { animation: fadeOut .4s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  .lock-box {
    background: #fff; border-radius: 24px; padding: 32px;
    max-width: 380px; width: 100%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    animation: popIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .lock-icon { font-size: 48px; margin-bottom: 8px; }
  .lock-box h2 { font-size: 22px; color: #1a202c; margin-bottom: 4px; }
  .lock-desc { font-size: 14px; color: #7a9ab8; margin-bottom: 16px; }
  .price-tag { font-size: 18px; color: #e53e3e; margin-bottom: 20px; }
  .pay-section { background: #f7fafc; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 2px dashed #e2e8f0; }
  .pay-qr { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .pay-qr img { width: 260px; height: auto; border-radius: 12px; max-height: 320px; object-fit: contain; }
  .qr-icon { font-size: 40px; }
  .qr-text { font-size: 13px; color: #5a7a9a; line-height: 1.5; }
  .pay-note { font-size: 12px; color: #a0aec0; margin-top: 8px; }
  .unlock-section { display: flex; gap: 8px; margin-bottom: 8px; }
  .unlock-input {
    flex: 1; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px;
    font-size: 16px; outline: none; transition: border .2s;
  }
  .unlock-input:focus { border-color: #4299e1; }
  .unlock-btn {
    padding: 12px 24px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #4299e1, #3182ce); color: #fff;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .unlock-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(66,153,225,.3); }
  .unlock-btn:active { transform: translateY(0); }
  .unlock-error { font-size: 13px; color: #e53e3e; min-height: 20px; }
  .lock-contact { font-size: 12px; color: #a0aec0; margin-top: 12px; padding-top: 12px; border-top: 1px solid #edf2f7; }

  @media (max-width: 640px) {
    body { padding: 10px; }
    .container { max-width: 100%; }
    h1 { font-size: 20px; }
    .subtitle { font-size: 12px; margin-bottom: 12px; }
    .mode-btn { padding: 6px 14px; font-size: 12px; }
    .panel-btn { padding: 5px 10px; font-size: 11px; }
    .stats-row { gap: 6px; }
    .stat-card { padding: 6px 12px; font-size: 11px; }
    .stat-card .num { font-size: 14px; }
    .question-card { padding: 16px; border-radius: 12px; }
    .q-text { font-size: 15px; margin-bottom: 14px; }
    .option { padding: 11px 14px; font-size: 14px; border-radius: 10px; }
    .option .key { width: 22px; height: 22px; line-height: 22px; font-size: 12px; margin-right: 8px; }
    .nav-bar { gap: 6px; }
    .nav-btn { padding: 6px 12px; font-size: 11px; }
    .multi-confirm-btn { padding: 10px; font-size: 14px; }
    .feedback { font-size: 12px; padding: 12px 14px; }
    .feedback.hint-show .hint-body { font-size: 12px; padding-left: 0; margin-top: 4px; }
    .feedback.hint-show .hint-title { font-size: 13px; }
    .ps-row { font-size: 11px; gap: 6px; }
    .ps-row .ps-name { width: 50px; font-size: 10px; }
    .ps-row .ps-pct { width: 30px; font-size: 11px; }
    .panel-stats-header { padding: 8px 12px; }
    .panel-stats-header .title { font-size: 12px; }
    .sidebar { width: 220px; right: -240px; }
    .q-grid { gap: 4px; }
    .q-dot { width: 28px; height: 28px; font-size: 10px; }
    .kbd-hint { font-size: 9px; }
    .kbd-hint span { padding: 1px 4px; font-size: 9px; }
    .filter-row label { font-size: 11px; padding: 4px 10px; }
    .progress-bar-wrap { height: 6px; }
  }
  @media (max-width: 400px) {
    .mode-selector { gap: 4px; }
    .mode-btn { padding: 4px 10px; font-size: 11px; }
    .panel-selector { gap: 4px; }
    .panel-btn { padding: 4px 8px; font-size: 10px; }
    .question-card { padding: 12px; }
    .q-text { font-size: 14px; }
    .option { padding: 9px 10px; font-size: 13px; }
    .option .key { width: 20px; height: 20px; line-height: 20px; font-size: 11px; margin-right: 6px; }
    .nav-btn { padding: 4px 8px; font-size: 10px; }
    .stats-row .stat-card { padding: 4px 8px; }
    .stat-card .num { font-size: 12px; }
    .feedback { font-size: 11px; padding: 10px 12px; }
  }
</style>
</head>
<body>

<!-- 🔒 付费解锁 -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-box">

}

function getDisplayQuestions() {
  if (state.mode === 'wrongbook') {
    return ALL_QUESTIONS.filter(q => state.wrongSet.has(q.id));
  }
  if (state.mode === 'panel') return ALL_QUESTIONS.filter(q => q.panel === state.panel);
  return ALL_QUESTIONS;
}

function switchMode(mode) {
  state.mode = mode;
  state.currentIndex = 0;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('panelSelector').style.display = mode === 'panel' ? 'flex' : 'none';
  document.getElementById('panelStatsModule').style.display = mode === 'panel' ? 'block' : 'none';
  if (mode === 'outline') {
    document.getElementById('questionContainer').style.display = 'none';
    document.getElementById('outlinePanel').style.display = 'block';
    document.getElementById('navBar').style.display = 'none';
    renderOutline();
  } else {
    document.getElementById('questionContainer').style.display = 'block';
    document.getElementById('outlinePanel').style.display = 'none';
    refresh();
  }
}

function switchPanel(panel) {
  state.panel = panel;
  state.currentIndex = 0;
  document.querySelectorAll('.panel-btn').forEach(b => b.classList.toggle('active', b.dataset.panel === panel));
  refresh();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

function togglePanelStats() {
  const c = document.getElementById('panelStatsContent');
  const t = document.getElementById('panelStatsToggle');
  const opening = !c.classList.contains('open');
  if (opening) {
    c.style.height = 'auto';
    const h = c.scrollHeight;
    c.style.height = '0';
    void c.offsetWidth;
    c.style.setProperty('--content-h', h + 'px');
    c.style.height = h + 'px';
    c.classList.add('open');
    t.classList.add('rotated');
    const rows = c.querySelectorAll('.ps-row');
    rows.forEach((row, i) => {
      row.style.animationDelay = (i * 50) + 'ms';
      row.style.animation = 'none';
      void row.offsetWidth;
      row.style.animation = `rowIn .4s cubic-bezier(.34,1.56,.64,1) forwards`;
    });
  } else {
    const rows = c.querySelectorAll('.ps-row');
    rows.forEach((row, i) => {
      row.style.animation = 'none';
      row.style.opacity = '1';
      void row.offsetWidth;
      row.style.animation = `rowOut .4s cubic-bezier(.34,1.56,.64,1) forwards`;
      row.style.animationDelay = (rows.length - 1 - i) * 50 + 'ms';
    });
    // 容器和行同时收，无间隔
    setTimeout(() => {
      c.style.height = '0';
      c.classList.remove('open');
      t.classList.remove('rotated');
    }, 30);
    setTimeout(() => {
      rows.forEach(row => { row.style.animation = ''; row.style.animationDelay = ''; row.style.opacity = ''; });
    }, 600);
  }
}

function showQuestion() {
  const q = state.questions[state.currentIndex];
  if (!q) return;
  document.getElementById('qNumber').textContent = `第 ${state.currentIndex + 1}/${state.questions.length} 题`;
  const badge = document.getElementById('qBadge');
  badge.textContent = q.type;
  badge.className = 'q-badge';
  document.getElementById('qText').textContent = q.text;

  const optC = document.getElementById('optionsContainer');
  optC.innerHTML = '';
  const keys = ['A', 'B', 'C', 'D'];
  const isMulti = q.type === '多选';
  const answered = state.answers[q.id] !== undefined;
  const ansArr = answered ? (Array.isArray(state.answers[q.id]) ? state.answers[q.id] : [state.answers[q.id]]) : [];
  const corrArr = Array.isArray(q.answer) ? q.answer : [q.answer];

  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="key">${keys[i]}</span>${opt}`;
    div.dataset.index = i;

    if (answered) {
      div.classList.add('disabled');
      if (state.justAnswered !== q.id) div.classList.add('viewed');
      if (corrArr.includes(i)) div.classList.add('correct');
      if (ansArr.includes(i) && !corrArr.includes(i)) div.classList.add('wrong');
      if (ansArr.includes(i)) div.classList.add('selected');
    } else if (isMulti) {
      div.onclick = () => {
        div.classList.toggle('selected');
        const confirmBtn = document.getElementById('multiConfirm');
        if (confirmBtn) {
          const sel = optC.querySelectorAll('.option.selected').length;
          confirmBtn.textContent = sel === 0 ? '✅ 确认提交' : `✅ 确认提交（已选 ${sel} 项）`;
        }
      };
    } else {
      div.onclick = () => selectOption(q.id, i);
    }
    optC.appendChild(div);
  });

  // 多选确认按钮
  const existingBtn = document.getElementById('multiConfirm');
  if (existingBtn) existingBtn.remove();
  if (isMulti && !answered) {
    const btn = document.createElement('button');
    btn.id = 'multiConfirm';
    btn.className = 'multi-confirm-btn';
    btn.textContent = '✅ 确认提交';
    btn.onclick = () => submitMultiSelect(q.id);
    optC.appendChild(btn);
  }

  // hint button
  if (!answered) {
    const hb = document.createElement('div');
    hb.style.cssText = 'text-align:center;margin-top:12px;';
    hb.innerHTML = '<span class="hint-btn" id="hintBtn">💡 不会？点我看看提示</span>';
    hb.querySelector('.hint-btn').onclick = () => showHint(q.id);
    optC.appendChild(hb);
  }

  const prev = state.answers[q.id];
  const fb = document.getElementById('feedback');
  if (prev !== undefined) {
    fb.className = 'feedback show ' + (state.results[q.id] ? 'correct' : 'wrong');
    const verdict = state.results[q.id] ? '✅ 正确' : '❌ 错误';
    const answerText = corrArr.map(i => `${keys[i]}. ${q.options[i]}`).join('、');
    const explain = EXPLAINS[q.id];
    fb.innerHTML = `<strong>${verdict}，正确答案：${answerText}</strong>` + (explain ? `<br><br>💡 ${explain}` : '');
  } else {
    fb.className = 'feedback';
    fb.textContent = '';
  }
  document.getElementById('prevBtn').disabled = state.currentIndex === 0;
  document.getElementById('nextBtn').textContent = state.currentIndex === state.questions.length - 1 ? '✅ 完成' : '下一题 →';
}

function selectOption(qid, idx) {
  if (state.answers[qid] !== undefined) return;
  const q = ALL_QUESTIONS.find(q => q.id === qid);
  const corr = Array.isArray(q.answer) ? q.answer : [q.answer];
  const correct = corr.includes(idx);
  state.answers[qid] = idx;
  state.results[qid] = correct;
  state.justAnswered = qid;
  if (correct) { state.wrongSet.delete(qid); state.streak = 0; playCorrect(); }
  else { state.wrongSet.add(qid); state.streak++; playWrong(); }
  updateWrongBookCount();
  saveProgress();
  showQuestion();
  if (!state.results[qid]) showStreakEgg(state.streak);
  setTimeout(() => { if (state.justAnswered === qid) delete state.justAnswered; }, 600);
  updateStats();
  updateGrid();
  updatePanelStats();
}

function submitMultiSelect(qid) {
  if (state.answers[qid] !== undefined) return;
  const q = ALL_QUESTIONS.find(q => q.id === qid);
  const optC = document.getElementById('optionsContainer');
  const selected = [...optC.querySelectorAll('.option.selected')].map(el => parseInt(el.dataset.index));
  const corr = Array.isArray(q.answer) ? q.answer : [q.answer];

  // 排序后比较
  const sort = a => [...a].sort();
  const correct = JSON.stringify(sort(selected)) === JSON.stringify(sort(corr));

  state.answers[qid] = selected;
  state.results[qid] = correct;
  state.justAnswered = qid;
  if (correct) { state.wrongSet.delete(qid); state.streak = 0; playCorrect(); }
  else { state.wrongSet.add(qid); state.streak++; playWrong(); }
  updateWrongBookCount();
  saveProgress();
  showQuestion();
  if (!state.results[qid]) showStreakEgg(state.streak);
  setTimeout(() => { if (state.justAnswered === qid) delete state.justAnswered; }, 600);
  updateStats();
  updateGrid();
  updatePanelStats();
}

function nextQuestion() {
  if (state.currentIndex >= state.questions.length - 1) return;
  const card = document.getElementById('questionCard');
  if (!card) { state.currentIndex++; showQuestion(); return; }
  card.classList.add('belt-out-left');
  setTimeout(() => {
    state.currentIndex++;
    showQuestion();
    card.classList.remove('belt-out-left');
    card.classList.add('belt-in-left');
    setTimeout(() => card.classList.remove('belt-in-left'), 400);
  }, 250);
}
function prevQuestion() {
  if (state.currentIndex <= 0) return;
  const card = document.getElementById('questionCard');
  if (!card) { state.currentIndex--; showQuestion(); return; }
  card.classList.add('belt-out-right');
  setTimeout(() => {
    state.currentIndex--;
    showQuestion();
    card.classList.remove('belt-out-right');
    card.classList.add('belt-in-right');
    setTimeout(() => card.classList.remove('belt-in-right'), 400);
  }, 250);
}
function randomQuestion() {
  const btn = document.getElementById('randomBtn');
  btn.classList.remove('rolling');
  void btn.offsetWidth;
  btn.classList.add('rolling');

  const card = document.getElementById('questionCard');
  if (card) {
    card.classList.remove('flip-in');
    card.classList.add('flip-out');
    setTimeout(() => {
      state.currentIndex = Math.floor(Math.random() * state.questions.length);
      showQuestion();
      card.classList.remove('flip-out');
      card.classList.add('flip-in');
      setTimeout(() => card.classList.remove('flip-in'), 400);
    }, 250);
  } else {
    state.currentIndex = Math.floor(Math.random() * state.questions.length);
    showQuestion();
  }
}
function showModal(title, msg, buttons) {
  return new Promise((resolve) => {
    const overlay = document.getElementById('modalOverlay');
    document.getElementById('modalTitle').innerHTML = title;
    document.getElementById('modalMsg').innerHTML = msg;
    const btns = document.getElementById('modalBtns');
    btns.innerHTML = '';
    buttons.forEach((b, i) => {
      const btn = document.createElement('button');
      btn.textContent = b.label;
      if (b.cls) btn.className = b.cls;
      btn.onclick = () => { overlay.classList.remove('show'); resolve(b.value); };
      btns.appendChild(btn);
    });
    overlay.classList.add('show');
  });
}

}


function updateWrongBookCount() {
  const el = document.getElementById('wrongBookCount');
  if (el) el.textContent = '(' + state.wrongSet.size + ')';
}

function updateStats() {
  const total = state.questions.length;
  const answered = Object.keys(state.results).filter(k => state.questions.some(q => q.id == k)).length;
  const correct = Object.values(state.results).filter(v => v).length;
  const wrong = answered - correct;
  document.getElementById('progress').textContent = `${answered}/${total}`;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  const pct = total > 0 ? (answered / total) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function updateGrid() {
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  state.questions.forEach((q, i) => {
    const dot = document.createElement('div');
    dot.className = 'q-dot';
    if (state.results[q.id] === true) dot.classList.add('answered-correct');
    if (state.results[q.id] === false) dot.classList.add('answered-wrong');
    if (i === state.currentIndex) dot.classList.add('current');
    dot.textContent = i + 1;
    dot.onclick = () => { state.currentIndex = i; showQuestion(); toggleSidebar(); };
    grid.appendChild(dot);
  });
}

function updatePanelStats() {
  const container = document.getElementById('panelStatsRows');
  container.innerHTML = '';
  PANEL_INFO.forEach(p => {
    const qs = ALL_QUESTIONS.filter(q => q.panel === p.key);
    const total = qs.length;
    const answered = qs.filter(q => state.results[q.id] !== undefined).length;
    const correct = qs.filter(q => state.results[q.id] === true).length;
    const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
    const barPct = total > 0 ? Math.round((answered / total) * 100) : 0;
    const cls = pct >= 80 ? 'green' : pct >= 50 ? 'yellow' : pct >= 20 ? 'blue' : 'red';
    const row = document.createElement('div');
    row.className = 'ps-row';
    row.innerHTML = `
      <span class="ps-name"><span class="pd-color-dot" style="background:${p.color}"></span>${p.name}</span>
      <div class="ps-bar-bg"><div class="ps-bar-fill ${cls}" style="width:${barPct}%"></div></div>
      <span class="ps-pct" style="color:${p.color}">${answered === 0 ? '--' : pct + '%'}</span>
      <span style="font-size:11px;color:#a0aec0;width:50px;text-align:right;">${correct}/${total}</span>
    `;
    container.appendChild(row);
  });
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  // 数字选ABCD已移除（与管理员密码冲突）
  if (e.key === 'ArrowLeft') prevQuestion();
  if (e.key === 'ArrowRight') nextQuestion();
  if (e.key === 'r' || e.key === 'R') randomQuestion();
});

// ==================== 自动解锁 ====================
(function() {
  var token = localStorage.getItem("fiber_quiz_token");
  if (token) {
    var xhr = new XMLHttpRequest();
    xhr.open("POST", "https://paywall-server.onrender.com/api/verify-session", true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.send(JSON.stringify({token: token}));
    xhr.onload = function() {
      var resp = JSON.parse(xhr.responseText);
      if (resp.ok) {
        var el = document.getElementById("lockOverlay");
        el.classList.add("unlocked");
        el.style.display = "none";
      } else {
        localStorage.removeItem("fiber_quiz_token");
      }
    };
  }
})();

// ==================== INIT ====================
loadProgress();
updateWrongBookCount();
refresh();
</script>
</div>
</body>
